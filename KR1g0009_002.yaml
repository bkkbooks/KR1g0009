body:
  text: 融堂四書管見卷二宋錢時撰論語八佾第三孔子謂季氏八佾音逸舞於庭是可忍也孰不可忍也季氏魯大夫季孫氏也佾舞列也天子八諸侯六大夫四士二每佾八人不忍者人心之大間禮義亷恥之守也舞八佾於大夫之庭而忍矣則凡力之所可為者何所不為哉夫子斯言所以誅季氏不臣之心三家者以雍徹直列切子曰相去聲維辟公天子穆穆奚取於三家之堂三家魯大夫孟孫叔孫季孫之家也雍周頌篇名徹祭畢而收其俎也相助也辟公諸侯也穆穆和敬之容也二語雍詩之辭歌雍而徹三家但知僣魯耳不知魯君本非所宜有也相維辟公天子穆穆此何等語亦且習聞而安焉夫子斷之以奚取豈獨為三家者發哉子曰人而不仁如禮何人而不仁如樂何仁人心也禮者履此而已樂者樂此而已非徒玉帛鐘鼓之云也不仁則何以為禮樂此為前二者發林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚林放魯人易和易也夫子大林放之問而以寧儉答之辭㫖若有未盡焉者蓋禮之本以奢而亡儉雖非中質猶在也不既庶幾乎味與其及寧字深見傷時之意然必求其所謂本者則非仁不可故曰克己復禮為仁豈林放學未進此姑本世俗之弊以告之歟喪是禮中一事子曰夷狄之有君不如諸夏之亡也夫子感傷諸夏而羡夷狄之有君焉可哀也已季氏旅於泰山子謂冉有曰女音汝弗能救與對曰不能子曰嗚呼曾謂泰山不如林放乎旅祭名泰山魯國之山冉有名求孔子弟子時為季氏宰救救止也諸侯祭封內山川禮也林放能問禮之本而求也不能救季氏之僣有愧多矣曾謂泰山之神亦不如林放乎所以深罪冉有也在禮則僭在神則瀆將誰欺哉子曰君子無所爭必也射乎揖讓而升下而飲去聲其爭也君子揖遜而升者大射之禮耦進三揖而後升堂也下而飲謂射畢揖降以俟衆耦皆降勝者乃揖不勝者升取觶立飲也爭者血氣之事清明無我自然無爭射有勝有負疑不免矣而揖遜升降乃如許是其爭也所以為君子也然則君子果何所爭乎子夏問曰巧笑倩七練切兮美目盼普莧切兮素以為絢呼縣切兮何謂也子曰繪胡對切事後素曰禮後乎子曰起豫者商也始可與言詩已矣所問三句先儒謂逸詩今衛碩人篇有上二句倩口輔之美也盼白黑分明也絢采色畫之飾也繪事繪畫之事也後素後於素也忠信之人可以學禮有質而後有文也子夏一聞繪事後素之語而遽答之以禮後可謂善觸類者矣故曰起豫起豫者彊人意之義也子曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣杞夏之後宋商之後徵證也文典籍也獻賢也夫子能言二代之禮復以文獻不足為憾然則所能言者豈直文物制度之謂哉子曰禘大計切自既灌而往者吾不欲觀之矣禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝而以始祖配成王賜魯重祭故禘於周公之廟以文王為所出之帝而周公配之灌者方祭之始用鬱鬯灌地以降神也灌以降神祭之始皆然也既灌而往吾不欲觀則禘無一之足觀也明矣不欲觀三字有忠厚不忍之意或問禘之說子曰不知也知其說者之於天下也其如示諸斯乎指其掌之於天下猶言達之天下也示視也也示諸斯即指其掌而言蓋謂甚易曉答禘之問既曰不知所謂之於天下與所以示諸斯者又何以然也明得此義則上下有辨大分昭昭而三綱五常正矣故中庸又曰明乎禘嘗之禮治國其如指諸掌乎謂不知者不敢顯言國惡也學者當就指掌處領㑹祭如在祭神如神在子曰吾不與去聲祭如不祭祭祭先祖也祭神祭外神也人且死形質既無有矣所謂鬼神者何物哉知所以為鬼神則知人之所以為人如在之㫖可以默喻王孫賈問曰與其媚於奧寧媚於竈何謂也子曰不然獲罪於天無所禱也王孫賈衛大夫媚悅之也室西南隅為奧尊上之所居喻君竈者老婦之祭雖卑而飲食萃焉賈自喻諷夫子使媚已也王孫賈但知事於用衛而不知夫子所事者天欲以區區媚竈諷之可憐矣哉無所禱之言不特窒幸者之門足以破萬世弄權之膽子曰周監於二代郁郁於六切乎文哉吾從周監視也二代夏商也郁郁文盛貌春秋之未諸夏無君魯號秉周禮而且僭亂不可言矣何况其他夫子所以感念先王之舊發從周之歎歟子入大音泰廟每事問或曰孰謂鄹側留切人之子知禮乎入大廟每事問子聞之曰是禮也大廟魯周公廟鄹魯邑名也孔子父叔梁紇嘗為其邑大夫講之於平時問之於臨事敬而無失所謂禮也動容周旋皆盛德之至豈以一物不知為恥者哉謂鄹人之子必是初年入大廟之始子曰射不主皮為去聲力不同科古之道也皮革也布侯而棲革於其中以為的所謂鵠也科等也射貴於中耳古之道乃不主皮其所主者何事子貢欲去起吕切告古篤切朔之餼許氣切羊子曰賜也爾愛其羊我愛其禮古者天子常以季冬頒來嵗十二月之朔於諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之魯自文公始不視朔而猶供羊餼生牲也魯不視朔慢上甚矣猶幸餼羊可髣佛也子貢乃欲併去之嗚呼愛一羊也哉子曰事君盡禮人以為諂也禮即天則之不可踰者無纎毫缺闕方謂之盡到處方是了臣子分職耳故曰明此以北面舜之所以為臣未至聖人皆未可以言盡也孟子自謂齊人莫如我敬王氣象便不同定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠定公魯君名宋君臣之間非徒勢位君以禮臣以忠各盡其分耳此與孟子犬馬寇仇之義不同先儒把禮與忠對說恐於臣節有所未安屈原遭讒放逐至死而此心皎皎如秋霜夏日安可一日忘哉子曰關雎七余切樂音洛而不淫哀而不傷關雎周南首篇淫者樂之過傷者哀之過也樂則易淫哀則易傷發乎情性之正自然中節所謂和也所以不淫不傷者誰實為之慈湖先師謂此論關雎之音哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗子聞之曰成事不說遂事不諫既往不咎宰我名子孔子弟子以松以柏以栗者古者立社各樹其土之所宜木以為主也戰栗恐懼貌社之置關國體繫民命其義重矣宰我不能發揮止以主木為對而使民戰栗之說又復不能正救其謬夫子所以深責之子曰管仲之器小哉或曰管仲儉乎曰管氏有三歸官事不攝焉於䖍切得儉然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君為兩君之好去聲有反坫丁念切管氏亦有反坫管氏而知禮孰不知禮管仲名夷吾齊大夫相桓公以霸者器即君子不器之器三歸臺名攝兼也家臣不能具官故兼攝之不攝侈也宫屏謂之樹塞蔽也所以蔽內外也好謂好㑹坫在兩楹之間獻酬飲畢則反爵於其上皆諸侯之禮管氏僭之先儒論奢與犯禮其器之小可知愚謂管仲以其君霸正是器之小處奢與犯禮特其中一事耳未至於道未離於器况假之乎或者之問與公孫丑猶不足為之見略相似子語去聲魯太師樂曰樂其可知也始作翕如也從音縱之純如也皎如也繹如也以成語告也太師樂官名翕合也從放也純諧和不雜也皎明也八音厯厯無相奪也繹相續不絶也成樂之一終也樂其可知非夫子自謂也將以樂語魯太師言其㫖亦易曉云耳曰始作曰從曰成始終之備也曰翕曰純曰皎曰繹音節之美也所謂可知者如此夫子自衛反魯之時乎儀封人請見賢遍切曰君子之至於斯也吾未嘗不得見也從去聲者見賢遍切之出曰二三子何患於喪去聲乎天下之無道也久矣天將以夫子為木鐸儀衛邑封人掌封疆之官君子謂當時賢者木鐸金口木舌施政教則振之儀封人一見夫子便知斯文未喪天意有在賢於晨門荷蕢逺矣木鐸一振萬古遺音子謂韶盡美矣又盡善也謂武盡美矣未盡善也韶舜樂武武王樂武未盡善武王之心有不得已焉夫子非不滿於武王也韶居聖人之盛武處聖人之變夫子明聖人之心嚴萬世之大法也子曰居上不寬為禮不敬臨喪不哀吾何以觀之哉不寬則猛固無足觀不敬不哀皆文具耳里仁第四子曰里仁為美擇不處仁焉於䖍切得知去聲心不明於是非則視仁人若氷炭矣雖曰與之處而對面千萬里矣安知所擇也苟知所擇定不背馳子曰不仁者不可以久處約不可以長處樂音洛仁者安仁知去聲者利仁約窮困也利者知之而喜進也熟後自然不違故安知後自然不已故利利而行之者用力於仁也安而行之者無用乎力純乎天也子曰唯仁者能好去聲人能惡去聲人唯言獨也無一點私意斯之謂仁是是非非皆天理也子曰苟志於仁矣無惡如字也人之趨向全在立志苟志於仁即念念在仁矣自然無惡子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡去聲也不以其道得之不去也君子去仁惡平聲乎成名君子無終食之間違仁造七到切次必於是顛沛音貝必於是終食者一飯之頃也造次急遽也顛沛偃仆也素富貴行乎富貴素貧賤行乎貧賤何謂素行道是也故無入而不自得安得苟狥欲惡而為去處哉仁故謂之君子去仁則安所名乎終食不違以至顛沛造次必於是皆不去之實也畢竟仁在何處如何是不違如何是必於是知乎此則知所用力而道不可須臾離矣子曰我未見好去聲仁者惡去聲不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身有能一日用其力於仁矣乎我未見力不足者蓋有之矣我未之見也蓋有者不敢謂無用力於仁之人也我未之見所以深歎其難得也仁為己任若甚重矣然此事在我非有險阻之難越也非有荒逺之難到也非有百鈞九鼎之難舉也不疾而速不行而至安在有力不足者哉好仁則自然用力惡不仁則終能用力子曰人之過也各於其黨觀過斯知仁矣黨即偏黨之黨黨是人心偏私處所以過也仁者大公無我何偏私之有知所以為過即知所以為仁子曰朝聞道夕死可矣到脫然無疑礙處生亦可死亦可蠢蠢逐逐醉生夢死烏可與言哉子曰士志於道而恥惡衣惡食者未足與議也一念外馳便非志道子曰君子之於天下也無適丁厯切也無莫也義之與比毗志切適専主也莫不肯也比從也明得義後自然無所適莫不然即膠矣故曰君子而時中子曰君子懷德小人懷土君子懷刑小人懷惠有德有刑則君子懷有土有惠則小人懷懷者中心不忘之謂也君子隱遁小人離散誰實任其咎哉刑罰不中則無以懲惡而君子病矣子曰放於利而行多怨放者放縱之放利欲之心如水滔滔窒之猶恐其弗止况放而行之乎利之行怨之歸也子曰能以禮讓為國乎何有不能以禮讓為國如禮何何有言不難也辭遜成風自然順治不然則陵奪之習勝矣如禮何子曰不患無位患所以立不患莫已知求為可知也立與可知指君子自治之實耳非為外也無位為患則所謂立者必荒患莫已知則所以可知者必略立者確乎不可拔之名是所學實事即所謂可知者也子曰參乎吾道一以貫之曾子曰唯上聲子出門人問曰何謂也曾子曰夫子之道忠恕而已矣參乎者呼曾子名而語之也貫通也唯者默喻而深領之辭門人者曽子之門人也這箇不是事事物物上鬭合得來㑹得後自然光明洞徹無所不通本一貫也非貫之而後一也夫子以一貫語曾子直是指得清切曾子以忠恕答門人直是斷得清切不清切後一唯字如何撰得出後學不悟本一之㫖直向事物上逐項尋討安得曾子者而論忠恕哉子曰君子喻於義小人喻於利喻者深明其㫖深知其味者也不幸志趣一差到喻後如何住得桑𢎞羊之徒算析秋毫至死不悔可憐也已子曰見賢思齊焉見不賢而內自省悉井切也思齊則遷善內省則改過賢不賢皆吾師也子曰事父母幾諫見志不從又敬不違勞而不怨幾微也迎其未形便當救止既形則過已顯無及矣微察其不然便不敢拂才拂則意已傷難再進矣既能如此委曲又須勞而不怨所謂怨者非必形之辭色也心之隱微稍有不足便不可為人子者所宜深體子曰父母在不逺遊遊必有方朝往暮未還已重倚門之望逺遊與不知方所父母之心何如哉又况事親之道種種未便子曰三年無改於父之道可謂孝矣己見首篇子曰父母之年不可不知也一則以喜一則以懼父母之年安有不知所貴於知者欲其以喜懼為心也不然則知猶不知耳徒記得某甲某乙濟甚事子曰古者言之不出恥躬之不逮也逮及也以躬行不逮為恥敢易言乎玩不出二字隱然有為之關鍵者子曰以約失之者鮮上聲矣約不放逸也約則有守自然寡過才放逸便失了子曰君子欲訥於言而敏於行去聲實見實履不在言語上子曰德不孤必有鄰易曰敬義立而德不孤不孤者此德之盛也有鄰者同德之應也德不孤則必有鄰矣子游曰事君數色角切下同斯辱矣朋友數斯疏矣數者屑屑不憚煩之謂也朝夕訥誨方謂之忠切切偲偲方謂之益則何者謂之數乎融堂四書管見卷二
