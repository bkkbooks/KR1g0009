body:
  text: 融堂四書管見卷十一宋錢時撰古文孝經先儒謂孔氏之家取先世孝經定本與尚書論語同藏屋壁遭秦滅學天下之書掃地無遺漢興河間顔芝之子出十八章是為今文及魯恭王壞孔子宅而古文始出凡二十二章時今文之學已盛反遭排詆不得列於學官獨孔安國及後漢馬融為之傳諸儒黨同疾異信僞疑真孤學沈厭人無知者隋開皇中祕學生王逸於陳人處得之河間劉炫為作稽疑一篇時人多譏笑者唐明皇開元中詔議孔鄭二家劉知幾以為宜行孔廢鄭爭難蜂起卒行鄭學自明皇自注遂用十八章為定愚觀孔安國尚書序至其餘錯亂磨滅不可復知之語未嘗不悵然太息使其可知則百篇之義當不止於五十有九矣此書二十二章與之同出幸且無恙而忍排詆之乎今文與古異者雖亦無幾而辭乖義舛謬為標目鄙淺特甚大失先聖從容問答之㫖安可苟狥也本朝列聖以孝治天下篤生賢哲大道昌明獨於古文一書知所崇尚後生晚學敢不懋哉仲尼女夷切閒音間居曾子侍坐子曰參所林切先王有至德要因妙切道以順天下民用和睦上下無怨女音汝下同知之乎仲尼孔子字也閒居燕居也曾子名參字子輿至德者德之至要道者道之要也上下槩言尊卑長幼夫子將語曾子以孝故先提至德要道稱贊而問之德者得其本心之謂道者無所不通之名非德之外又有道也得此為德行此為道非二物也書曰惟皇上帝降衷于下民若有恆性克綏厥猷惟后人人皆同此性皆具此道德惟無以若之而反害之是以意我藩籬血氣用事乖爭陵犯相挻以逞而怨仇交作矣先王盛世非外立一法强民使從已也亦曰有至德要道以順乎天下不拂亂其所固有而已性本和也本睦也尊卑長幼本相愛悅也同然之感如響報聲民心翕從行乎大順盎然天地間皆春風和氣矣何怨之有哉曾子避席曰參不敏何足以知之子曰夫音扶孝德之本教之所由生古者席地而坐師有問避席起答禮也不敏言遲鈍也何足以知言不明所問至德要道之㫖也此則論至德要道之在孝矣得乎本心無不是德何以曰至順此而行無不是道何以曰要蓋孩提之童知愛其親良知良能匪慮匪學未聞外此而他有所謂德者是德之本也故曰至德極至之謂也教所以闡明斯道為風化之大原未聞有外於此而他有所謂教者是教之所由生也故曰要道樞機之謂也此二語一書之綱節節發揮無非此㫖復如字坐吾語牛據切女身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也曾子起對故使復坐而語之體四肢也膚肌膚也毁虧壞也此方語曾子所以為孝者如此也三復不敢毁傷一語為之感愴不顧父母遺體逞情欲鬬血氣輕生而弗之恤者只為敢後遂無所不至凛然兢懼常懷不敢之心則凡起居飲食交事應物隱若手提鋩刃將加乎父母之身也安敢縱乎一髮膚之微毁傷之且不敢况敢冒危犯險以投憲網沈迷湛溺以自天閼其生乎此為人子者第一先務故曰孝之始雖然是特形體耳父母全而生之子全而歸之非特形體之謂也本性本善本心本良渾然天成本無虧缺保養不失毋忝所生方是立身順此而行須臾靡懈方是行道立身行道而名或不揚於後世猶是工夫有缺抑猶未也實孚而名揚身沒而不泯父母由我有光榮焉始了為人子者之事故曰孝之終夫音扶孝始於事親中於事君終於立身大雅云無念爾祖聿尹吉切修厥德大雅詩文王篇聿發語辭此又申明立身之㫖也夫所謂孝者始於事親而已豈但左右無違而謂之事親乎中焉事君能盡其忠即所以孝於親也然而立身上或有未慊則所謂全而歸之者不無可議故必終於立身而後可也立身如何修德是已修德則不昧其本性之善不失其本心之良清明融怡俯仰無愧直至於此方為盡孝道焉故文王篇謂無念爾祖可乎亦聿修厥德耳右第一章子曰愛親者不敢惡於人敬親者不敢慢於人愛敬盡津忍切於事親而德教加於百姓刑于四海蓋天子之孝甫刑云一人有慶兆民賴之上章已止故再書子曰以明更端親謂父母也德教即上章所謂德之本教之所由生刑乃刑于寡妻之刑言為之法則也天子言為天之子甫刑吕刑也吕侯之後改封於甫故因以云慶吉慶也賴依賴也此下五章則開陳自天子以至於庶人其孝如此前章所謂先王有至德要道以順天下豈徒為之立說區區空言以詔天下乎伊尹曰立愛惟親立敬惟長始于邦家終于四海實德實行施由親始不可誣也故此論天子之孝申明而發揮之孩提之童知愛其親是愛親之心天下人人之所同也及其長也知敬其兄是敬親之心亦天下人人之所同也一念愛敬則凡有親者皆可愛可敬矣何者而敢惡乎何者而敢輕慢之乎古之人所以俯臨民上若赤子之保如大祭之承者非外施此於天下也即我愛親敬親之心自然有所不敢也是故愛敬之實的的盡於事親略無缺缺不滿之處則此德之教加於百姓舉凡四海是則是效而莫不一於愛敬矣莫不一於愛敬而四海之孝皆天子之孝矣此一人有慶兆民之所以賴也愛敬不盡不祥莫大焉何慶之有何賴之有右第二章在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴滿而不溢所以長守富富貴不離力智切其身然後能保其社稷而和其民人蓋諸侯之孝詩云戰戰兢兢如臨深淵如履薄氷制節制財用之節謹度不越法度溢者滿而泛溢也社土神稷穀神諸侯有國則祭之民庶民人者有位之人書曰在知人在安民諸侯列國之君詩小雅小旻篇戰戰恐懼兢兢戒謹臨深恐墜履冰恐陷也魯君自謂寡人生於深宫之內長於婦人之手未嘗知憂未嘗知哀未嘗知勞未嘗知懼嗚呼此驕奢之病根也有國之主狃於富貴以驕奢為當然殊不知驕未有不危奢未有不溢危且溢傾敗隨至富貴非我有矣可長守乎夫子此章拳拳富貴不離其身正切人情所欲而言警動極有力非徒守富貴為身計也富貴者先君受之天子以遺其後嗣以保社稷和民人繼繼相傳而不絶者豈一己私物可取為恣情縱欲之具也天子之命於汝而墜先君之世於汝而斬富貴不守社稷為墟謂之孝可乎分茅胙土俾有社稷其實正在和民人耳一和字其責甚重才不和便失分任司牧之意便失代天理物之意和民人就保社稷上看保社稷就長守富貴上看長守富貴就不驕不奢上看不驕奢當就戰戰兢兢上看戰戰兢兢凜乎如深淵之臨薄冰之履安敢放逸不放逸自然恭安得驕自然儉安得奢不驕不奢不危不溢則道心無纍天德內融變化云為無非大順而民人上下莫不一於和矣此雖論諸侯之孝與君天下初無異道故周公首戒成王無逸欲知稼穡之艱難右第三章非先王之法服不敢服非先王之法言不敢道非先王之德行下孟切不敢行是故非法不言非道不行口無擇言身無擇行下孟切下同言滿天下無口過行滿天下無怨惡烏路切三者備矣然後能守其宗廟蓋卿大夫之孝詩云夙夜匪懈佳賣切以事一人法服者先王所制禮服也法言者法度之言德行者有德之行也無擇所言所行皆是一無可揀擇也三者服言行也宗廟卿大夫立三廟以奉祖先卿六卿大夫二十七大夫詩大雅蒸民篇夙早懈息一人謂天子也不敢二字人心之大間反躬修省此其律也經曰不敢康曰不敢荒寧曰不敢自暇自逸曰不敢盤于遊田而此書亦每每嚴斯戒自古亂臣賊子造一切滔天罪狀都只就敢上做出苟敢矣復何所忌憚也哉服者身之表未有君子而小人之服者亦未有小人而君子之服者先王垂範莫不有制蓋甚嚴也一違其制即僭奢無章矣言曰法言行曰德行先王豈外人心以為教哉不失其本心則言無非法行無非德言而非先王之法即無稽矣邪說誣民妄僞馳騁矣行而非先王之德即僞行矣為比德為惡德為凶德無所不至矣於斯三者凛然懷不敢之心自然不蹈其非是故非法則不言非道則不行也前曰德行此言非道不行以明德與行非二致是故之下獨舉言行而不及服蓋非法服不敢服即止矣他無所用其力也若夫德行則於反躬修省尚多工夫非法不言而或有可擇之言未可也直是口無擇言而至於言滿天下略無口過方盡善也非道不行而或有可擇之行未可也直是身無擇行而至於行滿天下無怨無惡方盡善也曰服曰言曰行如上所陳無一不偹然後始能守其宗廟為卿大夫之孝愚端誦此章至於言滿天下無口過行滿天下無怨惡未嘗不為之感嘆夫立乎人之本朝佐天子理四海一言之失一行之虧關國體之安危係民生之休戚於我乎在豈細事也必夙夜匪懈以事一人而後可也用力微懈即怠即放種種皆差右第四章資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其爵祿而守其祭祀蓋士之孝詩云夙興夜寐無忝吐簟切爾所生資取也言孝則兼愛敬長謂官之長也事其上兼言君長詩小雅小宛篇忝辱也所生謂父母也非謂於母但愛而不敬也母子恩勝故取其愛亦非於君但敬而不愛也君臣分嚴故取其敬若父則兼愛敬而適均此皆人道之大凡因其至情開陳之為下文作凖的以示訓也為士者不専主敬而以孝親之心事君則無不忠矣以敬君之心事長則無不順矣忠順兩盡略無缺失以事其君長然後始能保爵祿而守祭祀為士之孝也此其工夫全在無忝所生上父母全而生之渾然天成至粹至美木無不敬本無不愛本無不忠本無不順直是夙興夜寐戰戰兢兢無須臾微懈方是無忝平居暇日暗室屋漏工夫不繼有歉於心到事父事母事君事長時乃始曰是宜敬也是宜愛也是宜忠宜順也則十二時內有忝所生多矣謂之孝可乎末舉詩云最宜深玩此㫖當卿大夫通看臣之事君初無異道士卑故又言事長右第五章子曰用天之道因地之利謹身節用以養羊尚切父母此庶人之孝小止而再言故又記子曰因天之道不失其耕種之時也因地之利不失其地之所宜種也謹身不敢妄作節用不敢妄費治古之世所以比屋可封人人有士君子之行者豈農夫小民皆修德學道之士也哉因天而不失其時因地而不失其利又不妄作近刑戮不妄費致凍餒是雖利用出入由之而不知至若所以因所以謹所以節則未嘗非道也如是以養其父母亦可無憾矣後世號為士者往往不屑於力農或反遊蕩日浮侈縱而不知檢身既汚辱家亦破亡非特無以養父母且危父母矣視庶人之所謂孝何如也右第六章故自天子至於庶人孝無終始而患不及者未之有也無終始言於孝道不能有終始也患禍也總承五章之後復言終始之義警䇿尤更深切如上所陳而不一一各盡其道固不可或者有始而不能有終則亦未有不及於禍者且愛敬者德教之原也德教者治安之本也本原一失喪亂之端四海將不可保而禍及身矣豈但無以刑四海而已哉曰諸侯曰卿大夫曰士庶人莫不皆爾聖訓厯厯昭如日星即事證言合若符契未之有謂必至無幸也可不懼諸可不鑒諸右第七章曾子曰甚哉孝之大也子曰夫音扶孝天之經地之義民之行下孟切天地之經而民是則之因天之明因地之義以順天下是以其教不肅而成其政不嚴而治經常也義宜也則法也明者昭然顯著也曾子聞自天子至庶人其孝如此而無終始則有禍忽發甚哉之嘆稱孝道之大夫子知其已明斯㫖於是又推三才之一致而申明先王之德教如此焉夫人但知善父母為孝安知天之所謂經者即此孝乎安知地之所謂義者即此孝乎記曰天有四時春秋冬夏風雨霜露無非教也知其為教則知其為經矣地載神氣神氣風霆風霆流形庶物露生無非教也知其為教則知其為義矣在天曰經在地曰義在民曰行一也無二致也天地之經而民是則之此一是字正指天地之經而言豈天地之經在彼而民强則之於此哉天即吾心也地即吾心也孩提知愛不學而能即所謂經也意蔽情昏始支始離是故不可以不則焉則之如何以此經為凖的使不失其因天之明因地之義以順天下所以使之則也始言天經地義次言天地之經後又變經言明以見義即經經即明昭然灼然非二道也因字最宜細玩聖人亦豈外立一教以强民哉天地之經人心所固有因其固有而道之所以順天下也今文天明之上不曰因而曰則因地之下不曰義而曰利失其㫖矣惟因故順惟順故其教不肅而成其政不嚴而治故凡後世愈肅而愈不成愈嚴而愈不治者不順故也由外鑠我而不因其本心故也至哉因乎非聖人其孰明之先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以德義而民興行下孟切先之以敬讓而民不爭導之以禮樂而民和睦示之以好呼報切惡烏路切而民知禁詩云赫赫火白切師尹民具爾瞻先者躬行於己以率先之博愛言無所不愛也遺忘也陳見於政事導迪之使行也禮防人僞樂養人心故和睦好言所好在善惡言所惡在不善知禁知所禁忌而不敢犯也詩小雅節南山篇赫赫顯明也師尹太師尹氏也具俱也先王見不肅而成不嚴而治而教之可以化民如此故但先之以博愛而民自然莫遺其親但陳之以德義而民自然興行但先之以敬讓而民自然不爭但導之以禮樂而民自然和睦但示之以好惡而民自然知禁以順天下此之謂也太師尹氏赫赫于上民且莫不於爾而觀瞻况人主天下表儀因其所固有而順導之德之流行速於置郵而傳命焉可誣也焉可强也此與首章至德要道及次章德教加於百姓相發揮正所謂天子之孝愛親者不敢惡於人故博愛施由親始非無差等云也無差等者墨氏之說也浮屠氏之教也韓文公便指博愛為仁大差右第八章子曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡鰥古頑切而况於士民乎故得百姓之歡心以事其先君治家者不敢失於臣妾而况於妻子乎故得人之歡心以事其親夫然故生則親安之祭則鬼享之享許丈切是以天下和平災害不生禍亂不作故明王之以孝治天下也如此詩云有覺德行下孟切四國順之明王明德之王也遺忘也公侯伯子男五等諸侯也治國謂諸侯老而無妻曰鰥老而無夫曰寡治家謂卿大夫臣家臣詩大雅抑之篇覺悟也四國四方國也前言德教加於百姓其㫖詳矣然天子之孝又莫大於得萬國之歡心以事其先王而諸侯之孝又莫大於得百姓之歡心以事其先君卿大夫之孝又莫大於得人之歡心以事其親於此特變先王而稱明王以發斯義明者本心洞然略無微蔽故其以孝治天下也公平一視略無偏黨之私焉巍巍大君下視小國之臣最易忘也而不敢遺况建邦設都為五等之諸侯者乎是以人心感悅萬國攸同莫不歡欣愛戴乎我而我得以事其先王也諸侯之於國卿大夫之於家事先君事親遞遞皆然而其要㫖只在不遺不侮不失上然此章専論明王孝治天下而併及治國治家者何也蓋天下一心風化一原明王在上而卿大夫無以得人之歡心諸侯無以得百姓之歡心則是天下之大體有虧而所謂孝治者猶未盡也直是治國者無愧於事先君治家者無愧於事親方為大同之化夫然故以之事生則親亦歡心也自然安以之奉祭祀則鬼亦歡心也自然享普天之下陶陶然皆春風和氣略無纎毫乖戾災害自無由生略無纎毫違怨禍亂自無由作此明王孝治之極功也故復總結之曰故明王之孝治天下如此雖然徒謂之德行而實未有覺則亦不能動人矣惟有覺之德行常覺常明同心同感四國之所以順也有覺正謂明王右第九章曾子曰敢問聖人之德其無以加于孝乎子曰天地之性人為貴人之行下孟切莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來助祭夫音扶聖人之德又何以加於孝乎嚴尊敬也郊圓丘祀天后稷名棄堯舉為農卿舜曰汝后稷播時百榖封於邰為周始祖十五世至王季生文王祖有功而宗有德故宗祀文王也明堂天子布政之宫居國南是陽明之地故曰明堂上帝即天非有二也以主宰言之則謂之帝耳故經言昊天上帝說者頗多曲為分别殊不觀宗祀文王於明堂以配上帝正是嚴父配天之實證豈二也哉曾子猶有其乎之問是猶未真知孝之為大也夫子於是又推而言之大傳曰易有太極是生兩儀太極即性也天地萬物皆於此乎出也有天地而後萬物形於其間因指萬物曰天地之性豈天地有此性而分以授萬物哉萬物即天地也無二性也無先後之間彼此之殊也故曰明目視之不可見傾耳聽之不可聞明此不可見聞之㫖可與言性矣惟人也獨於其中稟五行之秀為萬物之美而又莫貴焉然所貴於人者以其孩提知愛知有親也人而不孝與草木無異與禽獸無異故人之行又莫大於孝焉善事父母皆孝也然有父而後有母易象乾坤服分齊斬固不同也而孝又莫大於嚴父尊嚴其父至於配天則至矣故又莫大於配天焉昔之人有行之者其周公乎非嚴父配天之事皆不周公若也蓋其禮自周公居攝而始備是以四海之內各以其職來助祭所謂得萬國之歡心以事其先王此之謂也然則聖人之德又何以加於孝乎嚴父而上人人所同若夫配天則天子之事舉其極盛者言之下文乃發揮嚴父之㫖而申明聖人之教所以順天下者如此也故親生之膝星七切下以養羊尚切父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也孩提之愛是親愛之心已生於在膝下之時日嚴者日長一日漸知尊嚴父母也本謂本性方在膝下而親愛自生及漸知養而尊嚴日至此非慮而知也非旋學於外而能也本有之性則然也聖人灼知此性人人所同於是因其嚴而教之敬敬則無須臾微懈而所謂日嚴之心常不失矣因其親而教之愛愛則無意念微纍而所謂生於膝下之心常不替矣故夫聖人之教所以雖不肅而自成雖不嚴而自治者豈有他哉因嚴因親皆其本有之性故也右第十章子曰父子之道天性君臣之義父母生之續莫大焉君親臨之厚莫重焉續繼續不絶也親有君之尊故曰君親臨臨其上也此又承上文所因者本而發之父子之道乃其天性自然如此孩提知愛其親豈學而能慮而知哉所謂本也凡處父子而失其道者欲念昏之情僞奪之血氣亂之非其本性然也有能於此不使外物為心害則天性昭昭而父子之道得矣安有不孝者哉且尊卑相承又有君臣之義家人所謂嚴君焉者非可瀆也况父母生之不特今日得有此身而已繼繼綿綿終古不絶其為嗣續莫此為大而又君親之尊臨覆在上其為恩義之厚莫此為重然則為人子者烏可以不盡孝道也夫子此章發明父母事體最為深切觀其答期可之問止曰子生三年然後免於父母之懷而不他及則宰我之與曾子地步可知矣右第十一章子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善皆在於凶德雖得之君子所不貴君子則不然言斯可道行下孟切斯可樂音洛德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行政令詩云淑人君子其儀不忒他得切悖亂也容止儀容舉止象似也詩曹風鳲鳩篇淑善忒差也此亦専言德教在愛敬其親上至稱君子而曰進退可度則是槩論凡有國有家者矣夫愛親者德也不愛其親反愛他人是謂悖德敬親者禮也不敬其親而反敬他人是謂悖禮先王德教惟曰以順天下而已今以其順則既逆之民何所取法乎世衰俗薄家人父子戚然而相仇往往疏者反親淫朋比德反不翅若骨肉詡詡取下相媚恱以為容此曾禽犢之不若豈足多罪若方外異端之學自謂有志於道者而乃斷棄綱常離絶倫類然後方入其學不知所謂道何道也其實則不在於善皆在於凶德耳雖得之君子所不貴凶德二字結正罪狀甚嚴然則學不本於經世斬然自立於名教之外者可不懼哉君子不然言則便須可道不可道非嘉言也行則便須可樂不可樂非善行也可道可樂言行之凖的最宜深味東平王謂為善最樂夫為善之人身心舒泰夙興夜寐無非大順是故樂莫樂於為善行身不義舉錯乖方為公論所不容為大法所不宥惴惴朝夕如坐囹圄樂乎不樂乎德義至於可尊則實孚而望隆矣作事至於可法則時措而皆合矣容止至於可觀進退至於可度則動作出處舉無一之不中節矣無斯須放逸無毫釐差失與前所謂凶德正相反矣以是而臨乎民上是以其民不特畏敬且愛慕之莫不相與則效而求似其所為焉無他順故也此德教之所以能成而政令之所以行也淑人正在於善而不在於凶德者容止進退是謂其儀右第十二章子曰孝子之事親居則致其敬養羊尚切則致其樂音洛病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵此三者不除雖日用三牲之養猶為不孝也居平居無事時也致極也盡也養飲食之奉樂悅其志也亂謂凡逆亂不順之事醜同類已之等夷也兵者兵刃相加也三牲牛羊豕謂大牢也此下數章多敷明首章之㫖而此章則所謂始於事親者也五箇致字當就本心上看發於本心如四時錯行日月代明自然莫不中節有纎毫意念即蔽即虧即支即離安能無所不盡其至也子遊固習聞致哀之語但才說致乎哀而止便有病五者皆備是養生喪死種種略無缺失然後方謂之能事親雖然又不可不知所戒也居人上當戒於驕驕則亡矣為人下當戒於亂亂則刑矣在等夷儕伍之中當戒於爭爭則將以兵刃相加矣此三者不去皆喪身危父母之道雖日用大牢具奉口體猶為不孝甚言三者之不可有也右第十三章子曰五刑之屬三千而罪莫大於不孝要一遙切君者無上非聖人者無法非孝者無親此大亂之道也三千即墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之屬二百也要者有所挾而求上君上也非者不然之也此承上章而極言不孝之罪如此其大也夫君者尊無二上豈可要乎而敢要之是無君矣聖人者大法之所自出豈可非乎而敢非之是無法矣孝者人子事親之實德又可非乎而敢非之是無親矣無上無法無親皆三綱五常之所為不立而人紀之所由以壞者是致大亂之道也一箇孝字才謂之不然便是無親與無上無法同名大亂况真不孝乎此正形容不孝之罪所以莫大者如此右第十四章子曰教民親愛莫善於孝教民禮順莫善於弟大計切移風易俗莫善於樂安上治民莫善於禮禮者敬而已矣故敬其父則子悅敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡而悅者衆此之謂要道此則敷明要道矣首章專主於孝而此兼言孝弟禮樂併及父子兄弟君臣以廣要道之㫖發揮旁通周遍普洽無往而非孝也樂之感人最深且速感淫哇之音即邪心生感中正之音即善心生故移風易俗莫善於樂易曰上天下澤履君子以辨上下定民志几文為制度之節皆天則之自然居上而無禮則危居下而無禮則亂矣故安上治民莫善於禮夫子並舉四條乃獨於禮下申明其說見得要道在於行教而教道之行却全在禮然禮豈徒玉帛之云哉所以行吾敬也孩提知愛誰無敬父之心長而知敬誰無敬兄之心主憂臣辱主辱臣死元首在上資爾股肱誰無敬君之心蓋未有敬其父而子不悅者非特其子悅之凡為人子者皆悅矣未有敬其兄而弟不悅者非特其弟悅之凡為人弟者皆恱矣未有敬其君而臣不恱者非特其臣悅之凡為人臣者皆恱矣此心同也此理同也同然之感應如響報聲不期而自應也是故敬一人而千萬人悅雖所敬者寡而恱者衆夫是之謂要道也右第十五章子曰君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者教以弟所以敬天下之為人兄者教以臣所以敬天下之為人君者詩云豈苦在切弟待禮切君子民之父母非至德其孰能順民如此其大者乎家至一一皆至其家也日見逐日見其人也詩大雅泂酌篇豈弟樂易也此則敷明至德矣首章先至德次要道推而達之也此則先要道後至德遡而求之也前章曰敬曰恱此章曰教曰敬教而敬敬而恱次第參考而所謂德之本教之所由生其㫖昭昭矣夫君子之教人以孝豈一一皆至其家日日面見而諭之哉教以孝所以敬天下之為人父蓋未有敬其父而子不恱者與前章正相應斯感斯化翕然大同自有不約而孚不言而喻耳教以弟教以臣皆然此君子所以豈弟于上而民父母之無他人皆有此至德故也君子以至德順民所以感其同然之心而莫不一於順也苟非至德則要之於此而違於彼强之於東而叛於西矣安能順民如此其大者乎右第十六章子曰昔者明王事父孝故事天明事母孝故事地察長丁丈切幼順故上下治天明地察神明彰矣明察皆謂曉達也長幼者言乎其家上下者言乎其國神明即天地之妙此又承至德要道順民如此其大而極言無所不通之㫖人知父母吾父母耳安知父母之即天地也何者已之心即父母之心父母之心即天地之心凡未明所以事天地是未明所以為父母也未明所以為父母是未明所以為己之心也惟昔明王洞然無蔽與未明者之事父母不同其事父孝而事天者便明通天於父也其事母孝而事地者便察通地於母也一家之長幼順若上若下便自然治通國於家也夫事父母而至於天地明察則神明之妙昭然灼然變化無方不離日用矣是豈髙深幽逺在吾心之外也哉神而曰明以表非隱昏者自蔽覺者自知故雖天子必有尊也言有父也必有先也言有兄也宗廟至敬不忘親也修身慎行恐辱親也宗廟致敬鬼神著矣天子祀明堂釋奠先老有尊也食三老五更有先也上節大㫖在通乎天地故結語他皆略之惟曰天地明察神明彰矣此節大㫖在通乎鬼神故結語他皆略之惟曰宗廟致敬鬼神著矣觀書者先明乎此而後聖訓可通也先儒謂天子至尊繼世居長宜若無所施其孝弟者而必有所尊以言其有父焉必有所先以言其有兄焉致敬宗廟事死如生無須臾而忘其親又恐身不修行不謹將傾將覆以辱其所自出而不敢不勉焉此皆事親實用力之地也夫事親而致敬於宗廟豈徒犧牲粢盛區區禮文之末哉敬則此心清明周旋俯仰無非妙用而鬼神之德昭昭矣孝弟之至通於神明光於四海無所不通詩云自西自東自南自北無思不服至極也詩大雅文王有聲篇思念也此乃總結上文兩節之㫖孟子曰堯舜之道孝弟而已矣又曰堯舜與人同四海同也萬古同也天地同也鬼神同也此道本同而有不通者孝弟未至也苟至矣即通於神明矣豈惟神明吾本心之光含覆無外而且無所不通矣是故自西自東自南自北而翕然大同無一念慮之不我服者服其所同然故也此章極論孝弟之至無所不通而首以明王為言明即至矣至即通矣嗚呼㫖哉愚嘗因是觀曾子書有居處不莊非孝也朋友不信非孝也事君不忠非孝也蒞官不敬非孝也戰陳無勇非孝也五行不遂菑及於身敢不敬乎又曰仁者仁此者也義者宜此者也忠者忠此者也信者信此者也禮者履此者也行者行此者也彊者彊此者也樂自順此生刑自反此作夫孝天之大經也夫孝置之而塞於天地行之而衝於四海施諸後世而無朝夕推而放諸東海而凖推而放諸西海而凖推而放諸南海而凖推而放諸北海而凖然則曾子服行師訓其庶矣乎雖然食息居處動靜語默無一時之非孝無一刻之非孝何置何行何塞何衝之可言也恐記者誤右第十七章子曰君子之事親孝故忠可移於君事兄弟故順可移於長丁丈切居家理故治可移於官是以行下孟切成於內而名立於後世矣長官之長也理者有倫而不亂內謂閨門之內也此則所謂立身揚名而與第五章士之孝相表裏也前言明王此言君子前言君道此言臣道明王與君子固不侔而君子之事則又大非常人比矣常人之孝未必便可移於君常人之弟未必便可移於長常人之居家理未必便可移於官無他不明故也君子之心通達無蔽孝親即忠君弟兄即順長理家即治官惟無所不通是以無所不可移非真知此道本一無二將見觸事牆面東窒而西礙矣如之何其可移哉惟可移方是行之成處方是變通不窮經世有用之學是以行成於內而名立於後世自然不泯謂之行成於內則雖窮居約處不見其用而名固未嘗不立也雖不用猶用也夫子答奚不為政之問正是此㫖右第十八章子曰閨門之內具禮矣乎嚴父嚴兄妻子臣妾猶百姓徒役也宫中之門其小者謂之閨具禮言治國平天下之禮皆具也徒役皂牧也此正發明上章所以可移者如此具禮二字最宜深玩古先聖王立大經明大法所以維持三綱五常於不壞者禮而已矣詩云人而無禮胡不遄死言有生之不如無生也志曰人而無禮則近於禽獸言人紀散亂世道陵遲尊卑長幼混然與蠢蠢羽毛而爭食者無以異也唐明皇時誣詆古文謬謂閨門一章鄙俗不可行嗚呼豈唐之君臣所能知哉嚴父之禮即可移於君者嚴兄之禮即可移於長者妻子臣妾之禮猶百姓徒役然即所謂可移於官者右第十九章曾子曰若夫音扶慈愛恭敬安親揚名參聞命矣敢問從父之令可謂孝乎子曰是何言與音余下同是何言與言之不通也昔者天子有爭音諍下同臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離力智切於令名父有爭子則身不陷於不義安親謂生則親安之聞命謂此數者已聞夫子之教從父命謂一於順從也爭謂諫止其失也曾子苟通慈愛恭敬安親揚名之㫖則無此問矣夫子重提是何言與而責其言之不通所以警䇿之也自古人主未有無道而不亡者此言雖無道不失其天下非謂果以無道而不失也蓋有人焉正救之則過惡不形端萌遂窒一反其無道而為有道之事斯其所以不失耳乃若繩愆糾謬左右無人拒諫飾非剛愎自用則喪無日矣雖無道三字所以甚言諫諍之不可無也雖無道而且不失苟未至無道而忠讜日聞則其為益何如哉有國有家莫不皆然以至爭友爭子皆人道所斷斷不可缺者友不爭而使令名之不保固友之罪也子不爭而使陷身於不義非父自陷子實陷之是奚可也故當不義則子不可以弗爭於父臣不可以弗爭於君故當不義則爭之從父之令焉於䖍切得為孝乎觀此書所告有曰以孝事君則忠曰事父孝則忠可移於君所謂忠者豈逢迎苟狥之謂乎知逢迎苟狥之非忠則知逢迎苟狥之非孝矣曾子至此乃復以從父之令為問則不惟不通於孝是固未通於忠也夫子責其言之不通而於章末特與君父並言最為明切右第二十章子曰君子事上進思盡忠退思補過將順其美匡救其惡故上下能相親詩云心乎愛矣遐不謂矣中心藏之何日忘之補過補君之過也蒸民詩衮職有闕維仲山甫補之將助也匡正也詩小雅隰桑篇心乎者一心乎愛也遐逺也謂猶言也復承上章專明人臣忠君之義以形容為人子者不當一於從令也君子之事上進侍左右則思盡己之忠退而家居常思補君之過若夫美德固宜奉承至於惡行而亦奉承可乎隨即正救而止絶之矣易曰上下交而其志通此上下之所以交而志通也此所以能相親者也苟心知其非謬以為是阿諛順㫖逢君於昏則賊矣豈相親之道也哉為人子者深味能相親之言將順正救並行而不悖庶乎其可矣雖然非中心親愛念念不忘不能爾也故援詩以證之他日曾子答單居離之問曰父母若行中道則從若不行中道則諫諫而不用行之如由己出從而不諫非孝也諫而不從亦非孝也孝子之諫達善而不敢爭辨爭辨者作亂之所由興也正合夫子斯訓右第二十一章子曰孝子之喪親哭不偯於豈切禮無容言不文服美不安聞樂不樂音洛食㫖不甘此哀戚之情三日而食教民無以死傷生毁不滅性此聖人之政喪不過三年示民有終為之棺音官槨音郭衣衾而舉之陳其簠音甫簋音軌而哀戚之劈婢亦切踊音勇哭泣哀以送之卜其宅兆而安厝之為之宗廟以享之春秋祭祀以時思之生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣喪親居親之喪也偯哭餘聲容容儀也文文華也美好也㫖美也周尸為棺周棺為槨衣斂衣衾被也舉謂舉尸而斂之也陳設也圓曰簠方曰簋皆黍稷器古以竹為之後世易之以木劈以手擊胸踊足躍于地送送葬也卜鑽龜而卜其凶吉也宅墓穴兆墓域也厝置也春秋包四時而言生民之本言民之生其本端在孝也喪則致其哀嘗提其綱矣然送終一節猶未詳也末章發之號痛氣竭自然不偯情緒荒迷自然無容觸事生哀自然不文方毁瘠華服自然不安方在疚聞樂自然不樂方茹苦美味自然不甘此哀戚之情發於本心有不知其然而然者宰我以期喪為可己子曰食夫稻衣夫錦於汝安乎曰安汝安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今汝安則為之罪之深矣禮親始死水漿不入口者三日三日而食是乃教民無以死者之故而傷其生雖甚毁瘠亦不至太迂以滅其性也本性本中是謂天則太過失性之正傷生以身言滅性以理言此聖人之政體制如此期而小祥再期而大祥祥一月而禫又一月而吉喪不過乎三年者又所以示民之居喪有終焉棺槨以下叙送終節奏之詳舉而斂斂而奠已而有祖有遣而送之以葬葬而虞虞而祔終喪而四時有祭夫人之生尊卑長少羣居乎天地之間與禽獸異者孝於父母而已生而不孝猶無生也是孝者生民之本也生事愛敬如前所陳死事哀戚如此所叙則生民之本庶乎其盡矣養生喪死之義庶乎其備矣養生喪死兩無遺憾而孝子事親之禮庶乎其能終矣右第二十二章融堂四書管見卷十一
