body:
  text: 融堂四書管見卷十宋錢時撰論語子張第十九子張曰士見危致命見得思義祭思敬䘮思哀其可已矣易曰君子以致命遂志致命者順天理之自然無幸生苟免之意耳非謂必於死也義者利之和哀敬者䘮祭之本於此不苟亦可以為士矣先師曰祭則人心自敬䘮則人心自哀此敬此哀不思自生皆道也子張曰執徳不𢎞信道不篤焉於䖍切下同能為有焉能為亡亡無同出入無時莫知其鄉者惟心之謂這裏非卓然一定之守則孰為有孰為無哉是故執徳不可以不𢎞信道不可以不篤𢎞則不廹篤則不懈力學之要㫖也子張斯言亦是他見得子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與平聲下同於人何所不容我之不賢與人将拒我如之何其拒人也可者與不可拒擇交之道也尊賢容衆嘉善矜不能大賢之事也以是責之初學則過矣拒字微峻子張所以起論學者雖不可不以子張之言為心且當以子夏之言為法子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也異端曲學亦豈無可觀然非大經大法所以建用皇極者安能達之天下百世以俟聖人而不惑乎故君子不為子夏曰日知其所亡亡無同月無忘其所能可謂好去聲學也已矣無謂己所未有能謂己所已能子言溫故而知新又以不遷怒不貳過賛顔子之好學與此所亡所能異矣子夏於道有覺為之不厭必不道此二字子夏曰博學而篤志切問而近思仁在其中矣學不博則狹陋篤志者心誠求之也問不切則泛濫近思者以身體之也先師云子夏好論精微而未識皜皜之妙知及方知仁守子夏曰百工居肆以成其事君子學以致其道肆造作之所致如善戰者致人之致誰能出不由户何莫由斯道也但百姓日用而不知耳學之而覺覺所固有何以致為哉猶云厥脩乃來非謂得之於外也子夏曰小人之過也必文或曰不能改過是以文答曰惟其文是以不改子夏曰君子有三變望之儼然即之也溫聽其言也厲盛徳之至自然儼自然溫自然厲本未始有變也隨所望即所聽而各不同耳子夏曰君子信而後勞其民未信則以為厲已也信而後諫未信則以為謗已也厲猶病也有所為於天下而使之盻盻然疑其上如之何而可哉所謂信非空言所可結也事實素著人心自孚耳後世有施信布信之論似非聖人氣象盤庚登進厥民敷心腹腎腸亦晚矣信而後諫不特君臣也凡交際之道莫不然子曰大徳不踰閑小徳出入可也徳者得也踰過也閑所以止物者洞明吾之所得者大兢兢仁守豈可踰閑若夫通於藝文習於度數之類乃小有得者此非所急但出入乎其間可也故夫子亦云游於藝又曰則以學文子游曰子夏之門人小子當灑色賣切掃應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言游過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别彼列切矣君子之道焉於䖍切可誣也有始有卒者其唯聖人乎倦卽誨人不倦之倦區猶類也精義入神之妙不離日用之間行之而著焉習矣而察焉自有不言而喻者初何本末之異哉謂可以當灑掃應對進退之末而本之所在不能如之何子游之言殆離而二之矣君子之道孰為先而傳孰為後而倦譬諸草木乃可區别之耳君子之道則焉可厚誣也有始有卒是盡得此理者其惟聖人乎深歎子游之未曉也子夏曰仕而優則學學而優則仕仕所以行其學者也子夏設為仕而優餘力則學抑學而優餘功則仕乎人多不務學而急於仕斯言所以警之子游曰䘮致乎哀而止臨䘮不哀固不可而有意於致哀抑豈情性之正哉先師謂夫子哭顔淵而慟初無致哀而止之意子游曰吾友張也為難能也然而未仁子張立行大抵過髙而不務實也曽子曰堂堂乎張也難與並為仁矣堂堂則事在威儀容貌耳必不能相規相警向本心上做工夫曽子曰吾聞諸夫子人未有自致者也必也親䘮乎良心之動自然而然者莫過於親䘮是故獨有此事不待勉强也自致猶云自盡推是心而為學則無不誠矣曽子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也孟莊子魯大夫仲孫速也其父獻子名蔑用舊人守舊政宜未為難也夫子論孟莊之孝獨於此稱其難能何哉只為作聰明喜紛更者鮮能念先人之舊典以致敗乃公事墜乃家聲者多矣於此二事守而不渝非深體親心不能爾也夫子所以特稱之孟獻子有賢譽亦是可以不改者孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜陽膚曽子弟子上失其道無以統屬斯人之心故輕犯法正可憐耳奈之何得其情而忍喜也一有喜心非疾惡而峻刑必逞威而輕殺哀矜勿喜四字真有視民如傷之意治獄者之龜鑑也子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉下流卑下之地也紂之不善初亦不如此之甚只為居於下流而衆惡歸焉是以至此極耳故君子必擇所立身之地也所立者善人未必從不幸而為小人之淵藪則以類至者如順流而下矣吁可畏哉子貢曰君子之過也如日月之食焉過也人皆見之更平聲也人皆仰之君子之過如日月之食最説得好葢觀瞻所係與庸常不同纔有一㸃過失人便指目然則不甘心以小人自命而人以君子望之者曷思皆見之可畏而嚴於自律哉雖然過即改之改則君子如初人皆仰之如初初不以其嘗有過而遂不許之為君子也味皆仰之㫖又豈可輕自棄乎衛公孫朝音潮問於子貢曰仲尼焉於䖍切學子貢曰文武之道未墜於地在人賢者識如字下同其大者不賢者識其小者莫不有文武之道焉夫子焉於䖍切不學而亦何常師之有公孫朝衛大夫焉何也焉不學言何所不學也其道甚大百物不廢或識其大或識其小莫不有文武之道焉是故夫子於禮於樂於官名以至於師襄之琴無所不學也何常師之有哉子貢答焉學之問則辨矣生知之聖有非學於人而得者惜未及之叔孫武叔語去聲大夫於朝音潮曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎武叔魯大夫名州仇及肩言低七尺為仞言髙夫子之云猶言如此説夫子非謂武叔也子貢為人大抵聰明發露必有動人耳目者故武叔竟以為賢於仲尼宫牆之喻切矣宗廟之美及百官之富自顔曽而下鮮能窺見者矣况他人乎故曰得其門者或寡此語却是子貢平時善㸔夫子深知地歩未到處叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量去聲也無以為猶言莫如此土髙曰丘大阜曰陵自絶言毁夫子乃自絶耳無傷於夫子也量分量也武叔以子貢賢於仲尼則其毁仲尼不足怪也真知若日月之照臨則不毁矣與之辨何益哉陳子禽謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為知去聲下同一言以為不知言不可不慎也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道去聲之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也階砌級也立植立也道教導也行聽順也綏安也來歸附也動鼓舞也和雍睦也榮光榮哀人哀之也子貢最善形容夫子或曰宫牆或曰日月或曰猶天之不可階而升而孟子獨斷之曰知足以知聖人汙豈聖人之為聖有非形容所可盡而所可形容者乃其所謂汙者耶觀此一語見孟子所到堯曰第二十堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天禄永終舜亦以命禹曰予小子履敢用𤣥牡敢昭吿于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬周有大賚來代切善人是富雖有周親不如仁人百姓有過在予一人謹權量審法度脩廢官四方之政行焉興滅國繼絶世舉逸民天下之民歸心焉所重民食䘮祭寛則得衆信則民任焉敏則有功公則説咨嗟歎聲厯數厯象更易之數猶云世數也本心虚明畧無偏倚是之謂中允執者守而弗失之名非真有物之可執也舜亦以此命禹辭見虞書曰予字下湯誥之辭履湯名也𤣥牡黒牡夏所尚未變其禮也有罪指桀帝臣言賢者乃上帝之臣不蔽顯揚也簡别也周有而下武王事賚予也富者禄之也周至也權稱錘也量斗斛也興滅繼絶謂封黄帝堯舜夏商之後舉逸民謂釋箕子囚復商容位也寛則得衆而下夫子之語也寛則為衆所歸信則為民所頼敏則與天同運故有功公則一視同仁故説此四者夫子所常言而帝王之所以治國平天下者也此章厯叙堯舜禹之相傳夏商周之相代如膺天命順民心用人才以至政治之纎悉舉不外乎執中之一言而終之以夫子之四語然則接去聖之統夀斯道之脉而為萬世之標準者端在於是此門弟子之所以識歟子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費芳味切勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂恵而不費子曰因民之所利而利之斯不亦恵而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉於䖍切貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出尺遂切納之吝謂之有司致期刻期也賊害也猶之如云等是出納之吝者吝於出納也上章寛信敏公大抵是言其存心處此章尊美屛惡大抵是見於行事處所欲者仁自然不貪不以衆寡小大而為之敢慢自然不驕不戒則難於責成矣慢令則難於刻期矣虐暴賊皆害人之名有司者吝於施與之謂知所尊又知所屏則君人之道孰外於此哉此夫子之聖政萬世之大法也子曰不知命無以為君子也不知禮無以立也不知言無以知人也命即天命首篇之首論人不知而不慍不亦君子乎終篇之終復言不知命無以為君子以此見得到不慍處非知命不能也學者學為君子耳於此事未能無疑則是與日用而不知者均之為凡民也何君子為哉知禮則視聽言動不妄所以立立其所以為君子者也知言則詖邪滛遁不欺所以知人知其所以為君子者也首篇自時習朋來而至於君子終篇由君子而至於知禮知言而學之始終備矣君子之本末明矣學者不能深求其㫖服膺其義則君子之棄而小人之歸也必矣嗚呼其懋戒哉融堂四書管見卷十
