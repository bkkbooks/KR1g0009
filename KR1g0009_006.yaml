body:
  text: 融堂四書管見卷六宋錢時撰論語先進第十一子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進先進後進猶言前輩晚輩也此非文質彬彬之君子乃後生晚輩之浮于文者以君子自命而反謂前輩為野耳前輩指先王盛時人物也夫子既從周之文矣曷為而又從先進乎從先進即所以從周也曰從周樂其文之盛曰從先進反其文之弊子曰從去聲我於陳蔡者皆不及門也徳行去聲顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏不及門言此時皆不在門也或謂夫子因材教人於此可見愚謂不然一元之氣渾浩流轉萬物之形色於其間者自各隨材而成就四科之目聖門初未嘗有如許分别也子曰回也非助我者也於吾言無所不說音悦有所疑難則因有所發眀心通内融言無不説何疑難之有曰非助我深喜之辭也子曰孝哉閔子騫人不間去聲於其父母昆弟之言間隙也父母兄弟無一毫之間人言何自而可間也非誠孝所積深信不疑未易至是不然浮言一入天屬為仇矣南容三去聲復白圭孔子以其兄之子妻去聲之詩大雅抑之篇曰白圭之玷尚可磨也斯言之玷不可為也三復者一日三復斯言事見家語斯言之玷尚知其不可為則出處進退必不苟然者矣此章與公冶長篇之言正相表裏聖門之擇壻以此哉季康子問弟子孰為好去聲學孔子對曰有顔回者好學不幸短命死矣今也則亡夫子兩稱顔回之好學而歎其短命以死使之得年則所到豈易量哉當時門弟子非盡游惰必若斯人而後謂之好學耳哀公君也對之特詳顔淵死顔路請子之車以為之椁子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也顔路淵之父名無繇少孔子六嵗亦受學焉椁外棺也請賣車以為之鯉孔子之子字伯魚時孔子已致仕尚從大夫之列易曰舎車而徒義弗乗也苟義不可以不乗安可舎之而徒行哉椁之有無車之用舎定於鯉死之日矣非於回而有吝也顔淵死子曰噫天䘮去聲予天䘮予噫傷痛聲斯道有傳雖千載之下猶夫子之未䘮也道在顔子而顔子死矣非天䘮夫子乎傷哉斯言可謂痛切顔淵死子哭之慟從去聲者曰子慟矣曰有慟乎非夫音扶人之為去聲下同慟而誰為慟哀甚也夫人謂顔淵夫子之慟不為他人發也何獨私於顔子哉從者怪其慟而夫子特未以為慟夫子殆非私也顔淵死門人欲厚葬之子曰不可門人厚葬之子曰回也視予猶父也予不得視猶子也非我也夫音扶二三子也死葬以禮謂之無違宜厚而薄宜薄而厚皆非禮也孰謂顔子之死而不以禮葬乎二三子襲世俗之陋重違師訓而納友於非禮夫子所以歎悼而深責之季路問事鬼神子曰未能事人焉於䖍切下同能事鬼敢問死曰未知生焉知死名有人鬼之異道無人鬼之異身有生死之殊道無生死之殊人鬼死生實一非二能事人則能事鬼矣知所以生則知所以死矣閔子侍側誾誾魚巾切如也子路行行胡浪切如也冉有子貢侃侃若但切如也子樂音洛先儒謂此有曰字若由也不得其死然誾誾侃侃釋見前篇行行剛强貌曰誾誾曰行行曰侃侃皆其情性自然也夫子所以樂之由也好勇逆知其不免示戒深矣而卒死孔悝之難悲矣魯人為長如字府閔子騫曰仍舊貫如之何何必改作子曰夫音扶人不言言必有中去聲長府藏名所以藏貨財為者改作之也仍因也貫事也從事府藏聚斂之門也問之以仍舊貫如之何又難之以何必改作閔子之意深矣言必有中如射中的子曰由之瑟奚為於丘之門門人不敬子路子曰由也升堂矣未入於室也家語謂子路鼓瑟有北鄙殺伐之聲觀子路行行氣象於和平之音必有不足奚為於丘之門非絶之也抑而進之也門人便不加敬則不知子路甚矣夫子之墻數仞得其門者葢寡由也升堂豈易得哉復指其所到之次第言之非特破門人之惑也何謂堂何謂室何以升何以入子貢問師與商也孰賢子曰師也過商也不及曰然則師愈與子曰過猶不及聖人之道至於中而止過與不及皆非也觀問交一章二子氣象可見季氏富於周公而求也為去聲之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也周公以叔父位冢宰若季氏諸侯之卿耳而富過之鳴鼓者聲其罪也冉有門人髙弟所以佐季氏者如此哉聚斂二字豈聖門所宜有與其有聚斂之臣寧有盜臣况富於周公而又附益之耶勢利汨於外得失亂其中波蕩從之恬不知恥殆不容於誅矣鳴鼓而攻何益於事謂之可者斥絶之辭柴也愚參也魯師也辟婢亦切由也喭五旦切柴姓髙字子羔孔子弟子家語言其足不履影啟蟄不殺方長不折執親之䘮泣血三年未嘗見齒避難而行不逕不竇盖質實愿慤之人也魯鈍也辟偏執也喭粗俗也曾子一唯正是以魯得之徃徃此事多就聰明上走作惟其魯所以其志篤其守固而有一旦脱然之悟也偏執粗俗工夫如何得到這上子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中去聲庶庶㡬也惟覺故空屢空者其覺不一也命天命也貨殖貨財生殖也億意度也空則心本洞然萬里昭徹無纎毫凝滯也方屢空所以庶㡬至於聖則空空矣命即此道也逆此曰方命復此曰即命逹此曰知命有意理財務植己私安能受命乎私意揣度縱或屢中非明睿所照也空則自明睿子張問善人之道子曰不踐迹亦不入於室踐迹實履也入於室者入善人之室也堂堂乎張未必實履徒問之何益所謂善人者念念無惡之人耳然非實履則亦不能自造其奥也踐迹二字正切子張之病箴之子曰論篤是與如字君子者乎色莊者乎與許也色莊者外貌莊嚴也聞人言論篤實而遂許之安知其為君子乎為色之莊者乎君子表裏如一辭氣之出固無不善而言論之可喜者恐未必皆君子耳子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之本心本中本無偏也抑其過勉其不及則中我自有豈待外求雖然聞斯行之見義勇為之謂耳若從季氏而所行如此豈夫子之所謂聞哉子畏於匡顔淵後子曰吾以女音汝為死矣曰子在回何敢死後謂相失在後敢死者奮身當難也不幸遇難回必為夫子死矣子在如之何而敢死乎玩一敢字則回之死不死係夫子之在不在義甚重一死甚輕季子然問仲由冉求可謂大臣與平聲子曰吾以子為異之問曾由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與平聲子曰弑父與君亦不從也子然季氏子弟異非常也曾乃也以道事君者合則留不合則去不然苟備位耳故曰具臣夫子發明大臣之義所以深罪二子季氏不道隱然可見子然因具臣之説遂有從之之問夫子直以弑父與君亦不從也答之不特切中斯人之隠微具見二子於他事無不從所以罪之者愈深矣有識聞之可以媿死子路使子羔為費宰子曰賊夫音扶下同人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡去聲夫佞者日用常行無不是學何必讀書而謂之學乎子路之對未為非也子羔質美學未優而遽仕且陷之季氏之門則賊之甚矣子路不悟但飾詞以對故夫子惡之味一賊字為之太息子路曾皙星厯切冉有公西華侍坐才卧切子曰以吾一日長去聲乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乗去聲之國攝乎大國之間加之以師旅因之以饑音機饉音僅由也為之比必二切下同及三年可使有勇且知方也夫子哂詩忍切之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相去聲焉㸃爾何如鼓瑟希鏗苦耕切爾舎上聲瑟而作對曰異乎三子者之撰士免切子曰何傷乎亦各言其志也曰莫去聲春者春服既成冠去聲者五六人童子六七人浴乎沂魚依切風乎舞雩音于詠而歸夫子喟然嘆曰吾與㸃也三子者出曾皙後曾皙曰夫音扶三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與平聲安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大皙曽參父名㸃毋吾以言勿以我年長而難言不曰徳而曰長謙辭也何以何用也率爾輕遽之貌攝管束也二千五百人為師五百人為旅因仍也穀不熟曰饑菜不熟曰饉知方知所向方也哂微笑也方六七十里小國也如猶或也五六十里又小足富足也俟君子謙不敢自任也宗廟之事祭祀也諸侯時見曰㑹殷見曰同端𤣥端服章甫禮冠相賛君之禮者曰願學曰小皆謙辭皙方鼓瑟故末問及之希者将對而音希也鏗者忽舎瑟起而其聲鏗然也撰具也春服單袷之衣浴盥濯也沂水名在魯城南地志以為有温泉風乗凉也舞雩祭天禱雨之處詠歌也唯求唯赤而下又皙問而夫子答之也能以禮讓為國乎何有子路率爾而對非為國之道也是以哂之求赤辭雖謙退要皆志在有國耳㸃也不然觀其鼓瑟希鏗爾舎瑟而作翛然逺韻逈出流俗之表青陽遲遲少長春衣浴沂風雩詠歌而歸非實見天地萬物在吾變化鼓舞中安得有此氣象夫子之曲肱顔子之陋巷者也夫如此而後可以優為三子之事區區三子者之志趣總不脱季氏之網而已喟然與㸃安得不為之喜也哉顔淵第十二顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣克猶除也已我也復反也禮即天則之不可踰者由己自己之己目條目也勿者禁止辭事斯者從事於此也仁即人之本心心本虚明無方無體範圍天地其大無外只為有我始昏始虧放逸乎天則之外而本心蝕矣大凡意念雖各不同未有不從我上起有我則百邪交叢無我則百念皆空是故貴於克也己克則心本無恙天則不踰所謂復禮也非復禮之外又有仁也復禮即所以為仁也故曰克己復禮為仁誠能一日克己復禮霾霧披掃清明洞然而天下皆歸吾仁矣非今日而始歸也天下本在吾仁中昔蔽而今悟也雖然用工切實則誠在我豈他人所能致其力哉下文視聽言動之目即為人由己之事也且如視時是雖欲視動于一念隠然未露知其非禮隨即滅然是之謂克以至曰聽曰言曰動未有不息念慮之微而致其力者非制之於口耳制之於事為而後謂之勿也愚嘗作四箴附於後烱烱而昧有不見焉㝠㝠而居交眩我前於戲戒哉弗此之求而瞳子之尤哉視箴萬籟寂然聽本無聲無聲之聽不震而驚寂然爾矣耳乎晚矣聽箴噤爾口卷爾舌不知嘿嘿之滕説言箴騄駬交蹄寰海長驅爾處爾室人誰爾知動箴仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣出門使民易於放失如見大賔承大祭則顛沛造次必於是矣不欲勿施無間於人已也邦家無怨無間於窮達也非克己者不能司馬牛問仁子曰仁者其言也訒音刃曰其言也訒斯謂之仁已乎子曰為之難言之得無訒乎司馬牛名犁向魋之弟孔子弟子訒忍也難也難即先難後獲之難方孳孳焉但見其不易敢輕有言乎為仁則必訒非訒之為仁也雖然告司馬牛者如此耳一日克己天下歸仁初亦何難之有司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子已乎子曰内省不疚夫音扶何憂何懼易曰履帝位而不疚光明也不疚者此心澄然無纎毫疵病之謂素其位而行無入而不自得何所憂懼乎司馬牛處同氣之變故告之以此君子自然不憂不懼非不憂懼之為君子也内省二字是用力處司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也君子何患乎無兄弟也曰命曰天一定而不可易死生富貴皆然也况兄弟之有無乎君子所可致力者盡其在我而已敬以直内而無失恭以與人而有禮則四海之内均氣同體何徃而非兄弟也此語雖𢎞未能無過明立愛之義而後得之子張問明子曰浸潤之譖莊隂切膚受之愬蘇路切不行焉可謂明也已矣浸潤之譖膚受之愬不行焉可謂逺也已矣浸潤者如水之漸漬譖毁人也膚受者近傍肌體而漸入之不遽為深切之言也愬訴其隂私也急遽者人易疑深切者人必察惟夫漸漬而入近傍而言是以衷姦而不虞柔行而不露稍無定見鮮不惑矣夫子謂未足以盡之而又歎之曰逺苟人言之來的然見得分曉後雖四方萬里如在几上不然則於近而蔽安能逺也故中庸亦曰舜好問而好察邇言明字下申一逺字極有味雖然大公無我而後可以語此子貢問政子曰足食足兵民信之矣子貢曰必不得已而去上聲下同於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立人之所信如木有根其根一撥隨即僵仆是故父子無信則無以親君臣無信則無以義夫婦無信則無以别長幼無信則無以序綱淪法斁人道冺滅矣何自而能立哉夫子始論為政謂斯民不得其養不安其生則非空言所可孚耳非謂信在兵食之後也兵食即所以信也子貢直就三者反復問難究見根底此聖門之所以善學歟論食則兵為輕論信則死為輕棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之説君子也駟不及舌文猶質也質猶文也虎豹之鞟其郭切猶犬羊之鞟棘子成衛大夫也夫子指棘子成子成謂君子質而已矣子貢嘆惜其說謂君子之不然也駟四馬也不及舌謂其言已出於舌四馬追不及也鞟皮去毛者子曰繪事後素又曰文質彬彬二者雖有先後本末然不可以相無也若使文亦如質質亦如文渾然無所區别則虎豹之皮既去其毛矣何異於犬羊之皮乎言文不可無以鍼子成之失哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足用國之用度也徹通也周制一夫受田百畆而與同溝共井之人通力合作計畆均收大率民得其九公取其一故謂之徹二者十取其二也君子厚下安宅非曰厲民以自養也魯初税畆而此意無復存矣時君但知責不足於民而不知求足於己又烏知足民乃所以足國哉盍徹之言雖落落於一時實萬世經邦之大法也子張問崇徳辨惑子曰主忠信徙義崇徳也愛之欲其生惡去聲之欲其死既欲其生又欲其死是惑也誠不以富亦祗以異末二句小雅我行其野之言謂縱使不以富故亦適為異耳證愛欲其生惡欲其死者之為異也主忠信凡三出示人立徳之本至深切矣徙義即改過義不能徙徳安能崇洪範曰無有作好遵王之道無有作惡遵王之路愛惡皆私意也死生有命豈他人私意所能為哉此惑之大者纔主忠信自無此事齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸齊景公名杵臼魯昭公末年孔子適齊是時景公失政而大夫陳氏厚施於國以家量貸而以公量收之景公又多内嬖而不立太子景公君臣父子皆失其道故孔子告之以是政者三綱九法之所係也綱淪法斁人道絶矣豈直為吾粟而已哉景公之言亦是他所見如此子曰片言可以折之舌切獄者其由也與平聲子路無宿諾片言一言也折剖斷也宿隔一宿也獄者兩詞情偽亦難决矣一言折之非剛明者不能無宿諾果於踐言也子曰聽訟吾猶人也必也使無訟乎聽訟者能决是非於一時耳使民無訟則非道洽政治不能是故聖人不貴聽訟貴無訟子張問政子曰居之無倦行之以忠無倦則不息以忠則不欺為政之本也一言以蔽之曰誠而已矣夫子之告子張大抵如此居是心之所安處子曰博學於文約之以禮亦可以弗畔矣夫重出子曰君子成人之美不成人之惡小人反是凡事不問善惡必有人焉成之而後成其事且如初陷惡習未甚彰著亦自畏忌不敢恣縱滛朋比徳復從㬰相挺其惡乃濟所謂成者如此君子唯恐人之不為善惡則救正之小人唯恐人之不為惡善則沮毁之季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正其身正不令而行同然之機其應如響孰敢二字自有不容不然者敢不正矣如政何哉季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊羞惡之心人皆有之所以甘心為盜而不知恥者上之人實啟之耳子苟不欲雖賞不竊竊豈本心也哉季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉於䖍切用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃偃仆也君子小人雖不同而良心善性未始有異此以徳感彼以徳應其機疾捷如草從風是故為人上者不可不謹所欲也所欲在善皆從而善矣柰何欲殺人而使之就道也哉答康子問者三壹是皆以脩身為本子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫音扶下同達也者質直而好去聲義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行去聲違居之不疑在邦必聞在家必聞慮以下人致思詳審非苟相取下也居之不疑者自以為是而安為之也達者其實孚也聞者其名聞也内不失己外不失人自無徃而不孚矣色莊行偽儼然自詭苟譽於人終何為哉子張真所謂求聞者樊遲從遊於舞雩之下曰敢問崇徳脩慝吐得切辨惑子曰善哉問先事後得非崇徳與平聲下同攻其惡無攻人之惡非脩慝與一朝之忿忘其身以及其親非惑與脩者治而去之也慝惡念也事者必有事焉之事急於計效者志必餒徳安能崇厚於責人者己必恕慝安能脩忿而不能思難者見必昏惑安能辨三者為學切問故夫子善之雖然未有惑不辨而能脩慝慝不脩而能崇徳者也樊遲問仁子曰愛人問知去聲子曰知人樊遲未達子曰舉直錯諸枉能使枉者直樊遲退見子夏曰鄉去聲也吾見賢遍切於夫子而問知去聲子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉言乎舜有天下選息戀切於衆舉臯陶音遥不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣愛人知人仁知之事也觀向也問知之言是樊遲獨於知人之説而有未達耳嗟夫直枉不辨天下固混混如也舉錯一明是非昭揭則凡枉者亦将脱然自失為直之歸知人之功孰大於此樊遲猶有未喻何哉子夏富哉之歎所以深賛而明辨之也選所以舉錯所以逺雖然仁知未始相離也不仁者逺所以愛人子貢問友子曰忠告工毒切而善道去聲之不可則止無自辱焉忠告者有道相規善道者道之以善也忠告善道友之義也須識不可則止之意方善不然非特無益於人自辱多矣或者告之未必忠道之未必善及其不可則又尤人之不我聽也何取於友哉曽子曰君子以文㑹友以友輔仁用力於仁者本非他人能致其力也無同志之助無規警夾持之功倏焉違之而不自覺矣是故貴於有輔也然而無文亦不足以㑹友㑹有粲然相接之意融堂四書管見卷六
