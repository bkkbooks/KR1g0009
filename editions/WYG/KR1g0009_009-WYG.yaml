body:
  text: 融堂四書管見卷九宋錢時撰論語陽貨第十七陽貨欲見孔子孔子不見歸如字一作饋孔子豚孔子時其亡也而徃拜之遇諸塗謂孔子曰來予與爾言曰懐其寳而迷其邦可謂仁乎曰不可好去聲從事而亟去吏反失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾将仕矣陽貨季氏家臣名虎嘗囚季桓子而專國政禮大夫有賜於士不得受於其家則徃拜其門貨瞰孔子之亡而歸豚欲致孔子之來也時其亡瞰其亡之時也懐寳謂懐藏道徳迷其邦謂不救邦國而迷亂之也亟數也兩曰不可孔子答日月逝又貨語也禮際苟善夫子未嘗絶人陽貨意欲見之不召而冀其自來又矙亡而以物致之不誠甚矣設仁知兩端且欲諷切而挽之夫子亦豈果於忘世甘於失㡬者可以仕則仕特不可以身苟狥人耳吾将仕矣之語婉而不激直而不倨聖人所以見惡人之道辭氣含蓄如此哉先師謂此不書陽貨瞰亡而獨書孔子時其亡大闕典子曰性相近也習相逺也性無所不善其初豈相逺哉由所習之殊遂若天淵之隔耳性非人力所可為也性習字學者所宜明辨而究心焉子曰唯上知去聲與下愚不移習而相逺夫人皆然也惟上知與下愚則斷然不移上之不移於下下之不移於上氣質昏明自然而然不因習而逺也或曰惟聖罔念作狂惟狂克念作聖謂之不移何也曰既聖矣安得狂謂設若罔念則亦轉而狂耳若狂者進取則與下愚不同聰明過人才識過人惟其不得中道而處又不得聖賢為之依歸所以狂也斯人於此能回一念則矢去川决功用豈易量哉下愚之人其氣昏塞其迷顛倒頑然罔念謂之不移如此而已雖然性則無不善也惟其罔念是謂下愚苟克念焉亦安有不可移者兩章言性極明備子之武城聞絃歌之聲夫子莞華板切爾而笑曰割鷄焉於䖍切用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳絃琴瑟也莞小笑貌喜之也君子小人以位言君子學道則知仁民愛物之方小人學道則知尊君親上之義治古之世所以教化盛行人人有士君子之行者以此耳安得以邑小而不用哉子游宰邑明絃歌之即道夫子所以喜而戲以發之公山弗擾以費畔召子欲徃子路不説音悦曰末之也已何必公山氏之之也子曰夫音扶召我者而豈徒哉如有用我者吾其為東周乎弗擾季氏宰與陽貨共執桓子據邑以叛末無也末之言無所往也豈徒哉言不徒然召我東周東都也弗擾執權臣以叛而能召夫子殆必有説豈徒然哉周之東遷王綱掃地聖人拳拳斯世不啻焚溺惟恐不用耳如有用我者吾豈為東周之事乎斷不其然子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寛信敏恵恭則不侮寛則得衆信則人任焉敏則有功恵則足以使人任倚仗也本心上有纎毫私意如何行得此五事能行五者於天下即為仁矣恭則誠寛則裕信則實敏則不懈恵則溥佛音弼肸許密切召子欲徃子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之徃也如之何子曰然有是言也不曰堅乎磨而不磷力刃切不曰白乎湼乃結切而不緇吾豈匏𤓰也哉焉能繫而不食佛肸晉大夫趙氏之中牟宰也親猶自也磷薄也湼染皁物也匏瓠也繋者繫於一處也不食不飲食也子路恐其磨湼耳豈知聖人有所謂不磷不緇者哉惟其如是是以能轉移乎物而不為物所轉移也危邦可入亂邦可居出入無疾縱横無礙而不能纎毫為己害也子路學未進此見南子則不悦弗擾召又不悦佛肸召又以為不可夫子於是不得已始發堅白之義焉且至堅莫如金而其堅則可磨此所謂不磷者何物乎至白莫如雪而其白則可湼此所謂不緇者何物乎惟曾子有一唯之悟故亦曰江漢以濯之秋陽以暴之皜皜乎其不可尚知其不可尚則知所以為堅白矣嗚呼是聖人之事也子曰由也女音汝下同聞六言六蔽矣乎對曰未也居吾語女好去聲下同仁不好學其蔽也愚好知去聲不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂學所以致知徒好而不學心有所蔽有所蔽則所好雖善而為害反大矣不知其方故愚役志於外故蕩諒故賊訐故絞不明義故亂負氣不屈故狂後二條正規子路子曰小子何莫學夫音扶詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名令人感動故可以興備著得失故可以觀不流於邪故可以羣不溺於私故可以怨以至人倫物理靡所不該而詩之徳備於此矣子謂伯魚曰女音汝為周南召南矣乎人而不為周南召南其猶正牆面而立也與平聲為周南召南詩首篇名者習行其事也正始之道莫切於二南治國平天下此其樞機也這裏有不盡分處則觸事皆礙如面牆而立矣如之何而可行哉子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉玉帛鐘鼓特其具耳所謂無體之禮無聲之樂者何物哉子曰正眀目而視之不可得而見也傾耳而聽之不可得而聞也學者無徒曰玉帛鐘鼓云子曰色厲而内荏而審切譬諸小人其猶穿窬之盜也與平聲穿厲威嚴也荏柔弱也穿壁窬踰墻内不足而偽為於外此穿窬者之心也子曰鄉原徳之賊也原與愿同鄉原鄉人之愿者鄉原賊徳孟子傳之詳矣使過惡暴著猶有時而改也衆皆悦之自以為是而不可以入堯舜之道非徳之賊歟子曰道聽而塗説徳之棄也學貴於自得非自得雖師友淵源未免有差况道聽而塗説者乎是自絶於徳也故曰徳之棄棄比賊差緩見得鄉原病根最深子曰鄙夫可與事君也與平聲哉其未得之也患得之既得之患失之苟患失之無所不至矣鄙者庸陋暗淺之名患得之所患在於不得也患失之所患在於易失也庸陋暗淺之徒規規然只自為計耳方其患得百方以自媒及其患失百方以自固不幸而在廷皆若人也不亦殆哉子曰古者民有三疾今也或是之亡也古之狂也肆今之狂也蕩古之矜也㢘今之矜也忿戾古之愚也直今之愚也詐而已矣疾病也肆謂不拘小節蕩則全無禮度矣㢘謂稜角峭厲忿戾則鬭於血氣矣直謂質撲徑行詐則内懐欺偽矣風氣日變世降愈下雖古人不好處今亦不復有矣况所謂賢者乎皇極之民好是懿徳雖不中不逺此夫子所以歎也古之疾乃今之賢歟子曰巧言令色鮮矣仁重出子曰惡去聲下同紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆芳服切邦家者朱正色紫間色雅正也利口捷給覆傾敗也利口者變亂是非柔佞媚悦而善惑也自古傾覆邦家罕不由此而世主往往甘心焉邪之足以奪正滛之足以亂雅有如許豈不甚可畏哉有虞之朝且曰聖讒説難壬人他可知矣子曰予欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉夫子發予欲無言之㫖所以與之言者深矣子貢平日正墮言語窟宅一聞斯訓乃索然無所倚仗小子何述㡬於可笑天何言哉四時行焉百物生焉天誠何言哉子貢将從前伎倆一時掃下好向何言處㑹取孺悲欲見孔子孔子辭以疾将命者出户取瑟而歌使之聞之孺悲魯人嘗學士䘮禮於孔子辭以疾而不使之聞之安知孺悲不以夫子為果疾乎是無益也訪知夫子之非疾而謬以疾稱乎是不誠也取瑟而歌意明而教行矣孺悲隠心自省必有為之凛然者愚舊説如此後聞諸先師謂孺悲親承聖訓已㡬於道來見夫子特不與之言特取瑟而歌使之聞之此正夫子妙㫖知風雨霜露無非教則知此妙㫖矣宰我問三年之䘮期音基下同已久矣君子三年不為禮禮必壊三年不為樂樂必崩舊糓既沒新糓既升鑚祖官反燧改火期可已矣子曰食夫音扶下同稻衣去聲夫錦於女音汝下同安乎曰安女安則為之夫君子之居䘮食㫖不甘聞樂不樂音洛居處不安故不為也今女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懐夫三年之䘮天下之通䘮也予也有三年之愛於其父母乎期周年也没盡也升登也燧取火之木也改火者春取榆栁之火夏取棗杏之火夏季取桑柘之火秋取柞槱之火冬取槐檀之火已止也㫖亦甘也懐抱也三年之䘮天下之通䘮也宰我聖門髙弟輒謂期為已久嗚呼忍哉忍忘其親而以禮壊樂崩為慮何者而謂之禮樂也於女安乎之問警之深矣曽不少省遽答曰安夫人子之居䘮食㫖不甘聞樂不樂居處不安者非可偽為也至情深痛皇皇然若無所容於天地雖欲不然而自有不能不然者予也獨無人心也耶苟有人心安得而遂忍於此也曰子生三年又曰三年之愛於父母非謂當如此相報所以深責宰我者耳愚嘗觀孟子吾宗國魯先君莫之行一章則三年之制廢闕已久恐期䘮之説亦非宰我創為子曰飽食終日無所用心難矣哉不有博弈者乎為之猶賢乎已博局戲也弈圍棊也已止也博弈之不美甚矣聖人豈真以為賢哉以博弈為猶賢極言無所用心者之可罪也心之本體與天同運自强不息所以配天可無用乎雖然心不可以無用又須求所以用心之地非所當用是真無用耳學者謹之子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盜尚上之也君子小人以位言義以為上是謂大勇不然則君子為亂小人為盜矣謂之勇可乎子路平生這箇氣象處處發露後來却煞做工夫子貢曰君子亦有惡去聲下同乎子曰有惡惡稱人之惡如字者惡居下流而訕所諫切上者惡勇而無禮者惡果敢而窒者曰賜也亦有惡乎惡徼口堯切以為知去聲者惡不孫去聲以為勇者惡訐居謁切以為直者訕謗毁也窒不通也惡徼以下子貢之言也徼伺察也訐謂發人隂私不能樂善獨好揚惡安於下流及好訕上固是可惡所貴於勇與果敢者以其能行義耳勇而無禮只是血氣果敢而窒愈無忌憚此夫子之所惡也其實則徼乃以為知其實則不孫乃以為勇其實則訐乃以為直此子貢之所惡也夫子之心溥廣大無偏子貢之見明疑似必辨子曰唯女子與小人為難養也近去聲之則不孫去聲逺去聲之則怨不必專言僕妾凡女子小人皆然也近之既不孫逺之則又怨将安所處乎夫子此語正是欲人就其中思所以處之身不行道不行於妻子反已而求庶乎其可矣子曰年四十而見惡去聲焉其終也已年四十則終身之事體定矣是故學貴於及時微子第十八微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉微箕二國名子爵也微子紂庶兄箕子比干紂諸父微子見紂無道去之以存宗祀箕子比干皆諫紂殺比干囚箕子以為奴箕子因佯狂受辱或去或奴或死疑各不同而夫子斷之曰三仁其論諫而死非激也不可以不諫徉狂為奴非詐也不可以不奴抱祭噐而去非忘宗國也不可以不去各當其分耳是之謂得其本心使本心上有纎毫欠闕所行必有不慊處安得仁栁下恵為士師三去聲黜人曰子未可以去乎曰直道而事人焉於䖍切徃而不三黜枉道而事人何必去父母之邦士師獄官黜退也使吾枉道以求合耶則不去可也若直道而去何所徃不遭黜哉風節凛凛堅如金石非安於義命者不能後世一跌而遂䘮其守者可以觀矣齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行魯三卿季氏最貴孟氏為下卿不能用謂景公不能用也如用之雖不季孟之間可也待之縱厚而不能用與所謂犬馬畜伋者無以異况若景公之所云乎意可見矣孔子遂行齊人歸如字或作饋女樂季桓子受之三日不朝音潮孔子行孔子由魯司寇攝相事誅少正卯與聞國政齊人懼犂鉏請先沮之於是選齊國中女子好者八十人皆衣文衣而舞康樂文馬三十駟遺魯君陳女樂文馬於魯城南髙門外季桓子微服徃觀再三乃語魯君為周道游徃觀終日怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰於大夫則吾猶可以止桓子受齊女樂三日不聽政郊又不致膰俎於大夫孔子遂行女樂之受是齊人之間行也况遂三日不朝乎不足與言也明矣楚狂接輿歌而過孔子曰鳯兮鳯兮何徳之衰徃者不可諫來者猶可追己而已而今之從政者殆而孔子下欲與之言趨而辟去聲之不得與之言接輿楚人佯狂辟世夫子時将適楚故歌而過其車前也鳯以比孔子言不能隠為徳之衰來者可追言尚可隠去已止也而語助辭殆危也下者下車也接輿亦可謂果於忘世矣纔説鳯徳之衰便是不知聖人觀其辭㫖有若指迷塗然者於戲知㡬其神尚須接輿之言哉欲與之言将有教也乃反趨辟其自信不疑抑又甚矣不得與之言聖人殆有深惜之意記者特書之長沮七余切桀溺乃厯切耦而耕孔子過之使子路問津焉長沮曰夫音扶執輿者為誰子路曰為孔丘曰是魯孔丘與平聲曰是也曰是知津矣問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與平聲對曰然曰滔滔吐刀切者天下皆是也而誰以易之且而與其從辟去聲下同人之士也豈若從辟世之士哉耰音憂而不輟子路行以告夫子憮音武然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也二人隠者耦並耕也時孔子自楚反蔡津濟渡處執輿執轡在車也子路下車問津故夫子執轡滔滔流而不反之意以猶與也而汝也辟人謂孔子辟世桀溺自謂耰覆種也憮然猶悵然易易亂為治也二子葢久聞夫子之名者是知津矣譏夫子熟於道塗而不知止也誰以易之言天下已不可為諷子路不若捨之而從已也聖人豈不知天下之不可為哉若遇有道則何用易振斯世之頽綱扶人極於已壊故不得而辭其責耳諉曰不可為而遂果於忘世則捨斯人而同鳥獸之羣可不可也子路從而後遇丈人以杖荷蓧徒吊切子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植音直其杖而芸子路拱而立止子路宿殺雞為黍而食音嗣之見賢遍切其二子焉明日子路行以吿子曰隠者也使子路反見之至則行矣子路曰不仕無義長上聲幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行己音紀知之矣丈人亦隠者蓧竹噐分辨也植立之也芸去草也倫序也父子有親君臣有義夫婦有别長幼有序朋友有信人之大倫也接輿直言從政之殆桀溺直欲為辟世之徒而丈人者辭㫖含蓄與輿溺異矣子路一見而起敬夫子一聞而知其為隠豈偶然哉然其為不知夫子則一耳使子路反見將以教之至則行矣何去之速也子路既不見其人遂以不仕無義誚之且彼止宿之時長幼之節固未始廢柰之何而欲廢君臣之義乎是自潔其身而亂天下之大倫也君子之仕豈有他哉行其義耳道之不行豈不知之而不敢一朝安焉為是故也子路發此數語反覆激昻必所得於夫子者丈人也庶㡬聞之或謂後路下有反子二字逸民伯夷叔齊虞仲夷逸朱張栁下恵少去聲下同連子曰不降其志不辱其身伯夷叔齊與平聲謂栁下恵少連降志辱身矣言中去聲下同倫行中慮其斯而已矣謂虞仲夷逸隠居放言身中清廢中權我則異於是無可無不可逸遺逸民者無位之稱虞仲即仲雍與泰伯同竄荆蠻者夷逸朱張不見經傳少連東夷人記稱善居䘮三日不怠三月不懈期悲哀三年憂中清者能潔其身也中權者能達其變也然隠居放言比之中倫中慮則不及矣中倫者言與理合也中慮者行與志合也然降志辱身比之不降不辱則不及矣志節凛然卓絶千古豈易可及哉然而論聖之時則未也故無可無不可必吾夫子而後可大音泰師摯適齊亞飯扶晚切下同干適楚三飯繚音了適蔡四飯缺適秦鼓方叔入於河播鼗徒刀切武入於漢少去聲師陽擊磬襄入於海大師魯樂官之長摯其名也亞飯以下以樂侑食之官播摇也鼗小鼔兩旁有耳持其柄而摇之則旁耳還自擊漢漢中少師樂官之佐干繚缺武陽襄皆名也人皆曰樂賤工也觀魯之衰諸人踰河蹈海而去識髙見逺雖後世有位之士未必能爾乃知古人於此事甚重徃徃賢者居之非後世樂工之比也夫子學琴於師襄可見周公謂魯公曰君子不施陸本作弛詩紙切其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人魯公周公子伯禽也弛猶懈也宗族姻婭皆親也以用也大臣與君一體徒具位而不用則怨大故謂惡逆不施其親齊家之道大臣不怨正朝廷之道故舊非大故不棄厚風俗之道不求備於一人廣人才之道四事大抵皆忠厚周公傳家之訓在是而魯之子孫不能守也果能守安得踰河蹈海而去也哉相次而書殆有深㫖周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧烏𤓰切或曰成王時人或曰宣王時人葢一母四乳而生八子也周之人才顯然著稱者多矣而此八士未白於世故特記之融堂四書管見卷九
