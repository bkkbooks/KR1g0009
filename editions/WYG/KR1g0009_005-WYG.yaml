body:
  text: 融堂四書管見卷五宋錢時撰論語子罕第九子罕言利與命與仁罕少也利非世俗之所謂利若世俗之利豈特罕言而已哉曰命曰仁非可以口耳傳也故不易語雖然吾無行而不與二三子則固有不言而言者耳達巷黨人曰大哉孔子博學而無所成名子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣達巷者黨名也執偏執也黨人能以大哉贊夫子在當時豈易得者但以博學無所成名為大則又未知聖人之所以大耳有所執即有所名夫子發吾何執之義其為大便自可見執御乎執射乎吾執御矣深言其不然也所以曉門弟子子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下麻冕緇布冠也純絲也儉謂省約緇布冠以三十升布為之升八十縷則其經二千四百縷矣細而難成臣與君行禮當拜於堂下君辭之乃升成拜泰驕慢也從衆違衆或古或今惟其可而已繼周損益規模可以畧見或曰何以又云服周之冕曰周之衰也俗壊文浮侈然狥欲以逞無復先王之舊矣而有純儉者焉所以特取之救時弊也此正與其奢也寧儉之意若夫子得時行道定一代之制作必若答為邦之問而後可子絶四毋意毋必毋固毋我意必固我皆私也大抵都從意上起一節深一節本心澄然虚明如何著得此四字絶者去之毋者所以絶也子畏於匡曰文王既沒文不在兹乎天之將喪去聲下同斯文也後死者不得與去聲於斯文也天之未喪斯文也匡人其如予何匡地名陽虎曽暴於匡夫子貌似陽虎故匡人圍之文即道也兹此也夫子自謂也後死後我而死者據遇難之時而言也斯文之喪未喪在天則夫子之死生固不在夫子也匡人且奈何哉大音泰宰問於子貢曰夫子聖者與平聲何其多能也子貢曰固天縱之將聖又多能也子聞之曰大宰知我乎吾少也賤故多能鄙事君子多乎哉不多也牢曰子云吾不試故藝太宰官名與疑辭也固者固是也縱猶使也縱之將聖言將使之為聖人也牢姓琴字子開一字子張孔子弟子試用也大宰稱夫子之聖而曰多能子貢答以天縱之聖而又多能大宰未足與議也而子貢之見乃復支離如此夫子一掃其固陋而直以不多諭之道一而已果在於多乎知所以不多則知所以聖此語正切子貢之病不試故藝賤故多能琴牢因舉夫子舊語助明之子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩音扣其兩端而竭焉空空者空之又空徹底洞然一無所有也叩擊也問難之也兩端猶言兩項也竭盡也有意則有知無意則無知所貴於覺者覺此無知之妙耳聖人之心如太虚然故曰不識不知順帝之則學者往往以多能多識為務聖人恐起意億度之害道也特發無知之㫖以示之無知如何下文所以証也鄙夫之問若易答矣我實空空無有止扣其兩端而已竭焉明乎此則知雖言未嘗言雖思未嘗思而舜禹之所以不與所以無為可黙喻矣子曰鳯鳥不至河不出圖吾已矣夫平聲於鳳靈鳥文王時鳴岐山河中龍馬負圖伏羲時出河圖鳯鳥瑞世之符非必皆然也夫子特假此以嘆時之不可為耳春秋之作而絶筆於獲麟何哉子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨齊衰喪服冕冠也衣上服裳下服冕而衣裳貴者之盛服也瞽無目者作者斂然而起趨者翼然而疾皆敬之容也於此三者雖少必爾誠心所形無間長幼也顔淵喟苦位切然嘆曰仰之彌髙鑽之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之未由也已喟然歎聲彌者愈也循循從容不迫之貎誘引進也卓立也未無也髙而不可及堅而不可入忽前忽後而不可定此正汲汲皇皇憤悱之時也人情到此多不能勇進夫子却循循善誘博以文約以禮使之欲罷而不能欲見不得見欲己不得已引而不發惟此時為然既竭吾才如有所立卓爾雖比瞻忽不同亦只是若有所見耳至於欲從末由則所謂髙與堅者由是也本非髙與堅也一旦洞然六通四闢故又作卓爾之見此章深見得夫子善教顔子善學處先儒論喟然之嘆當在問仁之前足以破千古之惑矣子疾病子路使門人為臣病間如字曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大塟予死於道路乎夫子時已去位無家臣病間少差也大塟謂君臣禮葬道路棄於道路也於本分上有纎毫不安穩處便是欺天况詐為臣乎觀死於二三子之手與死於道路之語只據本分氣象自然正大子貢曰有美玉於斯韞紆粉切匵徒木切而藏諸求善賈音嫁而沽諸子曰沽之哉沽之哉我待賈者也韞藏也匵匱也沽賣也憂則違之未嘗韞藏樂則行之未嘗求沽子貢殆失問矣兩言沽之哉不然之辭也待賈猶言待時子欲居九夷或曰陋如之何子曰君子居之何陋之有東方之夷有九種欲居者深歎諸夏之無君非真欲往居之也雖蠻貊之邦行矣何陋之有乎故君子無入而不自得子曰吾自衛反魯然後樂正雅頌各得其所魯哀公十一年冬孔子自衛反魯未正之先雅頌必多失所雍頌也而歌於三家之堂他可槩見斯道不行於天下晚歳而歸拳拳一魯吁真不幸矣哉子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉純徳孔明無非妙用不勉而中不思而得雖應酬交錯而我一無所有非謙辭也虚明洞洞如水鏡中象實未嘗有也流俗於此數者多不盡其分故特掲以警之歟然其大㫖惟不起意乃善耳有意即有無意本無何有之言學者宜聽子在川上曰逝者如斯夫音扶不舍上聲晝夜愚嘗作竹泉贊云源源而來涓涓而滴不晝而出不夜而息與天地而始終惟吾之一子曰吾未見好去聲下同徳如好色者也民之秉彞固好是懿徳也梏之反復欲蔽情昬則去禽獸不逺矣安得以其好色之心而好徳哉易猶轉樞難於登天子曰譬如為山未成一簣求位切止吾止也譬如平地雖覆芳服切一簣進吾往也簣土籠也止則止於此矣而方進者不可量也或止或往誰實為之子曰語去聲之而不惰者其囘也與平聲惰懈怠也箇中人聞箇中語句句皆實事也無所不恱所以不惰不然只是空言耳如何强得子謂顔淵曰惜乎吾見其進也未見其止也此道無窮豈有止哉見其進未見其止所以歎顔子之能自彊不息而惜之耳子曰苗而不秀者有矣夫音扶下同秀而不實者有矣夫穀之始生曰苗吐華曰秀成穀曰實苗而秀秀而實生理之自然也有以夭閼之則不盡其天矣人皆有是四端其苗之謂歟是故不可以無學子曰後生可畏焉於䖍切知來者之不如今也四十五十而無聞焉斯亦不足畏也已來後來今今日也後生之所以可畏者以方來者之未易量也可畏之年不知所勉至不足畏則何及哉古人之於四十每每致意如曰不惑曰彊仕曰不動心之類蓋自幼而學成徳達才此其時也故又曰年四十而見惡焉其終也已可不重歟可不懼歟聞言聞道非謂有聞於人也子曰法語之言能無從乎改之為貴巽與之言能無說乎繹之為貴說而不繹從而不改吾未如之何也已矣法語者有法度之語巽與者巽順而與之言繹思繹也正大之論不能不從婉入之辭不能不恱恱而繹方有味從而改方有益不然則詭隨苟狥之徒耳何足與之言哉子曰主忠信毋友不如己者過則勿憚改人之心固各有所主也惟主於忠信方是立徳之本一失所主横流奔放其禍有不可勝言者聖人所以再提此語為一章之首而申言歟子曰三軍可奪帥也匹夫不可奪志也帥主將也匹夫有志尚不可奪况志學者乎此是力行第一箇字子曰衣去聲下同敝緼紆粉切袍與衣狐貉胡各切者立而不恥者其由也與平聲不忮之䜴切不求何用不臧子路終身誦之子曰是道也何足以臧敝壊也緼枲著也袍衣有著者衣之賤也狐貉以狐貉之皮為裘衣之貴也忮害求貪臧善也二句衛風雄雉篇中語恥衣之不若人則其人可知矣觀子路車焉輕裘氣象不如是也纔恥於此不忮則求能不忮求何所用而不善乎夫子所以善之雖然不以外物為心害而後可進於道耳苟進於道忮求殆不足言也果可以此為盡善而遂終身乎夫子所以抑之子曰嵗寒然後知松栢之後彫也易曰困徳之辨也平居無事如何辨得直到打不過處方見力量淺深子曰知者不惑仁者不憂勇者不懼無疑故不惑無累故不憂無餒故不懼知所以致知也勇所以力行也知則仁矣仁則勇矣三者只一事子曰可與共學未可與適道可與適道未可與立可與立未可與權適之也適道猶言造道也權稱錘衡所取平者有志於道决定不囘方可與之共學悠悠泛泛一出一入何足與語也哉然道非智探力索所可强也一旦感悟心通内明乃自得耳是謂適道是謂知及之知及之仁不能守之雖得之必失之是故貴於立也此立非力此立非思常覺常明不昏不滯則萬變交錯自然不動矣此仁守之功也若夫達權則非聖人不可桀紂可伐也管蔡可誅也蒲盟可背也南子可見也此仕止久速所以為聖之時也四節功夫斷斷乎曰可與曰未可與具有科級次第後世纔說學便說權可謂無忌憚唐棣大計切之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有首四句逸詩也唐棣郁李也偏反者言華之或偏或反也而語助也詩云室邇人逺則此室亦當是言人之居室然夫子特借此以發何逺之㫖耳不謂人也詩曰豈不爾思室是逺而夫子則曰未之思也夫何逺之有嗟夫思則得不勞瞬息不思則不得風馬牛之不相及思與不思者誰逺與不逺者何物哉鄉黨第十孔子於鄉黨恂恂相倫切如也似不能言者其在宗廟朝直遥切下同廷便便旁連切言唯謹爾恂恂信實貌便便辨也入里必式固自不當以頰舌多尚人况吾夫子也耶然愚三復斯㫖深悟處鄉黨之道恂恂似不能言宜優游涵泳而得之若宗廟朝廷則有不可不明辨者但謹而不放耳或言或不言雖各有宜無往而非忠信篤敬也他人纔多言便佞給必不謹纔不言便緘嘿必不能恂恂聖人於樞機甚重記言行者特冠一篇之首朝與下大夫言侃侃苦旦切如也與上大夫言誾誾魚巾切如也君在踧子六切踖子亦切如也與與如也侃侃和樂貎誾誾中正貌踧踖不敢自安也與與不忘向君也下大夫則侃侃上大夫則誾誾君在則踧踖與與等級髙下無適不宜變化虚明自然中節君召使擯必刃切色勃如也足躩驅若切如也揖所與立左右手衣前後襜赤占切如也趨進翼如也賓退必復命曰賓不顧矣擯主國之君所使出接賓者勃變色貌躩盤辟貎所與立同為擯者擯用命教之半如上公九命則用五人揖左人則左其手揖右人則右其手也襜整貎翼如鳥舒翼也此一節記擯相之容色勃足躩重君命之始也賓退必告謹君命之終也入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屛氣似不息者出降一等逞顔色怡怡如也没階趨進翼如也復其位踧踖如也入公門如不容過位言似不足升堂屏氣似不息君愈近而愈肅也出降一等逞顔色君漸逺而漸舒也没階言趨進者進復於位也復位言踧踖者不敢自安也執圭鞠躬如也如不勝平聲上如揖下如授勃如戰色足蹜蹜色六切如有循享禮有容色私覿直歴切愉愉羊朱切如也圭諸侯命圭聘問鄰國則使大夫執以通信如不勝者如力不能堪也上堂則如揖下堂則如授圭於人皆恭也戰色戰而色懼也縮縮舉足促狹也如有循言行不離地如縁物也享獻也既聘而享用圭璧有庭實私覿以私禮見也愉愉色和也執圭者通信之始故如戰色謹之至也享禮者交際之時故有容色氣之和也私覿者燕見之暇故愉愉情之親也陽開隂闔無非造化自然君子不以紺古暗切緅側由切飾紅紫不以為䙝服當暑袗絺綌必表而出之緇衣羔裘素衣麑研奚切裘黄衣狐裘䙝裘長短右袂必有寢衣長去聲一身有半狐貉之厚以居去上聲喪無所不佩非帷裳必殺去聲之羔裘𤣥冠不以弔吉月必朝服而朝君子言大凡也紺深青揚赤色齊服也緅絳色三年之喪以飾練服者飾領縁也紅紫間色也䙝服私居服也䙝服猶不用其他可知袗单葛之精者曰絺麤者曰綌表外也出必加外衣也緇黒色羔裘用黒羊皮麑鹿子色白狐色黄以衣裼裘欲相稱也䙝裘長欲其温短右袂便用事也寢衣衾也長一身有半舒縮自便覆足不露也狐貉毛深温厚私居適體也君子常佩惟居喪則否朝祭之服裳用正幅如帷要有襞績而旁無殺縫其餘若深衣要半下齊倍要則無襞績而有殺縫矣喪主素吉主𤣥弔必易素也吉月月朔也服者身之章也其色有宜其製有度其用有節皆所以防非僻之心而養之以正也先聖垂訓如此故槩以君子言之齊側皆切下同必有明衣布齊必變食居必遷坐齊則沐浴而著明衣所以明潔其體也變食者變其常日之饌遷坐者遷其常居之所皆所以嚴祀事也食音嗣不厭精膾不厭細食音嗣饐於逸切而餲追邁切魚餒而肉敗不食色惡不食臭惡不食失飪而甚切不食不時不食割不正不食不得其醬不食肉雖多不使勝食音嗣氣唯酒無量去聲不及亂沽酒市脯不食不撤薑食不多食祭於公不宿肉祭肉不出三日出三日不食之矣食不語寢不言雖䟽食音士菜羮𤓰祭必齊如也食飯也精鑿濕也饐飯傷熱也味變也魚臭爛曰餒肉傷曰敗色惡臭惡味敗而色臭變也臭氣也失飪烹調失生熟之節不時非時之物也割不正謂割牲之不以禮者食以穀為主不可使肉氣勝之無量言不足為盃之限惟以不及亂為度也沽市皆買也恐不潔薑助胃不多恐傷胃也祭於公助祭公家不宿不經宿也出三日供之者遲慢神失禮也滋味所以養血氣一失其宜則傷生矣聖人於此纎悉不苟非為口腹也凡十餘條皆節飲食之道食不語寢不言不特嚴於自防亦且周於養生祭肉不慢雖薄必齊所以事鬼神也席不正不坐聖人之心無時而非正起居飲食皆行其所安也後世亂倫失次人道冺冺有弗暇恤而暇一席之計乎鄉人飲酒杖者出斯出矣鄉人儺乃多切朝服而立於阼階杖者老人也六十杖於鄉儺所以驅疫阼階東階也不敢先杖者而出所以尊鄉老朝服非特安室神且與鄉人共敬其事也問人於他邦再拜而送之康子饋藥拜而受之曰丘未達不敢嘗再拜送之重而有情也辭曰未達恭而不詭也廏焚子退朝曰傷人乎不問馬聖人之仁有義行焉若人與馬雜問便不可愛無差等墨子之學也記者特書不問馬三字深見聖人之心君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之侍食於君君祭先飯扶晚切疾君視之東首去聲加朝服拖徒我切紳君命召不俟駕行矣食或餕餘故不薦正席先嘗如對君也腥生肉也先飯為君當食也君視疾則遷之南牖首東而面北加朝服於身引大帶於上也不俟駕急趨徒行不敢留君命也食則先嘗腥則熟而薦生則畜重君賜也入太廟每事問朋友死無所歸曰於我殯朋友之饋雖車焉非祭肉不拜於我殯殯於其家也死無所歸朋友之責也夫子以身任之獨拜祭肉所以重先祖寢不尸居不容見齊衰者雖狎必變見冕者與瞽者雖䙝必以貌凶服者式之式負版者有盛饌必變色而作迅雷風烈必變尸仰卧如死也容容儀式車前横木有所敬則俯而憑之負版持邦國圖籍者寢不尸雖寢而未嘗肆也居不容非惰也申申夭夭是也前言雖少必作而此又以䙝狎言之聖人於人其有䙝狎者哉猶至親且宻云耳甚言其不敢慢也凶服不必齊衰故變與式亦異盛饌與迅雷風烈必變重主禮敬天威也升車必正立執綏車中不内顧不疾言不親指綏挽以登車者内顧囘視也正立而執不特威儀有度稍不正且傾敧矣不内顧不疾言不親指皆車中安重之容也正大氣象可以想見色斯舉矣翔而後集曰山梁雌雉時哉時哉子路共九用切之三嗅許又切而作雉文禽色者指雉而言也共供之也嗅者嗅其氣也作者起而不顧也色斯舉與翬斯飛之類語法正同始也但見有色之飛舉中也翔終也集於山梁而後知其為雌雉焉夫子連發時哉之歎其義大矣其㫖逺矣子路取而共之何為者哉三嗅而作不與之言而示之意融堂四書管見卷五
