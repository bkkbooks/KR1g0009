body:
  text: 融堂四書管見卷三宋錢時撰論語公冶長第五子謂公冶長可妻去聲下同也雖在縲力追切絏息列切之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之公冶長孔子弟子妻者嫁之也縲黑索絏攣也所以繋囚也南容孔子弟子居南宫名縚又名适字子容諡敬叔孟懿子之兄不廢言見用也聖門以為可妻豈易得者非罪而縲絏正所謂無妄之災疑不假辨矣世俗未必究實須用與他說破有道不遺無道獲免三復白圭之証騐也子謂子賤君子哉若人魯無君子者斯焉於䖍切取斯子賤姓宓孔子弟子魯國多君子豈中和之氣獨私於魯哉薫蒸陶冶有以致之耳使子賤居非其地將何以得此斯字是所以為君子處取字亦見得他善學處子貢問曰賜也何如子曰女音汝器也曰何器也曰瑚音胡璉力展切也此因稱子賤而有問也夏曰瑚商曰璉周曰簠簋皆宗廟盛黍稷器君子不器而以瑚璉目之雖可貴重終未離於器也賜也勉乎哉或曰雍也仁而不佞子曰焉於䖍切用佞禦魚吕切人以口給屢憎於人不知其仁焉用佞雍姓冉字仲弓孔子弟子佞口才也禦當也給辦也憎惡也仁與佞正相反口給屢憎仁者不如是也或稱仲弓之仁而以不佞少之即此便是他不知其仁處兩言焉用佞宜細玩子使漆雕開仕對曰吾斯之未能信子說音悅斯猶言這個斯字是實做工夫處夫子以為可仕豈易得者猶自謂未能信不是實做工夫安有此語有學官嘗舉以難諸生友人見問荅曰漆雕開直是要做徹了子曰道不行乘桴浮於海從去聲我者其由與平聲子路聞之喜子曰由也好去聲勇過我無所取材桴筏也所猶處也材即所以為桴者夫子豈真浮海者哉深歎道之不行耳子路何喜之遽也稱其好勇而謂取材之無處所以抑之孟武伯問子路仁乎子曰不知也又問子曰由也千乘去聲之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帯立於朝音潮可使與賔客言也不知其仁也賦兵也古者以田賦出兵千室大邑百乘卿大夫之家宰邑長家臣之通號也赤姓公西字子華孔子弟子三子者謂之仁不可謂之不仁亦不可答以不知備見聖人包含成就之意雖然治賦為宰與賔客言不仁亦不可使也當以意逆之子謂子貢曰女音汝下同與囘也孰愈對曰賜也何敢望囘囘也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也與許也真知一矣將何所不通謂之十者姑舉成數而言顔子地位己不易及子貢自知弗如却是他所以進學處故夫子與之宰予晝寢子曰朽許久切木不可雕也糞土之牆不可杇音污也於予與平聲何誅子曰始吾於人也聽其言而信其行去聲今吾於人也聽其言而觀其行於予與改是晝寢先儒謂居内違禮朽腐也雕刻畫也杇鏝也與語辭誅責也氣昏慾勝安能有立篤志而力行者氣象自然不同子曰吾未見剛者或對曰申棖子曰棖也慾焉於䖍切得剛申棖孔子弟子慾多嗜慾也剛者天徳之至健非血氣云也養而無害自正自大自直自方故曰富貴不能淫貧賤不能移威武不能屈此之謂大丈夫若有一毫物慾之私則餒矣子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也子貢之言絜矩之道也宜夫子喜而進之矣乃曰非爾所及嗚呼此以進之也賜也一聞斯語惕然反求其病根之所在則終身可行之㫖何必他日而再問乎子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也文章威儀文辭之類性即人之所固有天道即天之所以為天者天人一理也既曰言如何不可聞此是子貢所學大進處非實見後如何道得出平時言語之習為之一洗矣但將文章與性天道分裂則猶未也文章即性即天初無可聞不可聞之殊子路有聞未之能行唯恐有聞不聞則已聞必行之非以所聞為切身實事者不爾也唯恐二字深得子路力行之意曰果曰兼人曰無宿諾曰聞過則喜其氣象可以槩見子貢問曰孔文子何以謂之文也子曰敏而好去聲學不恥下問是以謂之文也孔文子名圉衛大夫諡法勤學好問為文敏有自强不息之義不恥者樂善不倦之誠敏而好學則得所敏矣好學而不恥下問則得所學矣然孔圉使太叔疾出妻而妻之其行如是豈真若聖門之所謂好學者乎先聖不言其人而但釋諡義殆有深㫖子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義子産姓國氏名僑鄭大夫事上以敬則知為下之道養民以惠而使以義則知居上之道然非行己以恭者不能也故又為四者之首稱子曰晏平仲善與人交久而敬之晏平仲名嬰齊大夫交際之道莫善於敬况久而不替乎然非敬則亦不能久也可以久交必非苟合者子曰臧文仲居蔡山節藻梲章悅切何如其知去聲也臧文仲魯大夫臧孫氏名辰居猶藏也蔡大龜也節柱頭斗拱藻水草梲梁上短柱刻山於節畫藻於梲以為藏龜之室也龜以卜疑耳何乃僭飾如此有識者不爾也子張問曰令尹子文三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知去聲絶句下同焉於䖍切下同得仁崔子弑齊君陳文子有馬十乘去聲棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁令尹官名楚上卿執政者也子文姓鬭名穀於莵知覺也覺其本心而至於常覺常明者仁崔子也齊大夫名杼齊君莊公名光陳文子名須無亦齊大夫違去也之一邦往也令尹子文之忠陳文子之清據其事兩言而盡矣復疑其為仁而問之此是子張之病猶未有覺安得謂之仁乎故曰未知焉得仁句法與焉得儉焉得剛正相似直辭以破其疑與答孟武伯不知其仁不同矣季文子三去聲思而後行子聞之曰再斯可矣季文子名行父魯大夫斯語辭事未有不思而得者然須有學明得義後方可不然就私意上起思輾轉只是私意雖百思何益宣公簒立文子不能討反為之使齊而納賂殆類全不思者所謂三思果安在乎再可之言極宜細玩子曰寗武子邦有道則知去聲下同邦無道則愚其知可及也其愚不可及也寗武子名俞衛大夫按春秋傳在文公成公之時無道則愚便是他知處子在陳曰歸與平聲歸與吾黨之小子狂簡斐音匪然成章不知所以裁之歸欲歸魯也狂者進取斐文貌裁者翦裁之也聖門鑪冶全在一裁字斐然成章非所多也知所以裁即斂華就實無非根柢工夫子曰伯夷叔齊不念舊惡怨是用希伯夷姓墨名允字公信叔齊名知字公達夷齊諡孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷夷曰父命也遂逃去叔齊亦不立而逃之國人立其中子怨是用希非念怨言自少怨也怨生於念念舊惡而不忘即不免有所怨矣觀兄弟遜國之事則其人心地可知故夫子又稱之曰求仁而得仁又何怨或問扣馬諫後竟不食周粟餓死首陽山下則何如曰義所不可雖死不與易此所以為夷齊也若不顧大義苟且浮沉忍恥事仇匿怨為友而不知恥者天下滔滔皆是也如此而謂之不念豈足以識聖賢心哉子曰孰謂㣲生髙直或乞醯呼西切焉乞諸其鄰而與之㣲生姓名髙魯人醯醋也本心本直㣲起意即失之流俗類以囘曲苟狥為周密乞鄰甚小礙直甚大子曰巧言令色足將樹切恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之足恭便僻貌友者合志同方之謂中藏怨心外為苟合而謂之友可乎此小人之情狀而流俗未必恥也左丘明真所謂惡不仁者顔淵季路侍子曰盍音合各言爾志子路曰願車馬衣去聲輕裘與朋友共敝之而無憾顔淵曰願無伐善無施勞子路曰願聞子之志子曰老者安之朋友信之少者懐之衣服之也裘皮服敝壊也憾恨也伐誇也施者委之於人也安之安我也信懐義同子路能不吝耳顔子則有志於忠恕者也夫子天涵地毓無一物不在吾仁中子曰已矣乎吾未見能見其過而内自訟者也訟者辨直之名也是非之心人皆有之鮮有過而不知者不能訟故不改耳發於本心自悔自罪痛自咎責如抱寃屈以求伸者焉方可謂之内自訟念念不捨過無由生訟不由中改必不力夫子以為未見而發已矣之歎警動學者改過之機至深至切子曰十室之邑必有忠信如丘者焉不如丘之好去聲學也十室小邑也學以忠信為主而十室之邑必有之以見天下之美質可學而至於聖者固多也惟不知好是以不若聖人耳學者豈可自棄雍也第六子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃大音泰簡乎子曰雍之言然南面君位言可為諸侯也子桑伯子魯人先儒疑即莊周所稱子桑户也可者僅可之辭簡言不煩居敬行簡即是仲弓可使南面處居如曠安宅而弗居之居所居者敬則所行無非敬自然不煩也居簡則過矣哀公問弟子孰為好去聲學孔子對曰有顔囘者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也遷延及也貳遲疑不决也不遷怒不貳過真用力於仁者聖門之好學如此哉旁遇他事㣲有未平即所謂遷萌於隠㣲斬截不果即所謂貳此二語工夫極精密又曰不遷者此心虚明澄然不為怒所遷動也子華使去聲於齊冉子為去聲其母請粟子曰與之釜音父請益曰與之庾愈甫切冉子與之粟五秉音丙子曰赤之適齊也乘肥馬衣去聲輕裘吾聞之也君子周急不繼富原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎子華公西赤孔子弟子冉子冉有也釜六斗四升庾十六斗秉十六斛急窮迫也周者補不足繼者續有餘原思名憲孔子弟子孔子為魯司宼時以思為宰粟宰之禄也九百九百斛辭辭而不受也毋禁止之辭五家為鄰五鄰為里萬二千五百家為鄉五百家為黨當受而辭不當得而請皆意也非中也聖人所以建皇極子謂仲弓曰犁利之切牛之子騂息營切且角雖欲勿用山川其舍上聲諸犁雜文騂赤色周人尚赤色牲用騂角者角周正中犧牲也山川山川之神也家語謂仲弓生於不肖之父鯀殛死禹嗣興安得以其父而舍之種類雖或非才為人子者不當甘自棄也子曰囘也其心三月不違仁其餘則日月至焉而已矣三月一時也不違仁者無纎毫意念蔽其本心也其餘者顔子以次也至者至於不違也本心虚明純然無間者三月三月之外猶未免㣲違此顔子所以幾於聖也若聖人則純徳孔明無違不違之可言矣日至是至於不違者終日月至是至於不違者終月皆覺後事但工夫有如許次第淺深所以諸子皆不及顔歟季康子問仲由可使從政也與平聲下同子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有從政謂為大夫果决斷逹通曉藝有才能乎何有優為之也冉有季路在政事之科而曰果曰藝夫子又亟稱之及相季氏乃有大不然者信道不篤而能不變於習俗者寡矣吁可畏哉季氏使閔子騫為費音秘宰閔子騫曰善為去聲我辭焉如有復扶又切我者則吾必在汶音問上矣不義而富且貴於我如浮雲閔子有定見矣若由與求也終何為哉伯牛有疾子問之自牖由久切執其手曰亡之命矣夫音扶斯人也而有斯疾也斯人也而有斯疾也伯牛姓冉名耕孔子弟子疾淮南子以為癩牖南牖也孟子曰莫之致而至者命也冉伯牛之賢而有斯疾乎此可以言命矣夫子所以重歎惜之子曰賢哉囘也一簞食音嗣一瓢飲在陋巷人不堪其憂囘也不改其樂音洛賢哉囘也簞竹器食飯也瓢瓠也苟樂矣雖死生之變不與易簞瓢陋巷而為之遽改乎要識所樂者何事其不改者何以一日克己之後三月不違之時三歎而三詠也冉求曰非不說音悅子之道力不足也子曰力不足者中道而廢今女音汝畫畫畫斷也知所以說則知所以用力知所以用力則自彊不息日進無疆矣安有力不足者畫者斬然自棄之名也子謂子夏曰女音汝為君子儒無為小人儒儒學者之稱囿於物我而未能行天下之大公者皆小人儒也為儒而未免於小人其禍可勝言哉子游為武城宰子曰女音汝得人焉耳乎曰有澹徒甘切臺滅明者行不由徑非公事未嘗至於偃之室也武城魯下邑澹臺姓滅明名字子羽徑小路取㨗者公事如飲射讀法之類夫子得人之問為宰之法也子游滅明之對觀人之法也子曰孟之反不伐奔而殿去聲將入門策其馬曰非敢後也馬不進也孟之反名側魯大夫伐誇也奔敗走也軍後曰殿戰敗以殿為功也䇿鞭也事在哀公十一年有功不伐固厚之至必若飾辭以自掩不幾於偽乎戰敗而還為國羞辱區區敢後遂謂已功有識者所不為也故夫子美之子曰不有祝鮀徒河切之佞而有宋朝之美難乎免於今之世矣祝宗廟之官鮀字子魚衛大夫有口才朝宋公子有美色巧言令色皆能悅人諂諛之徒尤當世所喜故雖有宋朝之美而無祝鮀之佞亦難乎其免也子曰誰能出不由户何莫由斯道也何莫猶云孰不也人之由斯道如出之必由户也行不著習不察故終身由之而不知耳然則所以不可須㬰離者果安在哉子曰質勝文則野文勝質則史文質彬彬然後君子野言樸野史掌文書者彬彬文質相稱之貌質猶幹文猶華也從根至杪無非造化自然如何欠得但有先後次第耳故曰則以學文子曰人之生也直罔之生也幸而免罔不直也本心本直本無邪枉此人之所以生者失其為直生如無生盗跖之徒蠢蠢然苟活於天地間真幸免耳子曰知之者不如好去聲之者好之者不如樂之者曩嘗謂人患不知耳如渴得飲如夜行逢燭如何不好好後自然融悅滿天地皆春風和氣也如何不樂由今觀之乃知聖訓切中學者之病世間亦不可謂無知者舊習一勝隨即昏失間或好矣往往力量輕薄工夫不繼又未免於怠荒此知及之為難而仁守之尤不易也知而不好與不知同好而不樂與不好同子曰中人以上上聲可以語去聲下同上也中人以下不可以語上也人皆可以為堯舜性無有不善也若論資質則大畧自有三等上知下愚固不可移矣中人以上之人已不易得中人以下䝉蔽之深去下愚無幾而可與之語上也哉使其可語雖愚必明樊遲問知去聲下同子曰務民之義敬鬼神而逺去聲之可謂知矣問仁曰仁者先難而後獲可謂仁矣獲得也乖人道凟鬼神知者不為也仁者難在何處往往纔打不過便放下了直是到險絶處能勇於一進然後為得也纔有計獲之心便不是子曰知去聲下同者樂五教切下同水仁者樂山知者動仁者静知者樂仁者壽知者知此者也仁者能守其所知而不失者也動則運而不窮故樂水静則寂然不動故樂山不滯於物故樂不夭其天故壽然仁者未嘗不動未嘗不樂特别而言之耳子曰齊一變至於魯魯一變至於道齊太公始封之國在禹貢青州之地魯周公始封之國在兖州齊壊於霸習去王道愈逺有聖人作雖大弊極壊便可丕變必曰再變而至於道者次第二國之淺深而言耳期月而可三年有成變之規模也子曰觚不觚音孤觚哉觚哉觚飲器受三升觚而不觚不足以為觚矣為人而不盡其分得謂之人乎宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也從謂入於井也逝往也陷溺也罔理之所無也事之有無或可欺故可逝理之是非不可罔故不可陷子曰君子博學於文約之以禮亦可以弗畔矣夫音扶約要也畔背也博學於文而約以禮非篤志勵行者不能雖未聞道亦可以弗背矣亦可以三字宜細玩夫子之望學者不止於是也要端的直須透徹乃善子見南子子路不說音悅夫子矢之曰予所否方九切者天厭之天厭之南子衛靈公之夫人有淫行孔子至衞使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之矢誓也厭棄絶也子路但知其不可而不知所謂無可無不可無怪其不說也子路所見者人夫子所見者天子曰中庸之為徳也其至矣乎民鮮上聲久矣中者無過不及之名庸平常也至極也鮮少也斯民也三代之所以直道而行也中庸之徳固其日用常事耳民鮮能久而後以為至焉嗚呼豈真鮮也哉子貢曰如有博施去聲於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸夫音扶仁者已欲立而立人已欲達而達人能近取譬可謂仁之方也已博廣也施惠利也病者患其難也譬喻也方猶指歸也立者立之斯立之立達者先知先覺之名已欲立而欲人之皆立已欲達而欲人之皆達此仁者之心也偏私自狹安能如是學者誠切已而反求庶不繆其所趨向矣子貢用心髙逺以廣惠愛為仁而夫子令取譬於近可謂端的融堂四書管見卷三
