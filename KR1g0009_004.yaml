body:
  text: 融堂四書管見卷四宋錢時撰論語述而第七子曰述而不作信而好去聲古竊比於我老彭述述舊也作者已自為之也比類也老彭商賢大夫世衰俗薄不知而作者多去先王益逺信古者已不易得况能好乎夫子所以慨想老彭而竊自比之也雖然二事則同而所以為二事者異祖述堯舜憲章文武豈斯人所可及哉子曰默而識之學而不厭誨人不倦何有於我哉識者識見之識何有言無所有也不可以探索得不可以言語求默而識之妙不可思知及之也識後方知所用力微厭即怠即荒學而不厭仁守之也雖然非自成已而已也所以成物也如是而學如是而誨而在我實無所有虛明變化何厭何倦故夫子又自曰空空如也子曰德之不修學之不講聞義不能徙不善不能改是吾憂也德謂之修者譬如原有此物既壞而復修之也學之講講此而已義之徙徙此而已不善之改改其非此者而已雖曰四事其實一也子之燕居申申如也夭夭如也申申其容舒也夭夭其色愈也春風和氣盎盎無邊子曰甚矣吾衰也絶句久矣吾不復夢見周公吾不復夢見周公猶云今不復作此夢耳聖人之心無適也無莫也何夢不夢之有哉子曰志於道據於德依於仁游於藝據不放逸也依不違也游者非專於具事之名通古今貫三才何莫非道道者無所不通之名也但百姓日用而不知耳得此謂之德全此謂之仁是故發軔首塗莫先於志志不先立何據何依藝曰游則以學文之謂也子曰自行束修以上吾未嘗無誨焉修脯也十脡為束束修贄禮之至薄者苟以是心至則無所不誨矣互鄉之進鄙夫之問可以見聖人之用心子曰不憤房粉切不啓不悱芳匪切不發舉一隅不以三隅反則不復扶又切也憤者心求通而未得啓開導之也悱者口欲言而未能發警悟之也一隅物之一角反者還答也復再也此章備見聖門教人之深㫖憤悱者求而未獲窒而未通汲汲皇皇願見而不可得之時也於此一啓其機即矢去川決矣孟子躍如也正合斯訓然亦觸類而通方可再叩不然徒瀆蒙無益子食於有喪者之側未嘗飽也子於是日哭則不歌臨喪而求飽既哭而遽歌稍知禮者不為也須識夫子所以不飽於有喪者之側與不歌於哭之日其心為如何方見得聖人情性之正子謂顔淵曰用之則行舍上聲之則藏唯我與爾有是夫音扶子路曰子行三軍則誰與子曰暴虎馮皮氷切河死而無悔者吾不與也必也臨事而懼好去聲謀而成者也萬二千五百人為軍大國三軍徒搏曰暴徒涉曰馮曰有道則見無道則隱曰危邦不入亂邦不居賢人之事也若夫用之便行舍之便藏則行藏係於用舍而係於治亂非磨不磷涅不淄者不能也唯我與爾有是夫子所以許顔淵者大矣而子路乃以行三軍為問雖然臨事而懼好謀而成是真行三軍之要㫖也因事啓諭切實的當子路之疾針砭斯言子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好去聲之執鞭賤者事聖人豈苟執鞭以求富貴者所以甚言無可求之理以絶學者外誘之根耳貪鄙之徒不安分義狗彘其行穿窬其心爭錐刀盡錙銖孳孳營營死而不悔是固不足道也有志於學而豐約之際未能無意已不可與入道况求富乎信能於聖人所好之㫖而有味焉則充詘隕穫之病不攻而自去矣子之所慎齊側皆切戰疾齊交神明戰係安危疾係死生聖人固無時而不謹也於此三事愈加謹焉故門人特記之子在齊聞韶三月不知肉味曰不圖為樂之至於斯也三月宜自為一句斯指齊也子在齊聞韶者三月每感其音之盡善盡美而忘肉食之味也虞舜逺矣不謂此樂乃聞於齊乎若謂一聞韶音厯三月之久而不知肉味固無此理史記三月上加學之字學之而至於忘味又大不然冉有曰夫子為去聲下同衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也為猶助也衛君出公輒也靈公逐其世子蒯聵公薨而國人立蒯聵之子輒於是晉納蒯聵而輒拒之諾應辭也伯夷叔齊事見雍也篇衛君父子而爭夷齊兄弟而遜即此形彼是非自明所謂求仁而得仁者仁安在如何求如何得亦曰孝友兩盡不失其本心耳若好名遜國却不是仁子曰飯符晚切疏食飲水曲肱而枕去聲之樂音洛亦在其中矣不義而富且貴於我如浮雲飯食之也疏食粗飯也聖人之心無入而不自得也故疏食飲水曲肱而枕樂亦在其中味一亦字豈專以貧賤為樂者哉雖處富貴而此樂未嘗不在但不義而得者真若浮雲耳子曰加我數年五十以學易可以無大過矣韋編三絶用功於易久矣豈待五十而始學之乎而此云爾者蓋夫子自度其學易至五十可無大過耳易者窮理盡性以至於命者也四十雖已不惑然猶未盡於知天命知天命方是六通四闢徹底洞然盡易道之妙故可以無大過此非姑為謙辭未至從心所欲不踰矩微過亦未免子所雅言詩書執禮皆雅言也雅猶索也後世每云雅故故索之謂也禮非徙誦說故曰執學詩學禮家庭之訓不外乎此至於書又堯舜禹湯文武諸大聖人聖學相傳之㫖具在謂之雅言見得夫子尋常教人大要在此三者學者所宜盡心焉雅言先師謂非方言誦詩書及執禮之時不用鄉談也葉舒涉切公問孔子於子路子路不對子曰女音汝奚不曰其為人也發憤忘食樂音洛以忘憂不知老之將至云爾葉公楚葉縣尹沈諸梁字子髙僭稱公也發憤者果决勇進之謂至於樂則疑無發憤之可言矣埋頭一去無始無終澄然虛明和樂融融雖死生之變如雲氣之在太空忘食忘憂以至忘老嗚呼妙矣豈章句文義可解釋而强通哉子曰我非生而知之者好古敏以求之者也且要識所謂知之者何事求之者何物聖之為聖正在這裏豈區區章句文義云哉自昔聖人未有不學而成者夫子雖謙辭以勉人亦實事也子不語怪力亂神異端專言神怪縱橫專言力亂聖人設教皇極之道也子曰三人行必有我師焉擇其善者而從之其不善者而改之三人與俱其中必有善者不然亦必有不善者善者吾從不善吾改皆吾師也故必有我師子曰天生德於豫桓魋徒雷切其如豫何魋宋司馬向魋也出於桓公故又以為氏非夫子恃天生之德謂魋不能為己害也縱我可害天之與我者可害乎橫逆之來無非大順子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也天何言哉風雨霜露無非教也何隱之有此最是喫緊道與人處要就無行而不與上㑹取子以四教文行去聲忠信非文不著非行不實非忠信不立名四而實一忠信為主行次之文又次之子曰聖人吾不得而見之矣得見君子者斯可矣子曰善人吾不得而見之矣得見有恆胡登切者斯可矣亡讀為無而為有虛而為盈約而為泰難乎有恆矣善人者無不善之名有常者不變之謂惟能不變方可進學而純於善耳然而亦不易得也故曰斯可矣如下文所言三者虛誕無實乃後學之通患如之何其有常哉聖門工夫只一常字是力行之要所以拳拳乎此子釣而不綱弋不射食亦切宿綱提綱繩也弋以生絲係矢而射者宿宿烏也聖人愛物之仁每於不得已而見之此章有湯網三面之意子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識如字之知之次也作者所以發揮其所知不知而作何以作也多聞能擇以從其善多見能識而不繆於是非而謂知之次焉則所謂知者果安在哉豈多聞多見之謂也哉互鄉難與言童子見賢遍切門人惑子曰與其進也不與其退也唯何甚人潔已以進與其潔也不保其往也互鄉鄉名唯何甚猶云不應如此之甚也人患溺於流俗不能自拔耳有向慕之誠固聖人所不棄况能潔已以進哉進則與之甘於自退者不與也潔則與之自此以往者不問也豫攸好德汝則錫之福所以為皇極歟子曰仁逺乎哉我欲仁斯仁至矣仁人心也豈逺於人哉然而舉世茫茫不啻數千萬里之隔者人自逺之耳欲仁仁至非有物自外而來也陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取七住切於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸苟有過人必知之陳國名司敗即司寇也昭公魯君名稠巫馬姓期字孔子弟子名施揖者司敗揖之也相助匿非曰黨魯與吳皆姬姓謂之吳孟子者諱之使若宋女子姓然也居是邦不非其大夫况魯先君乎正使指言同姓之事聖人猶當有所處泛問知禮而遽斥先君之諱可不可也司敗不察輒以為黨夫子不辨自以為過非至聖孰能與此子與人歌而善必使反之而後和去聲之反復也歌所以吟詠情性善者得其正者也必使反之紆餘以暢其㫖而後和之從容以答其意抑揚反復讀之如在春風和氣中子曰文莫吾猶人也躬行君子則吾未之有得文莫猶人猶云莫也如人謙辭也未之有得則斷不敢居之辭愈謙也於此可見文行事體不同躬行君子之不易如此子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也為猶習也言用力於仁也不敢以仁聖自居而曰為之不厭誨人不倦言方用力於此云耳此夫子之所以仁且聖歟子疾病子路請禱子曰有諸子路對曰有之誄力軌切曰禱爾於上下神祗子曰丘之禱久矣禱謂禱於鬼神誄者哀死而述其行之詞也上下天地也天曰神地曰祗先天而天弗違後天而奉天時天且弗違而門人髙弟乃有斯言乎問曰有諸警之深矣何子路猶未喻也知夫子之所以禱則知夫子之所以聖子曰奢則不孫去聲儉則固與其不孫也寧固孫順也固陋也先王制禮所以辨上下定民志儉而陋非中道也不猶愈於不孫乎不孫後何所不至子曰君子坦蕩蕩小人長戚戚坦平夷也蕩蕩無際畔也君子之心虛明洞然無毫髮意念小人行險僥幸顛冥而不自反如坐囹圄如落陷穽茫茫晝夜醉生夢死子溫而厲威而不猛恭而安厲嚴肅也溫而不厲則弛威而猛則暴恭而不安則拘此三句描畫聖人宛然可想泰伯第八子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉泰伯周大王之長子知幼弟季厯之子昌有聖德遂與次弟仲雍逃之荆蠻於是立季厯傳國至昌是為文王三讓先儒謂固讓也或曰逃荆蠻一也文身斷髮示不立二也併仲雍而去之三也其迹不著故無得而稱泰伯讓國而直曰讓天下何哉泰伯知季厯之有子矣殆非讓國也民無得而稱之此所以為至德歟非吾聖人萬世無稱矣子曰恭而無禮則勞慎而無禮則葸絲里切勇而無禮則亂直而無禮則絞古卯切君子篤於親則民興於仁故舊不遺則民不偷葸畏懼貌絞急切也君子謂在上之人興起也偷薄也恭慎勇直皆德也無禮以節之則未免有弊雖然篤於親不遺於故舊又風俗之樞機而禮之所以為禮者也風移俗易禮制行焉則四者之弊去矣曽子有疾召門弟子曰啓豫足啓豫手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫音扶小子啓開也詩小旻篇戰戰恐懼兢兢戒謹臨深恐墜履氷恐陷也父母全而生之子全而歸之豈特身體髮膚之不敢毁傷也哉戰戰兢兢臨深履薄平時所以戒謹恐懼而不敢須臾離者其所全者大矣啓手啓足而曰知免學者毋徒曰手足云也曾子有疾孟敬子問之曾子言曰鳥之將死其鳴也哀人之將死其言也善君子所貴乎道者三動容貌斯逺去聲下同暴慢矣正顔色斯近去聲信矣出辭氣斯逺鄙倍矣籩豆之事則有司存孟敬子魯大夫仲孫氏名捷問問疾也將死言善謙辭也貴重也暴粗厲也慢放肆也信實也辭言語氣聲氣也鄙几陋也倍與背同謂背理也籩竹豆豆木豆動容貌便須逺暴慢正顔色便須近信出辭氣便須逺鄙倍三箇斯字甚緊切有不可須臾離之意且要識所以逺慢所以近信所以逺鄙倍者其實安在非是臨時逐項旋整頓過也君子切身日用在此三事器物之末則有攸司曾子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣校計校也吾友先儒謂顔淵詳味昔者二字當是追述於既亡之後也所有者忘不恥於問也所得者內不耀於外也所樂者天不競於物也顔氏之子其殆庶幾乎曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與平聲君子人也與疑辭也决辭輔遺托國而不能不變於危疑之際者多矣必也處大變定大難節操凛然不可撓奪然後為君子也伊周而下如諸葛孔明當得可以字曾子曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎𢎞寬大也毅剛立有守也道猶行也範圍無外本未始不𢎞剛健不息本未始不毅意起念動始蔽始虧隘矣不𢎞矣始回始撓餒矣不毅矣斷斷曰不可以不𢎞毅所以勉學者用力於仁也任重道逺而下特發揮其㫖以明不可不勉者如此耳樂以忘憂何重何輕老將至而不知何逺何近子曰興於詩立於禮成於樂三百篇無邪之㫖抑揚諷詠足以感發人心油然興起故興於詩禮者人心之大間天則之不可踰者故立於禮樂所以養人心之和使無非僻之侵故成於樂子曰民可使由之不可使知之百姓日用而不知聖人豈不欲使知哉蠢蠢羣愚其蔽已甚雖欲使知之而不可得耳斯言所以歎惜之也子曰好去聲勇疾貧亂也人而不仁疾之已甚亂也尚勇而惡貧必自為亂疾惡而已甚必致其亂安分有容則無二者之患矣子曰如有周公之才之美使驕且吝其餘不足觀也已驕矜夸吝鄙嗇也驕則易於自滿吝則梏於自私二者拒善之藩籬也才愈美病愈深其他何足觀哉子曰三年學不至於穀不易得也穀禾之實苗而不秀者有矣夫秀而不實者有矣夫榖學之成實時也斯道無窮夫子豈責成於三年者哉所以甚言其不易得以勉進後學耳得後方實未得皆虛子曰篤信好去聲學守死善道危邦不入亂邦不居天下有道則見賢遍切無道則隱邦有道貧且賤焉恥也邦無道富且貴焉恥也乾初九文言曰不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也不是確乎不可拔如何做得上面許多事好學而信之篤守道而死不變確乎不可拔之謂也子曰不在其位不謀其政出位而思只是不安分與畔官離次者其失均也子曰師摯音至之始關雎七余切之亂洋洋乎盈耳哉師摯魯樂師名摯也師摯之始豈雅頌未得其所之時乎何獨關雎之洋洋也不然則因摯之適齊追感疇昔而歎耳子曰狂而不直侗音通而不願悾悾而而不信吾不知之矣侗無知貌願謹厚也悾悾無能貌書稱九德交濟其偏聖人所以施教也既狂而又不直既無知而又不願既無能而又多詐聖人且奈何哉故曰吾不知之矣子曰學如不及猶恐失之此知及之後仁守工夫也學如不及猶恐失之况悠悠自恕者乎玩如不及三字如何斯須懈得文王望道而未之見正此不及之謂子曰巍巍乎舜禹之有天下也而不與去聲焉微動纎毫意念便與了純德孔明無體無方巍巍天下我何與也故舜不以為泰禹行其所無事子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章唯猶獨也則法也蕩蕩無際畔也煥光明也天之所以大者何如堯之所以則者何在宜乎莫得而名狀也範圍無外變化無方事業文章光輝發越舜有臣五人而天下治去聲武王曰豫有亂臣十人孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已三分天下有其二以服事殷周之德其可謂至德也已矣五人禹稷契臯陶益亂或作乿古治字也十人周公旦召公奭太公望畢公榮公太顛閎夭散宜生南宫適其一婦人邑姜也斯指武王時也舜有五人武王有十人故曰唐虞之際於斯為盛然且邑姜預焉此其為才豈易得者乎以服事殷乃文王之德而夫子特書於武王之後其指微矣子曰禹吾無間去聲然矣菲音匪飲食而致孝乎鬼神惡衣服而致美乎黻音弗冕卑宫室而盡力乎溝洫呼域切禹吾無間然矣菲薄也黻蔽膝也以韋為之冕冠也皆祭服溝洫田間水道也間如連得間矣之間無間者無罅之可議也才有一毫之私便有一毫之間融堂四書管見卷四
