body:
  text: 融堂四書管見卷七宋錢時撰論語子路第十子路問政子曰先之勞去聲之請益曰無倦先者以身先之也勞即勞民勸相之勞有以先之不令而行有以勞之雖勞不怨為政之道莫要於此而子路猶請益何哉答曰無倦則不必外此二者而求益矣天下事那一件不是倦後放下了仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉於虔切知賢才而舉之曰舉爾所知爾所不知人其舍上聲諸宰為有司之長先者率先之也能率先則或苛於責人或偏於任己又須赦小過舉賢才方盡善賢才固難知舉其所知是矣而不知者他人自應不遺也知其賢而不與立却不可子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂音于也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中去聲下同刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所苟而已矣衛君出公輒也魯哀公十年孔子自楚反衛出公不父其父而襧其祖故孔子欲先正名迂者逺于事情闕謂闕所不知天地定位而卑髙貴賤之名已立名者三綱之所以張五典之所以遜也正名二字聖人之大法為國之大經春秋一書亦只是正名而已施之於衛國固其所當然也子路以為迂真野矣哉且名不正後何如説得言自然不順言不順何以行得事自然不成事不成則亂而無序乖而不和禮樂自然不興既亂既乖刑罰自然不中刑罰不中暴虐是作民自然無所措手足如此而謂之政可乎故曰君子名之必可言也言之必可行也君子於其言無所苟而已矣名才不正只是苟道樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好去聲下同禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫音扶如是則四方之民襁居丈切負其子而至矣焉於虔切用稼種五穀曰稼種蔬菜曰圃用情不欺也襁織縷為之以約小兒於背者農圃小人之事也禮義信大人之事也上之所好者大則在下者莫敢不承四方之民從之如歸矣何以稼為哉孟子之闢陳相正是此意子曰誦詩三百授之以政不達使去聲於四方不能專對雖多亦奚以為專獨也此章見得古人讀書無非切已實事誦三百篇後不達為政之理不能專對四方雖多何以為哉詩通於政故達詩可以言故專對子曰其身正不令去聲下同而行其身不正雖令不從正則不令而行不正則雖令不從行與不從有決然一定而不可易者誰實使之然哉此理在人如何泯沒得子曰魯衛之政兄弟也魯周公之後衛康叔之後兄弟之國也魯三家逐君衛輒拒父魯衛固兄弟也世衰道微莫能相尚其政亦相伯仲云子謂衛公子荆善居室始有曰苟合矣少有曰苟完矣富有曰苟美矣公子荆衛大夫善居室者善處家也始有曰苟合言家道可以粗合非喜其財之聚也少有曰苟完言家道可以粗全非喜其財之足也富有曰苟美言家道可以粗美非喜其富有之為美也富家大吉隱然可見若所美在富聖人何以善稱哉苟字有謙抑自牧之意子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之僕御車也庶衆也聚人曰財庶則不可以不富也資富能訓富則不可以不教也自井田廢而民不富矣自學校廢而民不教矣夫子此語王政之次第也子曰苟有用我者期月而已可也三年有成期月謂周足一月也春秋之民急於望治而先王之制髣佛尚存聖人為之特易為力耳期月已可其感速也三年有成其化洽也子曰善人為邦百年亦可以勝平聲殘去殺矣誠哉是言也勝殘殘暴之風衰也去殺殺戮之威無用也舊有此語夫子稱之善人比聖人功化固不侔也然綿厯百年亦可以勝殘去殺後世郡縣乃有邦之寄數遷數易如傳舍真能有志於民者又數十年不一遇也勝殘去殺之效如之何而可見也哉子曰如有王者必世而後仁王者謂聖人受命而興也三十年為一世聖人功化固甚速也然必三十年之久而後躋民以仁蓋富而教之非年嵗間事當時風俗大壞須是斯民生長教化之中至於光被方成仁俗耳然則三年何謂有成曰所以成必世之規模也子曰苟正其身矣於從政乎何有不能正其身如正人何夫子於正身之道數致意焉大學所以治國平天下者端在此耳故曰於從政乎何有言不難也冉子退朝音潮子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與去聲聞之冉有為季氏宰朝季氏之私朝也晏晚也政國政事家事以用也季氏專權不議於公庭而議於私室不議於大夫而謀於家臣其無君甚矣冉有曰政夫子曰事非詭辭也所以正季氏無君之罪也定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易去聲如知為君之難也不幾乎一言而興邦乎曰一言而喪去聲下同邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎幾近也知克艱者必無宴安鴆毒之禍邦所以興樂面從者必無法家拂士之言邦所以喪葉公問政子曰近者説音悅逺者來葉公見述而篇説之義兑卦詳矣非有以深服乎其心不可強也所以近者説則逺者來矣子夏為莒居吕切父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成莒父魯邑名欲速者事事迫切安能逺到見小者處處窒礙安能大成𢎞則無此病矣葉公語去聲孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為去聲下同子隱子為父隱直在其中矣證父攘羊賊恩甚矣謂之直可乎知賊恩之非直則父子之相隱乃不直之直也故曰在其中樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也才不放逸則本心本自無害居處恭不放逸於暗室屋漏之地也執事敬與人忠不放逸於交事應物之時也然有須臾間斷便不可直云夷狄則其他之不棄可知此言用力於仁至為精切子貢問曰何如斯可謂之士矣子曰行已有恥使去聲於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉鄉黨稱弟去聲焉曰敢問其次曰言必信行去聲必果硜硜苦耕切然小人哉抑亦可以為次矣曰今之從政者何如子曰噫斗筲所交切之人何足算悉亂切也果必行也硜小石之確者噫心不平聲斗量名容十升筲竹器容斗二升算數也恥之於人大矣然有恥非其恥者焉世之人一切外物稍不如人則知惡之至於天爵良貴天之所以豫我而人之所以自别於禽獸者乃甘心自棄溷溷於蛆蠅糞壤而不知反然則行已而有恥者豈不甚可貴乎行已有恥方説得不辱君命子貢善為説辭故警之以此若夫孝弟聞於宗黨則行已之一端所以為次也言必信行必果非大人之事比孝悌不同矣所以又為次下是則淺中狹量小器易盈真溷溷之徒耳何足數哉子曰不得中行而與之必也狂狷音絹乎狂者進取狷者有所不為也中行者由中而行無過不及之名也然而豈易得哉惟不可得故思其次狂者行有不掩未免於過却能有志不肯苟安故曰進取狷者不屑不潔未免不及却知自好不肯妄作故曰有所不為惟進取而後可與進也惟有所不為而後可與有為也子曰南人有言曰人而無恆胡登切不可以作巫醫善夫音扶不恆其德或承之羞子曰不占而已矣南人南國之人恆常久也不恆其德或承之羞易恆卦九三爻辭也巫而無常必至於慢神醫而無常必至於誤疾巫醫而無常且不可况為德者乎羞辱繼之也必矣故曰不占言此爻辭所示不待占而知也子曰君子和而不同小人同而不和和如和羮同如濟水有善相告有過相規不為苟異此之謂和詡詡取下不擇是非務為苟合此之謂同和則不同矣同則不和矣子貢問曰鄉人皆好去聲之何如子曰未可也鄉人皆惡去聲之何如子曰未可也不如鄉人之善者好之其不善者惡之鄉人皆好之安知非願人之徒乎鄉人皆惡之安知非獨行之士乎是非特未定也惟為善者之所好為不善者之所惡則其人不言而決矣是故不得於君子而得於小人有識者恥之子曰君子易去聲下同事而難説音悅下同也説之不以道不説也及其使人也器之小人難事而易説也説之雖不以道説也及其使人也求備焉隨材器使故易事側媚無所容故難説小人則不然徇己之欲而正大者必不投責人以苛而真才實能者未必察公則𢎞私則隘也子曰君子泰而不驕小人驕而不泰心廣體胖自然不驕志滿氣盈自然不泰子曰剛毅木訥近仁朩質朴也訥遲鈍也剛毅則不回撓木訥則不浮馳如此等人資質最美略無疵病無世俗汙濁之過學易為力非近仁乎子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡切切懇到也偲偲詳勉也怡怡和説也子路問士而夫子獨以朋友兄弟答之蓋三綱五常之道由朋友而明忠告善道所係大矣兄弟同氣也惟弟不念天顯兄亦弗念鞠子哀則其於人道何如也友于兄弟乃所以孝於父母然則朋友兄弟之於士行豈不甚重矣哉曰切切偲偲曰怡怡與行行氣象不同所以勉之子曰善人教民七年亦可以即戎矣善人教民豈教之戰哉七年之久必有以得乎其心者雖勝殘去殺之效尚逺然亦可以犯難而不攜矣此與前為邦百年皆著亦可以三字備見善人事體子曰以不教民戰是謂棄之古者兵農未分伍兩軍師之法乃其素習不待教也况春秋之世乎夫子之言為無義戰而歎耳知教則知親其上死其長憲問第十四憲問恥子曰邦有道穀邦無道穀恥也憲原思名穀祿也不知得時所以行道不知儉德所以避難齪齪然但志於祿豈不甚可恥哉雖然知恥者不如是也克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也此亦原憲之問也克好勝也伐誇伐也怨忿恨也欲嗜欲也克伐怨欲不行焉特強遏力制而不發耳其病固在也故曰不可以為仁仁者常覺常明空洞無體元不費分毫力何遏制之有哉子曰士而懷居不足以為士矣居固人之所安也懷之則苟安矣有志者不然非必役役於外而後謂之不懷也子曰邦有道危言危行去聲下同邦無道危行言孫去聲峻也危髙孫柔順也邦有道而不能危言則非盡忠邦無道而不能言孫則非免禍若夫堅節正操所謂確乎不可拔者則未始隨世而變也子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁不必未必也德非期於言也和順積中則自然有言仁非期於勇也養而無害則自然有勇然則言豈頰舌而勇豈血氣之謂哉南宫適古活切問於孔子曰羿音詣善射奡五報切蕩土浪切舟俱不得其死然禹稷躬稼而有天下夫子不答南宫適出子曰君子哉若人尚德哉若人南宫適即南容也羿有窮之君善射滅夏后相而篡其位其臣寒浞又殺羿而代之奡春秋傳作澆浞之子也力能陸地行舟後為夏后少康所誅禹平水土暨稷播種禹受舜禪稷後為周善射蕩舟不得其死而躬稼者乃能有天下德力之效何如哉夫子不答默領其意也出而稱之恐沒其善也非君子必無此見非尚德必無此言子曰君子而不仁者有矣夫音扶未有小人而仁者也念慮之微纎毫微動便是違仁豈若小人之所謂不仁者哉顛冥人欲橫流之中醉生夢死浮沉溷溷安知本心之本仁也子曰愛之能勿勞乎忠焉能勿誨乎勞之者所以愛也誨之者所以忠也不然是禍之耳何謂忠愛子曰為命禆婢之切諶時林切草創之世叔討論之行人子羽修飾之東里子産潤色之為命為辭命也四人皆鄭大夫草創製草稿也世叔遊吉也春秋傳作子大叔討論講究也行人掌使之官子羽公孫揮也修飾者修理文飾之東里地名子産所居也潤色者潤之以華采也鄭國晉楚之間能以弱為強者有人故也一辭命之出凡更四手其不苟也如此則他事可知渙汗其大號所以係國體者甚重夫子特有取焉或問子産子曰惠人也問子西曰彼哉彼哉問管仲曰人也奪伯氏駢薄田切邑三百飯扶晚切疏食音嗣沒齒無怨言子西楚公子申能遜楚國立昭王而改紀其政然不能革王之號昭王欲用孔子又沮止之彼哉彼哉者外之之辭伯氏齊大夫駢邑地名齒年也沒齒猶終身也桓公奪伯氏之邑以與管仲人之得名為人者豈徒形體之謂哉奪邑三百沒齒無怨非有以深服乎其心不可強也夫子獨舉此事而以人許之子産惠人孟子又曰惠而不知為政若知為政則不止於惠矣子曰貧而無怨難富而無驕易去聲素其位而行何驕怨難易之有此特言常人之情耳富而無驕未足多也貧而無怨何所不至哉子曰孟公綽為趙魏老則優不可以為滕薛大夫公綽魯大夫趙魏晉卿之家老家臣之長優有餘也滕薛二國名大夫任國政者或優為或不可為才各有所宜也用違其才則失矣公綽之不欲夫子蓋深知其人者子路問成人子曰若臧武仲之知去聲公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣成人成就為人也武仲魯大夫名紇知特世俗所謂知非知及之也莊子魯卞邑大夫曰者子路又問見利而下夫子答也授命言授其命於人久要舊約也平生平日也凡言亦可以者皆僅辭也兼四子之長而又文之以禮樂宜足以當成人之名矣蓋未至於聖皆未可以言至而况乎四子者未必聞道也耶故曰亦可以夫子參錯其説矯其偏而勉之子路乃復以今之成人者何必然為問苟安甚矣夫子不拒也臨財不苟得臨難不苟免又不失信於平日之言亦人之所難能而子路之所可能者夫子復就而與之語亦所以進之子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公明賈對曰以告者過也夫子時然後言人不厭其言樂音洛然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎公叔文子衛大夫公孫枝也公明姓賈名亦衛人時然後言必無過言樂然後笑必無苟笑義然後取必無妄取三者發而中節非得情性之正不能也故人皆不厭審如是豈易得哉其然者然其言也豈其然乎者難其事而疑之也子曰臧武仲以防求為後於魯雖曰不要一遙切君吾不信也防地名武仲所封邑也要者挾而求也武仲得罪奔邾自邾如防使請立後而避邑得罪而出奔反邑而求後當時固未知其非也夫子直以要君書之此誅心之筆所以懼亂賊者武仲之知如此哉子曰晉文公譎而不正齊桓公正而不譎文公名重耳桓公名小白譎詭也桓公數十年之規模管仲之力也只為正而不譎所以展拓得去一匡九合翕然向附惜其正是才力識見到此特假之耳若就學上得力豈易量哉晉文數年成霸事體故大不同二霸得失兩言而定此春秋褒貶之綱也子路曰桓公殺公子糾居黝切召音邵忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁齊襄公無道鮑叔牙奉公子小白奔莒及無知弒襄公管夷吾召忽奉公子糾奔魯魯人納之未克而小白入是為桓公使魯殺子糾而請管召召忽死之管仲請囚鮑叔牙言于桓公以為相九春秋傳作糾督也管仲不死子糾之難先儒於魏徵論之詳矣愚謂人臣死節當觀其終身大體之所係三仁在殷或去或奴或死義各有歸未可一槩論也槩以死者為是則微箕安所逃哉子路疑管仲之未仁夫子特舉其事業以明之而不言其不死意可見矣如其仁者其指管仲也雖聖人之仁未易可及就事業而論亦管仲之仁也子貢曰管仲非仁者與平聲桓公殺公子糾不能死又相去聲下同之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被皮寄切髮左袵而審切矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也霸與伯同長也匡正也微無也袵衣襟也被髮左衽夷狄之俗諒小信也經縊也莫之知人不知也諸侯知天王之尊生民免夷狄之禍皆管仲之賜也不然則大經大法泯然不存夷狄異類橫行中國而衣冠禮樂之地淪汙於腥羶而莫之救其視區區一死真溝瀆自經之徒耳又况管仲於義可以不死者乎子貢於此復疑其非仁夫子既大其匡天下攘夷狄之功直以匹夫匹婦之諒明其不當死偉然正大是非昭揭而管仲之論定矣公叔文子之臣大夫僎士免切與文子同升諸公子聞之曰可以為文矣臣家臣公公朝薦家臣與己同仕公朝也知臧文仲之竊位則知公叔文子之可以為文文不必以諡義為解也特言其進不隱賢無愧於此諡耳子言衛靈公之無道也康子曰夫音扶下同如是奚而不喪去聲下同孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪喪失位也仲叔圉即文子三人皆衛臣也治賔客則交鄰國者有人治宗廟則修祭祀者有人治軍旅則立武事者有人此衛之所以僅存也雖然維持把握偶未墜耳君曰無道終安能國者乎子曰其言之不怍才洛切則為之也難怍慙也無愧於言者必不苟於所為此章與為之難言之得無訒乎正相發陳成子弒簡公孔子沐浴而朝音潮告於哀公曰陳恆弒其君請討之公曰告夫音扶三子孔子曰以吾從大夫之後不敢不告也君曰告夫音扶三子者之三子告不可孔子曰以吾從大夫之後不敢不告也成子齊大夫名恆簡公齊君名壬事在春秋哀公十四年時孔子致仕居魯三子三家也時無方伯連帥而討逆之議發於致仕之大夫亦可悲矣沐浴而請聖人所以行天罰也公曰告夫三子是太阿倒持不有其柄也之三子告不可是同惡相黨惡傷其類也再言不敢不告者若曰知而不言其責在我言而不行其責在人所以深罪魯之君臣也子路問事君子曰勿欺也而犯之犯謂犯顔諫爭不欺而犯方是盡忠欺而犯焉是無君也所以戒勇者子曰君子上逹小人下逹達之為言到也究竟其事之謂也君子日趨於上不究竟不止小人日趨於下不究竟亦不止子曰古之學者為去聲下同己今之學者為人凡學不自格物致知上做工夫皆非為己也逐逐文義之未昏昏聲利之場安知為己者之為何事哉夫子之時已有此歎蘧其居切伯玉使去聲下同人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎蘧伯玉名瑗衛大夫孔子居衛時常主於其家欲寡過而未能是其所以用力處五十而知非六十而化豈偶然之故哉使者之辭雖謙而實密夫子所以喜之子曰不在其位不謀其政曽子曰君子思不出其位此艮卦象辭曽子因夫子之言而引艮象以證之也知止其所自無越思有一毫不安分之心即出位矣子曰君子恥其言而過其行去聲與其言浮於行也不若行浮於言也夫子於言上著一恥字於行上著一過字大抵學者空言多力行少所以警切之子曰君子道者三我無能焉仁者不憂知去聲者不惑勇者不懼子貢曰夫子自道也夫子常言中庸不可能非謙辭也實不可能也日用平常無思無為何能之有能即起意憂矣失其為仁矣惑矣失其為知矣懼矣失其為勇矣我無能焉夫子所以截學者起意之病根子貢未領而但曰夫子自道何也子貢方人子曰賜也賢乎哉夫音扶我則不暇方比也乎哉疑而未然之辭古之學者為己而暇方人乎呶呶然品藻是非篤實務內者不如是也夫子抑揚其辭所以針子貢之病子曰不患人之不已知患其不能也能言能其實事也與上文無能之旨不同智愚賢不肖之分只是箇能與不能耳以人不知為患必非實能苟實能雖不知何害子曰不逆詐不億不信抑亦先覺者是賢乎逆逆料也億意度也先覺二字肇見於此舉世昏昏醉生夢死而我獨脫然如大寐之得醒故曰先覺此是聖門深造自得第一箇字大學之格物正為此耳豈拘文牽義所可強通哉學者但知以逆料為明億度為知機變之巧荆棘其中自謂過人甚逺而我之所固有者乃茫然不知自反此先覺之所以為賢也夫子此言至明至切微生畝謂孔子曰丘何為是栖栖者與平聲無乃為佞乎孔子曰非敢為佞也疾固也微生姓畝名栖栖猶依依也疾惡也固堅執而不通也誠者非自成己而已也所以成物也若偏守一隅而不通於用則治國平天下之道將誰任其責乎畝以夫子為佞真所謂固者異端之害往往類也子曰驥不稱其力稱其德也驥善馬之名德謂調良也驥非無力也不稱其力而稱其德况人乎無德而負才其害大矣或曰以德報怨何如子曰何以報德以直報怨以德報德匿怨而友且不可况以德而報怨乎必以德而報怨則凡有德於我者如何其報也是故莫若以直報怨以德報德以德報德者人所德於我我亦以德報之也若以直報怨則豈彼有怨於我而我亦以怨報之哉橫逆之來處以大順自反而縮行乎大公所謂直報如斯而已子曰莫我知也夫音扶子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎聖心即天復何所怨行乎大順復何所尤不離日用之間而上達天德之妙非是地步洞然相照雖顔子亦知未盡况他人乎人莫我知而天知之此所以為聖歟或者謂夫子道不行於當世故有是歎愚以為不然公伯竂訴悉路切子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝音潮子曰道之將行也與平聲下同命也道之將廢也與命也公伯寮其如命何公伯寮魯人子服氏景諡伯字魯大夫子服何也夫子指季孫惑志言有疑也肆陳尸也聖賢之窮達係斯道之興廢是有命焉豈人所能為哉伯寮之訴非也景伯之力亦非也斷之以命而君子小人之論定矣子曰賢者辟去聲下同世其次辟地其次辟色其次辟言辟世則其時可知辟地則其國可知辟色辟言則其君可知色與言亦有淺深色方行於顔色未有言也若形於言則已甚矣知幾明微所以免禍此賢者之事也若聖人則不然仕止久速惟義所在無適無莫安所辟哉或曰龍逢比干何以不辟曰委質為臣蓋有義不可得而辟者事體各不同也子曰作者七人矣此承上章而言能如是者凡七人也豈微子篇所謂逸民者歟子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與平聲石門地名晨門掌晨啓門者自從也知其不可而不為者晨門之所以賢知其不可而不可以不為者夫子之所以聖晨門但知晨門而不知夫子之為夫子者也子擊磬於衛有荷去聲蕢其位切而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜苦耕切乎莫己音紀知也斯己音以而已矣深則厲淺則揭起例切子曰果哉末之難矣磬樂器荷擔也蕢草器也硜硜釋見子路篇鄙哉硜硜指當時之人也斯己於此遂止也以衣涉水曰厲攝衣涉水為揭此兩句衛風匏有苦葉之詩也果哉言果於忘世末無也聞擊磬而知夫子歎鄙哉硜硜之莫已知荷蕢之賢亦豈易得哉必欲於此遂止而以為得厲揭之宜則是果於忘世矣民墜塗炭義不能一朝安所謂被髮纓冠而往救者也若果於忘世豈聖人之所難哉荷蕢亦晨門之流子張曰書云髙宗亮隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總已以聽於冢宰三年髙宗商王武丁也諒信也隂默也謂居喪信默而不言也諒隂三年不言所以居喪也百官聽於冢宰所以居攝也厯三年之久而冢宰攝行其事非徒不言而已子張獨以髙宗為問夫子獨以古人為答則是當世此禮已不復先王之舊矣後世乃有創為短喪以日易月者嗚呼豈人情也哉子曰上好去聲禮則民易去聲使也禮辨上下定民志上不好禮如水脫防乖爭凌犯之風肆矣可得而使哉世衰俗壞那一事不就不知禮上做出率意妄作幾無以自别於禽獸才知禮便自然和子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸修己以敬正大學之要旨所謂治國之道及平天下皆本於是子路不能切實內省意若未足而再三問之夫子既答以安人又答以安百姓次第推究不離修己二字又恐其未喻也直以堯舜猶病答之嗚呼敬哉外此而求多也哉原壤夷俟子曰幼而不孫弟長上聲而無述焉老而不死是為賊以杖叩音口其脛其定切原壤孔子之故人也母死登木而歌夷蹲踞也俟待也述猶稱也脛足骨也賊仁者謂之賊侈然自放則本心亡矣非賊而何然其病則自不孫弟始方其童幼傲然莫知有敬事其長上之道不孫不弟習以性成及其長也又無一善之可稱果何貴於食天地之粟而謂是人也老而不死是為賊耳因原壤踞肆推明三節以諭之復叩其脛以警之夫子教人未有如此章之切直者然則童蒙之日可不以孫弟為先務而使習於禮訓也哉闕黨童子將命或問之曰益者與平聲子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也闕黨黨名童子未冠者將命蓋夫子使之傳命也欲速成必至於躐等居位並行皆躐等之病真求益者不如是也夫子使之將命所以斂而抑之使循其序歟時未欲與之言因或者有問而答以此童子其聞之矣融堂四書管見卷七
