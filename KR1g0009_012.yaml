body:
  text: 融堂四書管見卷十二宋錢時撰大學古者八嵗而入小學教之以灑掃應對進退及禮樂射御書數之文至十有五始入大學此書所述是已篇首總提獨斷斷曰在明明德曰在新民曰在止於至善辭專㫖確截然斬然以明外此無他道也自學校廢教法不明而學非其學異端邪說橫流奔放盡壞人心無所不至所幸遺經僅傳尚可存考而支離傳注又從而蝕之豈不甚可歎哉學者首明所先者何在所格者何物而不謬其所止焉則大學之道庶乎其得矣大如字學之道在明明德在親先儒作新民在止於至善明明德者自昭明德之明也本心本明本無所蔽物欲乘之其明始昏大學之道所以去其蔽而明之也新民者咸與維新之新也同有此心同有此理染於習俗遂至淪汚大學之道所以去其舊而新之也雖然曰明曰新必有用力之地矣故又曰在止於至善善非外鑠也我固有之也不容於僞不參於思先天地而固存亘古今而莫變君子存之存此而已先立乎其大者立此而已謂之至善豈欺我哉行不著習不察是以放而不知求於此而得所止焉則所謂明德如水不波自然而明非止之外别有所謂明也所謂新民如物去垢自然而新非止之外别有所謂新也統而論之則三箇在字提一書之綱析而言之則一箇止字又三者之要知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得后與後同慮即思也此一節是論止於至善工夫止則至矣然不知後安所用其力哉是故必貴於知止也知後方有端的處故曰有定定者不可轉移搖奪之謂定後方能靜不定而求靜不能也非定而又有靜也靜是定之至處靜後方能安不靜而求安不能也非靜而又有安也安是靜之熟處曰定曰靜曰安一節深一節此正指學者用工切實之㫖豈浮文虛論尋流逐末者所可知哉洪範思曰睿孔子亦云不思則罔然未至於安斷亦不能思也意念昏擾憧憧往來捷出橫生展轉只是意念猶之風濤帖息海靜淵澄思則得之於是乎在直至此地始曰能得得即得其所知者所謂至善也昔焉知之方知此物今焉得之是得此物非知是一物得又是一物也自知後多少工夫到得處或者微有所見方是知止之初便謂事了安能究竟亦固有天資粹美種種省力與常人不同者要之學者且當以斯訓為的物有本末事有終始知所先後則近道矣此一節論至善是本始處自吾心而逹之萬物皆物也但有本末耳自從事吾心而及於萬事皆事也但有終始耳曰末曰終尚在所後本始之地安可外求知本始之在所先則端緒不謬而知止工夫庶乎可進矣故曰近道或者不知所先務方逐逐乎事物之末用力愈勞去道愈逺此絶學之所以不明也可勝歎哉然此特指初學者用力之地而言本末無二理也始終無二致也一以貫之非彼非此何本何末何始何終古之欲明明德於天下者先治平聲後倣此其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物致者至之也格正也明辨之謂也物指固有之物即志所謂有物混成是也此一節推原本始之在所先曰明明德於天下曰治國曰齊家曰修身曰正心曰誠意曰致知從博至約一節深一節凡六箇先字至於格物最先最先此所謂本始之地也中庸曰不明乎善不誠其身矣格物者明善之謂也所以致其知也故曰致知在格物是物也混成無虧範圍無外是謂太極是之謂一至精至粹至明至靈至大至中而謂之至善者也先知先覺正在乎是非外物也非尋流逐末模擬揣量事事而求物物而索而後謂之格也凡蔽於意見似是而非役於聰明認邪作正而不能究其端的者皆未可以言格也方其未知逺若天外既格之矣不離吾心如旅還家如夢自覺嗚呼至矣章首言明明德者統論大學之道在明人之明德也此言明明德於天下者專論明吾明德於天下而天下之所以平者也此外次第說並見後物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治去聲後倣此國治而后天下平上節是言欲如此者當知所先反而求之也此節是言能如此者斯見於用推而達之也自物格至天下平凡七箇后字本末終始之序可厚誣哉物格者此理洞然究見端的無他蹊徑無復疑似故曰知至知至則知止矣所謂真知非苟知也知之既至意自然誠知不至而曰意誠無是理也意誠然後心正矣心正然後身修矣自此而下次第推行皆分內事自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也上兩節專言治國平天下於此復論自天子至於庶人皆當以修身為本也從格物至正心皆修身之事一者志一之一斷斷乎是無他道也以是為本乃知所先端緒不明先後倒置則所謂辭其本而薄其所厚者多矣聖人於章末斷之曰此謂知本又曰此謂知之至其曉人之意深矣右第一章總論大學之道誠意以後下文詳矣探本窮源正在格物二字學者於此反致疑焉以愚見觀之其說甚詳其義甚明首論知止而先之以止於至善者此也終論知本而繼之以知之至者此也首尾六節無非反覆講明此事不然則所謂本者何在所謂有定而至於能得者何物哉或曰知至固知止矣然知至之下則說意誠心正知止之下則說有定靜安不亦異乎曰不異且未有意不誠而能定能靜能安者實履而後知之所謂誠其意者毋自欺也如惡去聲惡臭如好去聲好色此之謂自慊讀為慊若劫切故君子必慎其獨也小人閒音間居為不善無所不至見君子而後厭讀為黶然掩其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也曾子曰十目所視十手所指其嚴乎富潤屋德潤身心廣體胖步丹切故君子必誠其意毋者禁止之辭慊者行有不慊於心之慊獨者心之隱微人所不見不聞故曰獨也閒居猶言平時厭然閉藏貌廣寬裕也胖安舒也其嚴乎疑辭格物致知在誠意之先首章經文論之詳矣故此下只說誠意以後數節事以毋自欺釋誠意可謂明切誠者物之終始不誠無物此是知後力行第一箇字然心之隱微誠不誠誰得而知直是無自欺方是實履以惡臭好色為喻言其好惡出於中心之誠然故曰自慊此二事人情所同求用力於學如此者千萬人而不一遇也是故君子必謹其獨獨非必暗室屋漏之謂雖大庭廣衆而一念之動我自知耳於此致謹正是做不自欺工夫學者說聖說賢而心之所存曾穿窬狗彘之不若意在欺人實乃自欺雖然人亦終不可得而欺也子曰察其所安孟子曰莫良於眸子自然漏露焉可厚誣此正所謂誠於中形於外然則小人於見君子之頃而欲掩其閒居之素難哉至此復申言必謹其獨四字尤更切至十目十手而下是發明謹獨之義常人只謂心之隱微人不知不見便走作了若於此時凜乎其嚴便如十目所視十手所指如何敢欺非真到十目十手之地而後方謂之嚴也故曰其嚴乎潤屋潤身而下是推明誠於中形於外之義富則自然潤屋德則自然潤身猶之心既廣體自胖如何可掩故君子必誠其意也一箇毋字三箇必字立詞甚嚴學者所宜深體詩云瞻彼淇澳詩作奧於六切菉詩作緑竹猗猗於宜切叶韻鳥何切有斐詩作匪君子如切如磋如琢如磨瑟兮僩遐版切兮赫兮喧詩作咺况晚切兮有斐君子終不可喧兮詩作諼况逺切如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂相倫切栗也赫兮喧兮者威儀也有斐君子終不可喧兮者道盛德至善民之不能忘也詩衛風淇澳篇淇澳者淇水之涯也緑色也猗猗美盛之態匪者反辭此作斐文貌治骨角者切而復瑳治玉石者琢而復磨瑟矜莊貌僩威嚴貌赫赫然可覩喧宣著也喧韻書通作諼詐也道言也下文同磋者以物瑳也故曰道學磨者自磨之故曰自修恂栗敬懼也此一節又推廣上文言誠於中者不特形於外盛德至善感於人心使之稱道而不能忘皆吾此誠之所致心之隱微可自欺乎道學自修是誠於中者恂栗威儀是形於外者猗猗有斐皆指其發見者而言詩云於戲音嗚呼前王不忘君子賢其賢而親其親小人樂音洛其樂而利其利此以沒世不忘也詩周頌烈文篇於戲歎辭前王謂文武也此一節又推廣上文言誠之感人不特一時不能忘雖沒世之後猶有不可忘者心之隱微又可自欺乎其賢其親其樂其利前王之所為也賢之親之樂之利之後世之所以不忘也自其形於外而推之民之不能忘自民之不能忘又推之至於沒世不忘所以極言誠之不可掩如此嗚呼至哉是故君子之道建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑其要只在謹獨康誥曰克明德大讀作泰甲曰顧諟天之明命帝典曰克明峻書作俊德皆自明也康誥周書克能也大甲商書諟說文審也顧諟猶是言照管精微不差失也帝典即堯典峻大也此下三節乃釋篇首三句自知止至能得無非誠意工夫故曰明德曰新民曰止於至善皆叙之此章之內最見大意愚每讀書至此未嘗不三歎三詠曰大哉誠乎其大學之本乎殆非錯簡也天之明命即天之豫我昭然而不可誣者顧諟所以明之也引用書語之下斷之曰皆自明極見得工夫由己處吾之明德豈他人所能明哉湯之盤銘曰苟日新日日新又日新康誥曰作新民詩曰周雖舊邦其命維新是故君子無所不用其極盤沐浴之盤銘者名其器以自警也苟誠也作者鼓舞興起之也詩大雅文王篇周自后稷封邰世有國上而受天之命實自文王始邦雖舊而命則新也此就新字推廣三節盤銘之新新德也康誥之新新民也文王詩之新新天命也君子用心無所不至故曰無所不用其極只為天地間事皆吾分內事有纎毫不至便是不誠詩云邦畿千里惟民所止詩云緡詩作綿蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於音烏緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信詩商頌𤣥鳥篇邦畿王者之都止居止也詩小雅綿蠻篇綿蠻鳥聲隅角也詩文王篇緝續也緝熙猶繼明也敬止即欽厥止此節推明止字尤詳易曰艮止也止其所也何謂所至善之謂也不得其所而妄止焉其弊可勝言哉首章但云知止於此又發知其所止之義詞㫖警策讀之令人悚然所以開悟後學者深矣前兩詩之言特大率借喻緝熙敬止方是事實上工夫此理在人本無缺闕所以冥冥妄行失其所固有者只為不知所止誠止矣在君曰仁在臣曰敬在子曰孝在父曰慈在國人交曰信在在處處無非至善子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本猶人不異於人也無情之辭虛辭也大畏者有以戒謹恐懼之也此章論誠意備矣於此又言不特自誠而已且能使人亦無不誠也情僞相感所以成訟非戒謹恐懼不敢自欺能無訟乎無情者不得盡其辭大畏民志則無不誠矣非吾意之誠何以致之故又申之曰此謂知本是本也即首章之所謂本惟知本是以誠此語雖在無訟之後實總結誠意一章之㫖右第二章論誠意先儒謂此章多錯簡愚據舊文玩味經㫖自然通貫本無差舛謹發此義願與同志者明之所謂修身在正其心者身有所忿弗粉切懥敇值切則不得其正有所恐懼則不得其正有所好去聲樂五教切則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂修身在正其心忿懥怒也喜怒哀樂人皆有之發而中節未嘗不正惟夫動於血氣誘於物欲撓奪于外怵迫其中能不為之纍者寡矣是故身本正也有所忿懥有所恐懼有所好樂有所憂患則不得其正其本於吾心者豈不甚可畏哉有所字宜細看正是偏倚處雖然非他有術以正之也使不為心害耳為害者去則本心本自無恙古人戰戰兢兢如臨深淵如履薄冰顛沛造次不敢須臾微懈者用力於此而已心有所奪隨奪而馳則雖視而不見聽而不聞食而不知其味矣欲身之修可得乎此心之所以不可不正也故又斷之曰此謂修身在正其心右第三章論修身在正其心自誠意而後凡五章雖先後次第如此其實文義却是從後面節節說來如此章所論只是說欲修身不可不正其心非是說誠意後事也若意誠則心無不正矣安得復有許多節次後皆凖此所謂齊其家在修其身者人之其所親愛而辟讀為僻下同焉之其所賤惡如字而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖去聲惰而辟焉故好去聲而知其惡惡去聲而知其美者天下鮮矣故諺音彥有之曰人莫知其子之惡莫知其苗之碩此謂身不修不可以齊其家人謂衆人之猶於也辟偏也諺俗語也碩即碩果不食之碩敖惰固非性情之正曰親愛曰賤惡曰畏敬曰哀矜皆發於四端人之所不能無者但溺於偏私倚著一處則所謂僻也處身之道公平無我是非兼照則衆心肅服家自然齊一有偏焉人道乖矣其禍可勝言哉偏於所好輒忘其惡偏於所惡輒忘其美流俗暗淺大抵如是故曰天下鮮矣不知子之惡不知苗之碩皆所以推明辟字右第四章論齊家在修其身却只說身之所以不修處若說身之所以修即是上章正心事矣立辭嚴密極宜細玩且於齊家利害愈更深切上章只說心之所以不正處文意亦如此上章四箇有所字此章六箇辟字其實皆心之病但上四者止是自身裏事此六者是施於人即處家之道也所以不同所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟去聲者所以事長丁丈切也慈者所以使衆也康誥曰如保赤子心誠求之雖不中去聲不逺矣未有學養子而后嫁者也其家不可教其教不足以行於家也教不足行於家而能教人安有是理哉君子不出家而成教於國教行而人自化耳孝弟慈是教之大者雖然行於家者不特能化人也事父孝而忠可移於君事兄弟而順可移於長以至慈之足以使衆往往同此一理譬如保赤子本不能言心誠求之自然中其所欲初非學養子而後嫁也謂之所以猶云即是此事以之事君以之事長以之使衆豈待學而後能哉一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨音奮事一人定國機者如弩之機也僨覆敗也此節又言善惡皆足以使人化也君子之德風小人之德草草上之風必偃不幸為人上者為貪刻為暴戾則從風而靡必有甚焉者矣仁讓說一家貪戾却只說一人仁讓之化止於仁讓貪戾之禍遂至作亂可不謹歟可不懼歟一言僨事一人定國愈見其機之不可輕發處堯舜率天下以仁而民從之桀紂率天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所藏乎身不恕而能喻諸人者未之有也故治國在齊其家喻開曉之也此節又言為人上者君無其實亦難强人之從也堯舜實有此仁故民亦從而仁桀紂實有此暴故民亦從而暴令民者在此而其所好者在彼如之何其可從哉傳曰以身教者從以言教者訟又曰夫子教我以正而夫子未出於正皆此之謂也是故己有其善而後可求人之善己無其惡而後可非人之惡所藏乎身不恕而欲以空言呶呶於人不可得矣恕字是一章之綱領已行得人亦行得家行得國亦行得此所以成教所以興所以從若只是自家偏私之說如何能喻詩云桃之夭夭平聲其葉蓁蓁音臻之子于歸宜其家人宜其家人而后可以教國人詩云宜兄宜弟宜兄宜弟而後可以教國人詩云其儀不忒正是四國其為父子兄弟足法而後民法之也此謂治國在齊其家詩周南桃夭篇夭夭少好貌蓁蓁美盛貌之子猶言是子歸嫁也宜者相宜之宜又詩小雅蓼蕭篇又詩曹風鳲鳩篇忒差也此下引用三詩總結上文之意詞㫖條達一唱三歎讀之令人感動宜者義所當然人心自然之則也宜於家宜於兄弟所以可行若不宜則閨門之內齟齬萬狀如之何而教國人哉我之儀表不差四國所以可正經文直書其下曰父子兄弟足法而後民法之於本分上有纎毫缺闕便不足法舜為法於天下只是察於人倫世衰道微天屬為仇有若周人化商之書可為太息者多矣聖賢於此所以深致意歟兩言治國在齊其家尤更懇切右第五章論治國在齊家所謂平天下在治其國者上老老而民興孝上長長皆丁丈切而民興弟上恤孤而民不倍與背同是以君子有潔胡結切矩之道也所惡去聲下同於上毋以使下所惡於下毋以事上所惡於前毋以先去聲後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道老老者老吾老也長長者長吾長也幼而無父曰孤潔度也矩所以為方者上章言孝弟慈此章言老老長長恤孤三者風化之首天下之本在國國之本在家莫大乎是所以申言之上章言恕此章言潔矩亦一理也興孝興弟以致於不倍豈强之使然哉先得我心之同然機應響答自有不言而化者此心此理焉可厚誣是以君子體此心推此理而有潔矩之道也執矩而度可使四下均平舉斯加彼所惡勿施此恕之事天下所以平也上下前後左右無一不然方盡得此道詩云樂音洛只音紙君子民之父母民之所好去聲下同好之民之所惡去聲下同惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟讀為則為天下僇與戮同矣詩云殷之未喪師克配上帝儀詩作宜監于殷峻詩作駿命不易去聲道得衆則得國失衆則失國詩小雅南山有臺篇只語辭又詩小雅節南山篇節截然髙大貌師尹周大師尹氏也其俱也辟偏也僇殺戮也又詩文王篇師衆也配合監視峻大也不易言難保也此節引用三詩反覆推廣上文之意言好惡順於民心是潔矩之道也則民視之如父母好惡偏於己私非潔矩之道也則天下之所共僇又推言天命之難諶因民心而向背人君之於此道有以得衆則得國矣所謂民之父母也至於失衆則失國矣所謂天下僇也前章六箇辟字言家之所以不齊於此直言辟則為天下僇自昔亡國敗家以至身之不可保者其禍皆本於此好惡之際安得不謹其所發哉是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用德者本也財者末也外本內末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出康誥曰惟命不于常道善則得之不善則失之矣爭民者爭鬭其民施奪者施之以奪攘之道也悖逆也此節因上文得衆失衆又推原潔矩之道莫善於有德莫不善於聚財也德者人心所同有即其好惡之不可違者志曰德之流行速於置郵而傳命是故君子必先謹乎德才有德便有人所以得衆也才有人便有土所以得國也有財有用特餘事耳德為本財為末外其所本內其所末是鬬天下之民而施之以奪攘之道也故曰財聚則民散財散則民聚易曰何以聚人曰財財者民生之所賴人君欲專有之幾何其不畔且離哉况務為聚財未免悖入以是得之必以是失之故又曰言悖而出者亦悖而入貨悖而入者亦悖而出龍斷之夫推筋剝骨以自豐殖謂可安坐而有也然喪敗之禍曾不旋踵向之出乎爾者今而後皆得反之內財外德其弊如此潔矩之道所以不可不行也上節曰峻命不易道得衆則得國失衆則失國此節又曰惟命不于常道善則得之不善則失之吁可畏哉命即天命道即潔矩之道有德則善聚財則不善楚書曰楚國無以為寶惟善以為寶舅犯曰亡人無以為寶仁親以為寶秦誓曰若有一個古賀切書作介臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉惟仁人放流之迸讀為屛諸四夷不與同中國此謂惟仁人為能愛人能惡人見賢而不能舉舉而不能先命鄭氏作慢也見不善而不能退退而不能逺去聲過也好人之所惡惡人之所好是謂拂人之性菑古灾字下同必逮夫音扶身楚書楚語也舅犯晉文公舅狐偃字子犯亡人文公時為公子出亡在外也仁親有仁德而相親者事見檀弓秦誓周書斷斷者專確之辭休休廣大樂易也如有容者汪汪停涵若有所容然而無涯涘之可測也媢忌也違拂戾也殆危也迸猶逐也拂逆也此節因上文善不善而推明潔矩之道好惡之公又在於用人也惟善以為寶是寶善人仁親以為寶是寶仁親之人秦誓所謂休休有容者好得其所好也故曰利媢疾不能容者惡非其所惡也故曰殆仁人之心好惡出於至公是以放流而屏絶之直至不與同中國舜之於四凶是也若夫見賢而不能舉舉而不能先見不善不能退退又不能逺豈人之好惡也哉斷之曰好人之所惡惡人之所好是謂拂人之性菑必逮夫身與前民之父母正相反所以總結上文之意君子有大道必忠信以得之驕泰以失之生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣君子者成德之名驕自矜也泰自滿也無遊民則生者衆而坐食者自然寡矣不奪農時則為者疾量入為出則用者舒恆常也此節又言德財固有本末然莫不皆有大道也或曰財亦可言大道乎曰起居飲食日用應酬萬變萬務孰非大道故曰誰能出不由户何莫由斯道也但是者是道非者非道耳若止談𤣥說妙虛無為宗則三綱可淪九法可斁而周公經國一書所以均節財用者皆無道之具文矣而可乎將君子與生財對說皆曰有大道發明最為深切夫道一而已矣若分别作兩項便差君子有大道非外襲而取之我固有也但忠信不虛僞自然無恙故大戴記忠信大道驕泰即意動氣盈失其本心矣君子之所以先謹乎德者此其用力之地也生之者衆食之者寡為之者疾用之者舒則財常足古人生財初無他術所謂大道如斯而已後世生之者寡而食之者衆為之者舒而用之者疾方病其不足也而戞戞然思所以聚之百方而誅求之民如之何其不困國如之何其不匱也哉仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也發猶起也上節既言生財有大道此節又就財上拈出仁不仁之兩端以發明之仁者以財發身非求發其身也財散而身自尊也不仁者以身發財非不愛其身也知有財而不知有身也自古人君所以事不克終而府庫非其有者只為人心乖亂不知有義耳上既好仁則下自然好義下好義則事可久成富可長守是仁人不有其財乃所以能有其財也豈逆衆斂怨戞戞自計者所可知哉此正仁者以財發身之事孟獻子曰畜許六切下同馬乘不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也長丁丈切國家而務財用者必自小人矣彼為去聲善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也孟獻子魯賢大夫仲孫蔑也畜馬乘士初試為大夫者也伐冰之家卿大夫以上喪祭用冰者也百乘之家有采地者也自由也彼指小人也善之謂長於其事善者謂善人也此則言不仁者以身發財之事也不仁者以身狥財而不顧豈可用乎國有盜臣不祥莫甚而曰與其有聚斂之臣寧有盜臣所以極言其不可用也何也盜臣止於盜國而聚斂則禍及民矣獻子斯言蓋謂國不當以利為利以義為利也大抵有國有家而務財用者必自小人始彼為善於其事是以世主甘心焉心計之巧算析秋毫善之之謂也不幸而使小人專國家之權元氣既傷本根既撥則菑害並至雖有善者亦不能如之何矣此正以身發財之效也於是復申言此謂國不以利為利以義為利丁寧懇切為人上者宜動心焉右第六章論平天下在治其國融堂四書管見卷十二
