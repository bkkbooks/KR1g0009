body:
  text: 融堂四書管見卷八宋錢時撰論語衛靈公第十五衛靈公問陳去聲於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也明日遂行在陳絶糧從去聲者病莫能興子路慍紓問切見賢遍切曰君子亦有窮乎子曰君子固窮小人窮斯濫矣陳謂軍師行伍之列俎豆禮器在陳者自衛適陳也興起也固者堅守節行確乎其不可拔之謂非毋固疾固之固也濫泛溢不可則止寧用終日困德之辨不失其亨此聖人明去就之宜處患難之道也固者至死不變况窮乎小人惟不能固所以溢子曰賜也女音汝以豫為多學而識如字之者與平聲下同對曰然非與曰非也豫一以貫之參也魯無支離浮雜之病况又功深力到故竟以一貫語之言下便領子貢聰明多知正是他礙事處不多之㫖既嘗發之矣於此復先提其所病而後語以一貫之妙惜乎猶未領也觀其平日號為多言如何到這裏却道不得一箇唯字此殆未悟性天道不可聞之先歟子曰由知德者鮮矣鮮上聲人孰無此德所以不知者其病安在鳶飛魚躍蓋甚昭昭也夫子呼由而語之警䇿深矣子曰無為而治者其舜也與平聲夫音扶何為哉恭已正南面而已矣觀舜受堯禪朝覲諸侯遍厯四嶽庶事從頭多整頓過如何却道無為如何又道有天下而不與聖心虛明變化無方雖為而實未嘗為也雖有天下而實未嘗與也後世才說勤政便焦勞才說無為便不事事安知所謂恭已正南面也哉子張問行子曰言忠信行去聲篤敬雖蠻貊亡百切之邦行矣言不忠信行去聲不篤敬雖州里行乎哉立則見其參七南切於前也在輿則見其倚於衡也夫音扶然後行子張書諸紳篤厚也蠻南蠻貊北狄二千五百家為州其指忠信篤敬參於前參錯於前也衡軛也紳大帶之垂者書之志不忘也子張嘗問干祿嘗問達此又問行大抵皆務外以求遂其所欲夫子一使反求諸已就言行上切實用功正切子張之病而教之也逺而蠻貊近而州里習俗雖異本心則同忠信篤敬感無不通見其參前見其倚衡則是無時而非忠信篤敬也無往而非忠信篤敬也舉天地萬物萬變萬化皆我忠信篤敬之妙也行矣雖百世以俟聖人而不惑矣何州里蠻貊之間哉子張書紳惜乎未領子曰直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之史官名也魚衛大夫名鰌如矢言直也史魚自以不能進賢退不肖既死猶以尸諫卷收也懷藏也邦無道如矢最見得他直處有道之世能直固難至於所遭之時﨑嶇艱棘而不能變其守非獨立不懼不易乎世未易語也有道則仕無道則可卷而懷之可字最宜玩味若無可卷懷而徒為髙尚特素隱耳不得為之君子子曰可與言而不與之言失人不可與言而與之言失言知去聲者不失人亦不失言聖人之於語默如是其不苟哉自非清明洞然有以真知其人之可不可必未免二者之失也是故失人者不足以成物失言者必至於招憂子曰志士仁人無求生以害仁有殺身以成仁仁者不失其本心之謂義所當死而幸生苟免則本心亡矣生猶無生也當死而死浩然無愧乃所以成仁雖然各惟其可而已苟可以不死而勇於自殺則與求生害仁者均一失也豈志士仁人之所為哉子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者入芝蘭之室久而不聞其香己欲為仁而所事所友者或非其類其不至於波流風靡者幾希矣顔淵問為邦子曰行夏之時乘殷之輅音路車名服周之冕樂則韶舞放鄭聲逺去聲佞人鄭聲淫佞人殆夏時以建寅之月為嵗首商輅木輅也輅者大車之名周冕有五祭祀之冠也韶舜樂也放者禁絶之鄭聲鄭國之音佞人者邪諂之人殆危也四代禮樂經世之大法夫子之得邦家其規模可見矣顔淵此問其在請事斯語之後乎克己復禮大本既立為邦之道可由是而推己夫子既告之以四代禮樂而復以鄭聲佞人為慮於此二者少不加謹則克己之功且從而隳矣如禮樂何子曰人無逺慮必有近憂慮不經逺患在目前此必然之理也子曰已矣乎吾未見好去聲下同德如好色者也夫子再發此歎而加已矣乎三字其辭愈切而所以警人者愈深矣一日克己豈易得哉子曰臧文仲其竊位者與平聲知栁下惠之賢而不與立也竊者盜竊而私於己之謂栁下惠魯大夫展獲字禽食邑栁下諡曰惠與立與之並立於朝也賢如栁下惠邦家之光也豈易得哉秉政之臣不知則已知之而不與立此文仲之所以竊位歟一竊字所以誅其心若大公無我推國之名器與賢者共之安得有此病也惟是若一已之私物是以惴惴患失常恐賢者之進為己不利百方而擠之而斥逺之矣何暇與之並也哉子曰躬自厚而薄責於人則逺去聲怨矣薄於責己厚於責人則人不心服而召怨也必矣子曰不曰如之何如之何者吾末如之何也已矣輕慮躁發必不能為此丁寧戒懼之辭也雖聖人且奈何哉事到兢兢然若不勝其任處方有商量子曰羣居終日言不及義好去聲行小慧難矣哉小慧者機巧小數也所貴於羣居者相規以正相觀而善也為無益之談為機變之巧此其為害有不可勝言者故曰難矣哉然飽食終日無所用心則未免此弊耳真有志者不如是也是故學必貴友子曰君子義以為質禮以行之孫去聲以出之信以成之君子哉質猶體也孫和順也質是立骨子處骨子端正方說得禮方說得孫方說得信且如老佛之教亦能禮其所謂禮亦能孫亦能信只為滅天倫壞人道從頭錯了是以徹底皆差為萬世大法之罪人一義字吾聖人所以立極所以維持三綱五常自别於夷狄禽獸者也義以為質乃是制事之本不可草草放過有此質後却不可無禮無禮則斷不可行有禮矣不孫則斷不可出孫矣無信則斷不可成子曰君子病無能焉不病人之不已知也苟能矣何患人之不己知哉以人不知為病其病始大子曰君子疾沒世而名不稱焉非疾無名也疾其無可稱耳子曰君子求諸己小人求諸人小人求諸人非特要譽而已凡所以汲汲皇皇遂私從欲而不知止者無一而不求諸人也君子務內只是自反子曰君子矜而不爭羣而不黨矜莊不放逸也信道不回非好勝也故雖矜而不爭和氣接物非偏私也故雖羣而不黨子曰君子不以言舉人不以人廢言必考其實故不以言舉人不狥其名故不以人廢言此心公明方可語此子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人子貢方人一恕字正中其病昔也謂非所及而今之語其可進此矣夫子曰吾之於人也誰毁誰譽平聲下同如有所譽者其有所試矣斯民也三代之所以直道而行也毁毁短之也譽者過揚人善而不以實也三代夏商周也毁則沒其實譽則過其實夫子豈苟譽人者有所試而後稱之耳三代之民所以直道而行其故也毁譽不實則矯情飾僞得以欺世而風俗靡然矣何由而行直道也哉直只是朴實不回曲心本直也有一㸃私意便失其直子曰吾猶及史之闕文也有馬者借人乘之今亡與無通矣夫音扶史闕文馬借乘恐古人有此語故夫子舉而言曰史之闕文吾尚可以及之如闕疑闕殆郭公夏五之類可見若借乘之事則今無有矣蓋嘆世道益薄人情益偷公私藩籬形骸爾我其意非專指馬也子曰巧言亂德小不忍則亂大謀忍者必有忍之忍無定見必為巧言所亂無定力必為小不忍所亂自昔聖賢所貴乎致知者只是理㑹箇不亂耳禹曰安汝止伊尹曰欽厥止不亂之謂也亂後都差子曰衆惡去聲之必察焉衆好去聲之必察焉衆好衆惡特衆人之好惡耳或是或否皆未可知而流俗則未必能察也聖人於此都要契勘孟子所謂皆曰賢然後察之正是此意子曰人能𢎞道非道𢎞人𢎞大也道本大也豈人有以大之而後大哉只為常人意蔽欲窒是以日用而不知其為大耳功深力到一旦洞然六通四闢範圍無外而後知其為大焉非昔小而今大也昔迷而今悟也故曰人能𢎞道若夫不學本心晦蝕自窘自求如蝸在封則是道之大雖自若也如人何哉故曰非道𢎞人子曰過而不改是謂過矣人誰無過改之為貴是故聖人貴乎復也若不能改其過成矣終何說哉一改字是聖狂之分學者所宜深體子曰吾嘗終日不食終夜不寢以思無益不如學也思曰睿睿作聖豈可不思此章特戒無益而思者耳聖人自謂吾嘗廢食忘寢以思之而無所益故不如學也託諸己以勉人子曰君子謀道不謀食耕也餒奴罪切在其中矣學也祿在其中矣君子憂道不憂貧耕所以謀食宜可無餒也而曰餒在其中餒非飢之謂也志於食者道必餒行有不慊於心之謂也學所以謀道非志於祿也而曰祿在其中祿非必爵祿之謂也道之腴者固祿之理干祿豈弟之謂也然則君子之所憂者道耳而憂貧乎哉子曰知去聲下同及之仁不能守之雖得之必失之知及之仁能守之不莊以蒞之則民不敬知及之仁能守之莊以蒞之動之不以禮未善也及言至也莊端莊也蒞臨民也動舉措施為也知及之者覺此本心之謂也覺則至矣故曰知及大學之道在明明德晉之象曰君子以自昭明德明此斯謂之知守此知而不失斯謂之仁舊習蔽錮安能盡净意欲念動如雲忽興兢業不繼用力微懈雖得必失昏昏如故甚可畏也仁能守矣至於臨民則又不可不莊莊矣至於舉措施為則又不可不以禮知及仁守所以成已也莊蒞禮動所以經世也異端之教自謂識心見性而呵佛罵祖果莊已乎離倫絶類果禮已乎愚嘗有詩云聖道大明備異端何偏虧晚學敢妄僣因依相發揮昏昏若醉夢日用不自知一旦有先覺渙然脫沉迷勿忘勿助長斯須那可違乃若夢乍醒麴車仍朵頥偃蹇不自愛雖得必失之守此之謂仁失此之謂愚炳炳兩端揭巍巍大訓垂若為莊與禮丁寧猶費辭嗚呼至矣哉斯言豈豫欺此心萬古同本無夷夏殊民彞大泯亂世道誰綱維恭惟彼陶唐六合同光輝睦我九族親協彼萬邦黎從根到枝葉整整無漏遺試舜第一義二女往嬪虞諸難乃遍厯首事五典徽載觀巖廊上君臣相俞吁欽哉不離口此豈笑貌為敷教得汝契降典咨汝夷大禹九功成臯陶象刑施刑所以弼教功所以叙彞穆穆我文王敬止於緝熙江漢無犯禮化行自關雎金科垂玉律如日行天衢有志扶世道何能易此規去聖日以逺禮壞俗澆漓裔夷來用夏異端轉交馳瑣碎不暇問髠耐者為誰棄三綱九法其教方得推羣居抱空寂髙談𤣥妙機或推倒禪床或拗折竹篦溺尿與屙屎呵佛罵祖師先聖答問仁諸賢請事斯雍容洙泗上安有此行移只消一不莊坐見百度隳况復離倫類家國何由齊佛者西方仙顧敢相瑕疵渠自用渠法我實無用兹吾黨有家風所宜日孜孜輕俊樂便捷往往不自持駸駸墮其網氣習易轉樞相延無忌憚陋視六藝書浸淫去不反寧顧百世非民日化魑魅義同救溺飢物物皆我心此責將安歸於此有缺闕恐非仁者宜時也抑何幸投老得所依到此重感激端拜聊陳詩子曰君子不可小知而可大受也小人不可大受而可小知也君子只就末節細故上看他不得直是到常人所不可能處擔荷得去方見君子雖然勤小物矜細行固無一節之不善也特不專在這上耳小人則不然淺中狹量如何大受愚舊說如此後聞先師云君子而不大受則道不明小人大受則為無忌憚矣君子於此可不慎歟子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也民之憚於為仁不啻如蹈水火水火固有焚溺之患矣未有以仁而傷生者然則何所憚而不為哉至於人欲之橫流情僞之滋熾滔滔焰焰自益深益熱矣乃反甘心而不悔此下愚之所以不移聖人之所以哀矜也子曰當仁不讓於師仁之為道是聖門第一工夫進之唯恐其不亟行之惟恐其不力非可與人相讓而為者也到此地雖師有所不讓豈可謂師為之而不敢為哉不讓非爭勝之謂子曰君子貞而不諒貞者萬變而不失其正豈若匹夫匹婦之為諒哉諒者守小信而不知變必不能正也子曰事君敬其事而後其食敬其事者盡忠於君夙夜匪懈之謂也人患不能敬耳利祿豈可急哉若以利祿先入其心只是私意安得能敬子曰有教無類種類雖或不同然同有此心則同有此理安有不可教者但患不真有教耳真有教方不論其類直是能轉移變化方可言有啓迪之不得其㫖感發之不得其道雖諄諄其誨謂之有可乎子曰道不同不相為去聲謀謀者相資以取益也功利而與之謀道問學而與之謀利可乎二者不啻氷炭子曰辭達而已矣古人非泛濫於文也所以明理耳故曰辭達而已矣雖然敷暢厥㫖了然無疑方謂之達辭至於能達豈易得哉師冕見賢遍切及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與平聲子曰然固相去聲師之道也師樂師瞽者冕名再言某在斯舉在坐之人以詔之相助也古者瞽必有相觀夫子相師之道豈薄俗所可知哉哀矜惻怛之意溫然見於辭㫖之外一物失所如己隱憂此天地之心也季氏第十六季氏將伐顓音専臾音俞冉有季路見賢遍切於孔子曰季氏將有事於顓臾孔子曰求無乃爾是過與夫音扶顓臾昔者先王以為東䝉主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任平聲有言曰陳力就列不能者止危而不持顛而不扶則將焉於䖍切用彼相去聲矣且爾言過矣虎兕徐履切出於柙户甲切龜玉毁於櫝音獨中是誰之過與平聲冉有曰今夫音扶顓臾固而近於費今不取後世必為子孫憂孔子曰求君子疾夫音扶舍上聲曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫音扶如是故逺人不服則修文德以來之既來之則安之今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內也顓臾國名魯附庸也東䝉山名先王封顓臾於此山之下使主其祭在魯地之中夫子指季孫周任古之良史陳布也列位也相輔相也兕野牛也柙檻也櫝匱也在柙而出在櫝而毁乃典守者之罪所以責二子也固謂城郭完固費季氏私邑寡少也貧乏也均平也安安寧也逺人謂顓臾分崩離析謂公室四分家臣屢叛干楯也戈㦸也蕭牆屏也夫子始責之以爾是過與則曰二臣皆不欲及再責之以是誰之過歟則曰不取必為憂屢遁其說而情實畢露矣不曰欲之而必為之辭此君子所以疾惡之也大抵國家先治內後治外不患寡而下治內之道也夫如是而下治外之道也今也逺人不服則不能來邦分崩離析則不能守而乃謀伐顓臾於邦內扶顛持危恐不如是二子之罪安所逃乎憂在蕭牆所以警懼而教之也此章辭㫖明暢事之是非利害切中二子之隱微昭然如數黑白於照臨之下非聖人孰能與於此哉孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議先王之制諸侯不得變禮樂專征伐陪臣家臣也臣無有作福作威玉食此一王之權所以尊無二上者也禮樂征伐自諸侯出則世數久逺固已可占况大夫乎又况陪臣執國命乎此蓋為當時而歎也天下有道人主之威權日行於上諸侯有不然者則變置之安得使大夫而竊政於其下哉有道則自無可議孔子曰祿之去公室五世矣政逮於大夫四世矣故夫音扶三桓之子孫微矣魯自文公薨公子遂殺子赤立宣公而君失其政厯成襄昭定凡五公逮及也自季武子始專國政厯悼平桓子几四世而為家臣陽虎所執三桓三家皆桓公之後祿去公室即其大夫專政之漸也政逮大夫即其子孫衰微之兆也安有上失操柄盜弄威權而能遺子孫以無禍者哉後世姦臣擅國自謂得志然而禍不旋踵族無噍類此可以為鑒矣夫子雖為三桓而發實萬世之大戒孔子曰益者三友損者三友友直友諒友多聞益矣友便平聲下同辟婢亦切友善柔友便佞損矣諒信也便者慣於其事善者長於此也直則不回諒則無僞多聞則可以質疑辨惑辟與柔佞如淫聲美色最易入人非早辨而痛絶之未有不濡染於此者世之人往往不知損之為損而反憚益者之難親夫子别白兩端開示深矣孔子曰益者三樂五教切下不音者同損者三樂樂節禮樂音嶽樂道人之善樂多賢友益矣樂驕樂音洛樂佚遊樂宴樂音洛損矣道稱道也驕縱也佚遊嬉遊也宴宴安也樂者心之所好向慕而不忘也所好者善自然為益所好者不善自然為損則是非向背發乎一念之微可不謹哉節者裁制而歸於中也孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顔色而言謂之瞽愆過也瞽無目也言未及者猶云未說到此言及之者猶云正說到此人之顔色可以占其意向不知其意向如何而遽言之安知不至於失言乎是非要探伺顔色為容悅也侍君子而言其不可苟如此孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬭及其老也血氣既衰戒之在得得貪得也人之私欲隨其血氣各有所偏自少壯至老每就其偏而戒之則始終不動於血氣矣此克己之大㫖也雖然槩論人生有此三節爾若真能用力於仁毋意毋我後面許多節病亦自然不作孔子曰君子有三畏畏天命畏大人畏聖人之言小人不知天命而不畏也狎大人侮聖人之言知天命則畏之矣古之君子所以戰戰兢兢臨深履薄戒謹恐懼不敢少懈者果為何事也哉惟其不知是以不畏大人全天命者也聖言明天命者也君子無往而不敬小人無往而不慢孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣此章是聖人道與人最深切處生知者不假修習自然清明所謂性之所謂上知下是必須學而後得所以致其知也又下是却又未能便學直待間關險阻怵迫無聊乃向此一路方肯用力此三者資質雖各不同及其知之則一而已若夫困後又復不學顛倒冥迷醉生夢死終身由之而不知耳可憐矣哉嗚呼生而知之者不得見矣真能有志於學者且不易遇也悲哉孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難去聲見得思義此一章正是行著習察精密處人之行已那一事不就不思上壞了其目雖九其本則一何謂一曰由乎心不明乎心而欲逐項正救難矣思明則非禮勿視思聰則非禮勿聽思忠則非禮勿言此外大抵非禮勿動之事也孔子曰見善如不及見不善如探吐南切湯吾見其人矣吾聞其語矣隱居以求其志行義以達其道吾聞其語矣未見其人也齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之其斯之謂與平聲駟四馬也首陽山名如不及惟恐不得到也如探湯畏之不敢近也此事固有能行者矣若夫隱居以求其志行義以逹其道則非遁世無悶確乎不拔者不能今之世徒能言耳吾未見其人也必若伯夷叔齊而後可以當此故曰其斯之謂歟餓於首陽之下便是他求其志達其道處徒有千駟何德之可稱哉陳亢音剛問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也逺其子者謂不有其私也詩書執禮皆雅言也伯魚於夫子獨立之時而所聞者不外乎此蓋可見矣陳亢始以異聞為問終也以逺其子為喜私意淺見安知聖人大公無我之心哉詩優柔而和平人情物理靡不曲盡故能言禮防人情之流秩然有度故能立邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人寡鮮少自卑之辭邦君之妻稱呼不一如此名之所以正分之所以嚴也記此一端其他可例融堂四堂管見卷八
