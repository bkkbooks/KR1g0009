body:
  text: 融堂四書管見卷一宋錢時撰論語學而第一子曰學而時習之不亦説音悅乎有朋自逺方來不亦樂音洛乎人不知而不愠紆問切不亦君子乎子孔子也同門曰朋學説文覺也習者習熟其所學時習言無時而不習也愠怒也學者覺其所固有而已故曰大學之道在明明德心本無體虛明無所不照為物所誘為意所蔽為情所縱而昭昭者昏昏矣是故貴於覺也不覺則何以習禹曰安汝止習此者也文王不識不知順帝之則習此者也孔子為之不厭習此者也無時而不習即無時而不明滿天地皆春風和氣也其為説何如哉於是而有同志來自逺方則知學者益廣矣此其為樂又可量哉雖然知學者自知不知學者自不我知安可強也世之人昏昏逐逐醉生夢死視聖賢門户不翅若氷炭正可憐憫耳安得以其不知而遂愠乎君子之心如太虛澄然何愠之有有子曰其為人也孝弟去聲而好去聲犯上者鮮上聲矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本與有子名若孔子弟子善事父母為孝善事兄長為弟犯上陵犯長上也鮮少也作亂為逆亂之事也本立而道生以下有疑更待細勘堯舜之道孝弟而已矣孝弟即道即仁何本何生子曰巧言令色鮮矣仁巧即機巧之巧令美也仁人心也得其本心斯謂之仁意態浮動務説人之觀聽此何所用心哉故曰鮮矣仁言如此等人少有仁者深不然之之辭也曾子曰吾日三省吾身為去聲人謀而不忠乎與朋友交而不信乎傳不習乎曾子孔子弟子名參字子輿省察也不欺於心為忠不欺於言為信傳者傳道也習即時習之習傳而不習則所學者不在己何貴於傳也然而日用功夫往往多就交際應酬上走作故曾子三省以忠信為先記曰忠信大道易曰忠信所以進德謀不忠交不信則所以傳而習之者何事哉子曰道去聲千乘之國敬事而信節用而愛人使民以時八百家出車一乘千乘諸侯之國也時者農隙之時只一道字便非春秋戰國氣象古注訓治殆未然也敬事下聨著信字節用下聨著愛人字為國者所當深體子曰弟上聲子入則孝出則弟去聲謹而信泛愛衆而親仁行有餘力則以學文泛廣也衆謂衆人親親炙也仁謂仁者餘力猶言餘暇也文即六藝之文入孝出弟為弟子者職分所當爾然不謹則慢忽不信則詐欺不泛愛衆則偏私泛愛而不親仁則無所決擇以成其德行有餘力最宜玩味見得聖門力行功夫鑿鑿精實學文非所急也學而一篇多説孝弟忠信四字子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣子夏孔子弟子姓卜名商賢賢易色者賢人之賢而易其好色之心也致猶委也賢賢而下即是古人實學吾必謂之學矣所以極言其學之在是也四事雖排説獨以賢賢易色揭之章首最是緊切處使好善之誠不能勝物欲之念率是以往橫流莫遏事君親交朋友其弊有不可勝言者安能各盡其分乎曰賢曰易曰竭曰致曰信不可草草看過子曰君子不重則不威學則不固主忠信無友不如己者過則勿憚改重端重也威威嚴也固堅固也無毋通與勿皆禁止之辭也憚畏難也氣輕志浮故不重不重則所學易搖主忠信而下所以學也所主者忠信大本立矣自然重自然威自然固又須得如己者友乃有益不如己是與己不相似非同志也友同志矣又須不憚改過過而不改雖友同志無益也或曰不如猶言不勝曾子曰慎終追逺民德歸厚矣慎終者不怠於終也追逺者不忘於逺也民之秉彞好是懿德本未始不厚也於所厚者薄始無所不薄耳能慎終能追逺安得不一反而歸於厚哉子禽問於子貢曰夫子至於是邦也必聞其政求之與平聲抑與之與平聲下同子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與子禽姓陳名亢子貢姓端木名賜皆孔子弟子溫和也良善也恭敬也儉不侈大也讓謙遜也夫子溫良恭儉讓以得之以得之三字當看是得也非我求也非彼與也子曰父在觀其志父沒觀其行去聲三年無改於父之道可謂孝矣父在而違父沒而倍者多矣觀其志觀其行而於父之道三年無改則終身之所守定矣所以為孝有志有行之可觀而其道可以無改非不義之父也如或非道又當權宜有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也禮者天則之自然人文之品節也和即中和之和斯指和而言小大由之言上下所共由也喜怒哀樂發而皆中節謂之和此即禮之所以為禮也苟知和之為禮而禮之用未嘗不和則安有不可行者哉有子所謂知和而和豈恣縱無法度之謂而以禮節之者特區區文貌之末歟有子曰信近去聲下同於義言可復也恭近於禮逺去聲恥辱也因不失其親亦可宗也義者宜也復踐行也因由也宗猶尚也信所以明義恭所以行禮非二物也何以謂之近若曰其蔽也賊無禮則勞彼善於此云爾由是而得所可親之人乃庶幾可尚焉故曰亦可宗子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好去聲學也已不求安飽能敏事慎言非篤志力行者不爾然須識所敏者何事若區區末務則何就正之有子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂音洛富而好去聲禮者也子貢曰詩云如切如磋七多切如琢如磨其斯之謂與平聲子曰賜也始可與言詩已矣告諸往而知來者諂以言媚人也驕矜肆也可者僅可而未盡之辭詩衛風淇澳之篇治骨角者切而復磋治玉石者琢而復磨往謂所已言者來謂所未言者貧無諂富無驕雖愈於常人之病然未必忘貧富也樂與好禮則忘矣此君子所以無入而不自得子貢因悟切磋琢磨之旨知學問之無窮是告諸往而能知來也故夫子喜之子曰不患人之不己知患不知人也苟知人則知所向方矣不知從何所決擇子夏子遊子張尚不知夫子况他人乎所以知不知者安在為政第二子曰為政以德譬如北辰居其所而衆星共之政者正也所以正人之不正也德者得也不失其本心之謂也北辰北極天之樞也居其所居中而不動也拱者衆星環向而朝之也德者政之所出民之歸也子曰詩三百一言以蔽之曰思無邪詩三百十一篇言三百者舉大數也蔽斷也思無邪魯頌駉篇之語思無邪一語所以示萬世讀詩之大法不然則鄭衛國風適滋蕩者之邪心乎子曰道去聲下同之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格道導也齊一之也免者苟免於刑也格正也德禮者人心所同有非律之於其外也故有恥且格為民父母行政而使之苟免無恥亦可憐矣雖然猶有政也猶苟免也後世徒刑而不及政斯民遂至於不免且不暇免悲矣子曰吾十有五而志於學三十而立四十而不惑五十而知天命六十而耳順七十而從如字心所欲不踰矩古者十五入大學踰過也矩所以為方者即天則也此章六節當提起學與天命作綱領看志者所向之一立者所守之定不惑者所見之明由是乃進而知天命焉所謂志學學此者也學而至於知天命則至矣六通四闢徹底洞然無所不覺無所不照過此以往復何所知哉但熟而已曰耳順是應酬上無纎毫疑礙無一事之不熟也曰從心所欲不踰矩是隱微處無纎毫滲漏無一念之不熟也釋氏虎穴魔宫皆為佛事淫坊酒肆盡是道場渠所謂任意縱橫亦從心所欲矣謂之不踰矩可乎不踰矩吾聖人所以經世所以建皇極孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮孟懿子魯大夫仲孫氏名何忌樊遲名須孔子弟子御御車也孟孫即懿子也所謂無違在於以禮然則非禮以順其親者不謂之順乃所謂違也以禮者養生喪死種種中節無過不及之謂玩一以字人子之責甚重孟僖子使其子學禮故告之以是歟孟武伯問孝子曰父母唯其疾之憂武伯懿子之子名彘自疾之外略無一事貽親之憂亦可謂孝矣雖然無妄之疾乃有所以致之其為毁傷一也故曰唯其疾唯字與其字不可不深體子遊問孝子曰今之孝者是謂能養去聲下同至於犬馬皆能有養不敬何以别彼列切乎子遊姓言名偃孔子弟子養謂口體之奉也孩提之童知愛其親本未始不孝也惟不敬故失之敬則私意斷絶本心昭融通於神明光於四海無所不通於是乎在養而不敬與獸畜之者無異謂之孝可乎雖然指能養者而言耳子夏問孝子曰色難有事弟子服其勞有酒食音嗣先生饌曽是以為孝乎食飯也先生父兄也饌供饋之也曾則也得父母於容色之間非先意承志者不能然須識所以難者何在若嘻嘻媚恱不以其道則非所難也服勞具饌亦皆人子事但不可專以是為孝耳和氣浹洽天性昭明骨肉之間無非大順四子問孝答之不同而其人品亦自可見遊夏聖門髙弟違禮節危父母之事宜無有也故直以敬與色難警䇿之即此便是學問用力精微處且未有不敬而能順色者也四者皆當以敬為主子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚回姓顔字子淵孔子弟子省察也私謂退處燕安自適之際發醒發也覺也顔子地步已大段瑩徹當其不違如愚之時心融意會非他人所能知也然學問之士苟自得矣目色之間便有不言而喻者回也必待發於私而後知其不愚者夫子之言殆喜辭也且以詔門弟子子曰視其所以觀其所由察其所安人焉於虔切廋所留切哉人焉廋哉廋匿也所以者趨向之大槩容可勉強也所由者日用之實事漸不可以偽為矣若夫所安則出於中心之誠然雖欲掩之而自有不可掩者曰視曰觀猶在事迹察其所安得之心術之微也小人間居為不善見君子而後厭然掩其不善而著其善直何益哉學者於此行著習察而反求其所安者何事焉則當有凛然於不睹不聞之際者子曰溫故而知新可以為師矣故者舊所得也新者新所進也所貴於師者求日新之功也溫故而有以知新可為師矣不溫即畫斷難語進溫故習不已知新進不窮子曰君子不器器者囿於形體之名子貢之達宜不可以器名矣而曰女器然則君子所以不器者果安在哉天德昭融六通四闢子貢問君子子曰先行其言而後從之大率先言者未必能行誠力行雖不言可也夫子欲其從後言之所以抑子貢使之就實耳子曰君子周而不比小人比而不周周遍也比偏比也君子之心公普小人之見偏私心本未始不廣大也意我窒之耳一日克己何比何周子曰學而不思則罔思而不學則殆學乃踐履思者所以致其知也罔無也殆危也學而不思則無致知之功故罔思而不學則無力行之實故殆罔者空虛無實殆者臲卼不安子曰攻乎異端斯害也己攻即攻擊之攻異端非正道而别起一端以誣民者也正道昌明異端自然衰止不必攻也求以勝之反為害耳須識孟子距楊墨闢許告與夫子之意不殊方明此義孟子亦只是正人心或曰攻治也子曰由誨女音汝知之乎知之為知之不知為不知是知也由姓仲字子路孔子弟子知即覺也苟有真知無非實學以不知為知可乎記曰忠信大道道只是朴實不虛偽會此朴實之旨即知矣夫子每每提一知字只埋頭説起不言所知者何事最妙子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行去聲寡悔祿在其中矣子張姓顓孫名師孔子弟子干求也祿仕者之俸也疑未信也殆未安也闕者空闕也尤者人咎悔者所以自咎也言招憂行招辱其禍大矣何以祿為多聞闕疑而又慎言其不疑者自然寡尤多見闕殆而又慎行其不殆者自然寡悔寡尤寡悔不憂不辱即所以為祿也故曰在其中然任官擇人實未有言行不修而足以得祿者子張不問學而問干祿夫子因其病而勉之婉而不迫矣哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服哀公魯君名蔣舉提拔也錯諸枉猶言置之枉者之上也枉不直也人心是非之公一舉錯而服不服如影響可厚誣哉大凡直道皆足以服人枉道皆足以致戾不獨人才也舉其一端之大者耳季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸季康子魯大夫季孫氏名肥臨臨民也莊端莊也孝於親慈於衆舉善舉用善人也不能未進於善者勸者相勉從善也斯民尊君親上之心本未始不敬本未始不忠本未始不勸上之人無道以臨之遂使民彞泯亂不獲盡其分季康子魯大夫也由是而知所以臨民則善矣抑思敬忠以勸所以事其君哉或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政定公初年孔子不仕故或人疑而問之書周書君陳篇善兄弟曰友兄弟同氣也能孝於親自然克念同氣故書中論孝專説友于兄弟此風俗之樞機家之所以齊國之所以治天下之所以平也政者正也施於有政特由是而推之耳然則夫子雖不仕未始不為政也何者而謂之政哉千載斯言可為太息子曰人而無信不知其可也大車無輗五兮切小車無軏音月其何以行之哉大車牛車輗轅端橫木縛以駕牛領者小車駟馬車也軏轅端上曲鈎衡以駕兩服馬領者信則事事皆實無信則事事皆虛子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也王者易姓受命為一世因者禮之大本損益者禮之節文也能繼則不失其所因雖百世如一日况十世乎惜周之後無有繼之者大本既失而三代損益之變遂以弗嗣如之何其可知也子曰非其鬼而祭之諂也見義不為無勇也非其鬼是非禮典所得祭者邀福於非鬼而先王禮典輒廢不講後世之通患也人病無所見見其為義而不能果決以進則何貴於見乎聖人才説知便説勇才説致知便説力行見義不能勇為見不義亦必不能勇改融堂四書管見卷一
