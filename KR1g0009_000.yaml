body:
  text: 融堂四書管見五經總義類提要臣等謹按融堂四書管見十二卷宋錢時撰時有融堂書解己著録此編凡論語十卷孝經一卷大學一卷中庸一卷即嘉熈二年喬行簡奏下嚴州取時所著書之一也俱先列經文畧加音訓而詮釋其大㫖於後孝經用古文大學但析為六章不分經傳盖時之學出於楊簡簡之學出於陸九淵門户迥殊故不用程朱之本其解論語崇徳辨惑章謂誠不以富亦祇以異二句乃證愛欲其生惡欲其死者之為異齊景公有馬千駟節合上文為一章謂其斯之謂與句乃指夷齊便是求志逹道而言又大學此謂知本此謂知之至也二句仍附第一章末謂是聖人承上厚本薄末反覆曉人之意亦俱根據舊文不肯信為錯簡朱子與陸九淵書所謂各尊其所聞各行其所知也然金谿之學惟慿心悟或至於恍惚窈㝠時則以篤實為宗故其詮發義理類多平正簡朴不為離析支蔓之言又敖繼公儀禮集説後序所謂以魯男子之不可學柳下惠之可者矣卷首有紹興己丑時自序末有景定辛酉天台錢可則刋書䟦宋史藝文志馬端臨經籍考皆不著録獨張萱内閣書目有之雖以四書為名所解不及孟子與朱子所稱四書者異故附列於五經總義類焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀融堂四書管見原序時未弱冠先君子筠坡翁授以論語及中庸大學且曰只㑹得學而時習之一句餘書不解自通屬遭多難雖﨑嶇顛頓萬狀服膺斯訓未嘗􅍥置然不過尋繹先儒文義助之演說年踰四十忽自警省始大悟舊學之非於是取三書讀之灑然如脫纒蔓矣間因講習積而成編後獲從慈湖先師遊竟櫝藏弗果出迨今十有三載春二月兒軰請觀迺稍稍刪潤附以音訓併述古文孝經二十二章題曰四書管見嗚呼非敢為它人道也傳之家塾庶幾先君子之志云紹定己丑四月二十日蜀阜錢時書
